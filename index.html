<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pronos du jour</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f4f1ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px 14px 40px;
    color: #2b2a27;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
  .date { font-size: 13px; color: #8a8478; margin-bottom: 18px; }
  .status { text-align: center; margin-top: 60px; color: #8a8478; font-size: 14px; }
  .error-box {
    background: #fdf0ef; border: 1px solid #f3c9c5; border-radius: 10px;
    padding: 12px; margin-bottom: 16px; font-size: 13px; color: #9b2c2c;
  }
  .refresh-btn {
    display: flex; align-items: center; gap: 6px; margin-bottom: 16px;
    background: none; border: none; color: #8a8478; font-size: 12px; cursor: pointer; padding: 0;
  }
  .card {
    background: #fffdf8; border: 1px solid #e8e4d9; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .card-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .league { font-size: 11px; color: #8a8478; text-transform: uppercase; letter-spacing: 0.4px; }
  .time { font-size: 12px; color: #8a8478; font-weight: 600; }
  .teams { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .teams img { width: 22px; height: 22px; object-fit: contain; }
  .team-name { font-weight: 600; font-size: 15px; }
  .vs { color: #b0aa9c; font-size: 13px; }
  .pred-btn {
    width: 100%; padding: 8px 0; background: #2b2a27; color: #fffdf8;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .predictions { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .pred-item { padding-top: 10px; border-top: 1px solid #f0ece1; }
  .pred-item:first-child { padding-top: 0; border-top: none; }
  .pred-type { font-size: 11px; color: #8a8478; text-transform: uppercase; letter-spacing: 0.3px; }
  .pred-pick { font-size: 14px; font-weight: 600; margin: 4px 0; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 6px; background: #e8e4d9; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .bar-pct { font-size: 13px; font-weight: 700; min-width: 38px; text-align: right; }
  .footer-note { font-size: 11px; color: #b0aa9c; text-align: center; margin-top: 20px; line-height: 1.5; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .category { margin-bottom: 22px; }
  .category-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 800; color: #2b2a27;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 2px solid #2b2a27;
  }
  .category-count {
    font-size: 11px; font-weight: 600; color: #8a8478;
    background: #e8e4d9; border-radius: 10px; padding: 2px 8px;
  }
  .league-row {
    display: flex; align-items: center; gap: 10px;
    background: #fffdf8; border: 1px solid #e8e4d9; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
  }
  .league-flag { font-size: 20px; width: 24px; text-align: center; flex-shrink: 0; }
  .league-name { flex: 1; font-size: 14px; font-weight: 600; color: #2b2a27; }
  .league-badge {
    font-size: 12px; font-weight: 700; color: #fffdf8;
    background: #2b2a27; border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .league-chevron { font-size: 12px; color: #b0aa9c; transition: transform 0.15s; flex-shrink: 0; }
  .league-chevron.open { transform: rotate(180deg); }
  .league-matches { display: none; padding: 4px 0 4px 4px; }
  .league-matches.open { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚽ Pronos du jour</h1>
  <div class="date" id="dateLabel"></div>
  <div id="status" class="status">⏳ Chargement des matchs du jour...</div>
  <div id="errorBox"></div>
  <button id="refreshBtn" class="refresh-btn" style="display:none">🔄 Rafraîchir les matchs</button>
  <div id="matchList"></div>
  <div id="footerNote"></div>
</div>

<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";

function todayISO() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) {
    throw new Error(JSON.stringify(json.errors));
  }
  return json.response;
}

function safe(v, fallback = 0) {
  return (typeof v === "number" && !isNaN(v)) ? v : fallback;
}

const CATEGORY_ORDER = ["maroc", "international", "europe", "autres"];
const CATEGORY_LABELS = {
  maroc: "🇲🇦 Maroc",
  international: "🌍 Coupe du monde / International",
  europe: "🏆 Championnats européens",
  autres: "⚽ Autres compétitions",
};

const EUROPEAN_COUNTRIES = [
  "England", "Spain", "Italy", "Germany", "France", "Portugal",
  "Netherlands", "Belgium", "Scotland", "Turkey", "Greece", "Switzerland",
  "Austria", "Russia", "Ukraine", "Poland", "Czech-Republic", "Denmark",
  "Sweden", "Norway", "Croatia", "Serbia", "Romania",
];

const INTERNATIONAL_KEYWORDS = [
  "world cup", "world-cup", "uefa", "afcon", "africa cup", "nations league",
  "champions league", "europa league", "conference league", "copa america",
  "concacaf", "confederations", "qualification", "qualifiers", "friendlies",
  "international",
];

function categorizeFixture(fixture) {
  const league = fixture.league;
  const country = (league.country || "").toLowerCase();
  const leagueName = (league.name || "").toLowerCase();

  if (country === "morocco") return "maroc";

  const isInternational =
    country === "world" ||
    INTERNATIONAL_KEYWORDS.some(kw => leagueName.includes(kw));
  if (isInternational) return "international";

  const isEuropean = EUROPEAN_COUNTRIES.some(c => c.toLowerCase() === country);
  if (isEuropean) return "europe";

  return "autres";
}

const COUNTRY_TO_ISO = {
  "morocco": "MA", "world": "🌍", "england": "GB", "spain": "ES", "italy": "IT",
  "germany": "DE", "france": "FR", "portugal": "PT", "netherlands": "NL",
  "belgium": "BE", "scotland": "GB", "turkey": "TR", "greece": "GR",
  "switzerland": "CH", "austria": "AT", "russia": "RU", "ukraine": "UA",
  "poland": "PL", "czech-republic": "CZ", "denmark": "DK", "sweden": "SE",
  "norway": "NO", "croatia": "HR", "serbia": "RS", "romania": "RO",
  "brazil": "BR", "argentina": "AR", "usa": "US", "mexico": "MX",
  "china": "CN", "japan": "JP", "south-korea": "KR", "australia": "AU",
  "egypt": "EG", "algeria": "DZ", "tunisia": "TN", "saudi-arabia": "SA",
  "qatar": "QA", "uae": "AE",
};

function isoToFlagEmoji(iso) {
  if (!iso || iso.length !== 2) return "🏳️";
  const codePoints = iso.toUpperCase().split("").map(c => 127397 + c.charCodeAt(0));
  return String.fromCodePoint(...codePoints);
}

function countryFlag(countryName) {
  const key = (countryName || "").toLowerCase();
  if (key === "world") return "🌍";
  const iso = COUNTRY_TO_ISO[key];
  return iso ? isoToFlagEmoji(iso) : "🏳️";
}

function computePredictions(homeStats, awayStats, homeName, awayName) {
  const predictions = [];

  const homeGF = safe(homeStats?.goals?.for?.average?.total);
  const homeGA = safe(homeStats?.goals?.against?.average?.total);
  const awayGF = safe(awayStats?.goals?.for?.average?.total);
  const awayGA = safe(awayStats?.goals?.against?.average?.total);

  const homeWinPct = safe(homeStats?.fixtures?.wins?.total) / Math.max(1, safe(homeStats?.fixtures?.played?.total, 1));
  const awayWinPct = safe(awayStats?.fixtures?.wins?.total) / Math.max(1, safe(awayStats?.fixtures?.played?.total, 1));

  const homeAttack = (homeGF + awayGA) / 2 * 1.1;
  const awayAttack = (awayGF + homeGA) / 2;

  const totalAttack = homeAttack + awayAttack || 1;
  let pHome = (homeAttack / totalAttack) * 0.6 + homeWinPct * 0.4;
  let pAway = (awayAttack / totalAttack) * 0.6 + awayWinPct * 0.4;
  pHome = Math.max(0.05, Math.min(0.85, pHome));
  pAway = Math.max(0.05, Math.min(0.85, pAway));
  let pDraw = Math.max(0.1, 1 - pHome - pAway);
  const sum1 = pHome + pDraw + pAway;
  pHome /= sum1; pDraw /= sum1; pAway /= sum1;

  const result1x2 = [
    { label: `Victoire ${homeName}`, pct: pHome },
    { label: "Match nul", pct: pDraw },
    { label: `Victoire ${awayName}`, pct: pAway },
  ].sort((a, b) => b.pct - a.pct)[0];

  predictions.push({ type: "Résultat (1N2)", pick: result1x2.label, confidence: result1x2.pct });

  const expectedGoals = homeAttack + awayAttack;
  const pOver25 = Math.max(0.1, Math.min(0.9, (expectedGoals - 1.5) / 3 + 0.5));
  const overUnder = pOver25 >= 0.5
    ? { label: "Plus de 2.5 buts", pct: pOver25 }
    : { label: "Moins de 2.5 buts", pct: 1 - pOver25 };
  predictions.push({ type: "Total de buts", pick: overUnder.label, confidence: overUnder.pct });

  const pHomeScores = Math.max(0.15, Math.min(0.9, homeAttack / 1.4));
  const pAwayScores = Math.max(0.15, Math.min(0.9, awayAttack / 1.4));
  const pBTTS = pHomeScores * pAwayScores;
  const bttsLabel = pBTTS >= 0.5 ? "Les deux équipes marquent : Oui" : "Les deux équipes marquent : Non";
  predictions.push({ type: "BTTS", pick: bttsLabel, confidence: pBTTS >= 0.5 ? pBTTS : 1 - pBTTS });

  const pDoubleHome = pHome + pDraw;
  const pDoubleAway = pAway + pDraw;
  const dc = pDoubleHome >= pDoubleAway
    ? { label: `Double chance : ${homeName} ou nul`, pct: pDoubleHome }
    : { label: `Double chance : ${awayName} ou nul`, pct: pDoubleAway };
  predictions.push({ type: "Double chance", pick: dc.label, confidence: Math.min(0.95, dc.pct) });

  return predictions.sort((a, b) => b.confidence - a.confidence);
}

function confidenceBarHTML(value) {
  const pct = Math.round(value * 100);
  const color = pct >= 65 ? "#2d6a4f" : pct >= 50 ? "#b08900" : "#9b2c2c";
  return `
    <div class="bar-row">
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%; background:${color}"></div></div>
      <span class="bar-pct" style="color:${color}">${pct}%</span>
    </div>`;
}

function isNationalTeamMatch(fixture) {
  const country = (fixture.league.country || "").toLowerCase();
  const leagueName = (fixture.league.name || "").toLowerCase();
  return country === "world" || INTERNATIONAL_KEYWORDS.some(kw => leagueName.includes(kw));
}

async function computeNationalPredictions(home, away) {
  const [h2hRes, homeLast, awayLast] = await Promise.all([
    apiGet(`/fixtures/headtohead?h2h=${home.id}-${away.id}&last=10`),
    apiGet(`/fixtures?team=${home.id}&last=8`),
    apiGet(`/fixtures?team=${away.id}&last=8`),
  ]);

  function formScore(matches, teamId) {
    if (!matches || matches.length === 0) return 0.5;
    let points = 0;
    matches.forEach(m => {
      const isHome = m.teams.home.id === teamId;
      const won = isHome ? m.teams.home.winner : m.teams.away.winner;
      const draw = m.teams.home.winner === null && m.teams.away.winner === null && m.fixture.status.short === "FT";
      if (won) points += 3;
      else if (draw) points += 1;
    });
    return points / (matches.length * 3);
  }

  function h2hScore(matches, teamId) {
    if (!matches || matches.length === 0) return null;
    let wins = 0, draws = 0;
    matches.forEach(m => {
      const isHome = m.teams.home.id === teamId;
      const won = isHome ? m.teams.home.winner : m.teams.away.winner;
      const draw = m.teams.home.winner === null && m.teams.away.winner === null;
      if (won) wins++;
      else if (draw) draws++;
    });
    return { wins, draws, total: matches.length };
  }

  const homeForm = formScore(homeLast, home.id);
  const awayForm = formScore(awayLast, away.id);
  const h2h = h2hScore(h2hRes, home.id);

  let pHome, pAway;
  if (h2h && h2h.total > 0) {
    const h2hHomeRate = h2h.wins / h2h.total;
    pHome = homeForm * 0.6 + h2hHomeRate * 0.4 + 0.05;
    const h2hAwayRate = (h2h.total - h2h.wins - h2h.draws) / h2h.total;
    pAway = awayForm * 0.6 + h2hAwayRate * 0.4;
  } else {
    pHome = homeForm * 0.55 + 0.05;
    pAway = awayForm * 0.55;
  }

  pHome = Math.max(0.05, Math.min(0.85, pHome));
  pAway = Math.max(0.05, Math.min(0.85, pAway));
  let pDraw = Math.max(0.12, 1 - pHome - pAway);
  const sum = pHome + pDraw + pAway;
  pHome /= sum; pDraw /= sum; pAway /= sum;

  const predictions = [];
  const result1x2 = [
    { label: `Victoire ${home.name}`, pct: pHome },
    { label: "Match nul", pct: pDraw },
    { label: `Victoire ${away.name}`, pct: pAway },
  ].sort((a, b) => b.pct - a.pct)[0];
  predictions.push({ type: "Résultat (1N2)", pick: result1x2.label, confidence: result1x2.pct });

  const pDoubleHome = Math.min(0.95, pHome + pDraw);
  const pDoubleAway = Math.min(0.95, pAway + pDraw);
  const dc = pDoubleHome >= pDoubleAway
    ? { label: `Double chance : ${home.name} ou nul`, pct: pDoubleHome }
    : { label: `Double chance : ${away.name} ou nul`, pct: pDoubleAway };
  predictions.push({ type: "Double chance", pick: dc.label, confidence: dc.pct });

  function avgGoals(matches, teamId) {
    if (!matches || matches.length === 0) return 1.2;
    let scored = 0;
    matches.forEach(m => {
      const isHome = m.teams.home.id === teamId;
      scored += isHome ? (m.goals.home ?? 0) : (m.goals.away ?? 0);
    });
    return scored / matches.length;
  }
  const expectedGoals = avgGoals(homeLast, home.id) + avgGoals(awayLast, away.id);
  const pOver25 = Math.max(0.15, Math.min(0.85, (expectedGoals - 1.5) / 3 + 0.5));
  const overUnder = pOver25 >= 0.5
    ? { label: "Plus de 2.5 buts", pct: pOver25 }
    : { label: "Moins de 2.5 buts", pct: 1 - pOver25 };
  predictions.push({ type: "Total de buts", pick: overUnder.label, confidence: overUnder.pct });

  return predictions.sort((a, b) => b.confidence - a.confidence);
}

async function showPredictions(fixture, container, btn) {
  if (container.dataset.loaded === "true") {
    container.style.display = container.style.display === "none" ? "block" : "none";
    btn.textContent = container.style.display === "none" ? "👁️ Voir les pronostics" : "🙈 Masquer les pronostics";
    return;
  }
  btn.textContent = "🔄 Calcul en cours...";
  btn.disabled = true;
  try {
    const home = fixture.teams.home;
    const away = fixture.teams.away;
    let preds;

    if (isNationalTeamMatch(fixture)) {
      preds = await computeNationalPredictions(home, away);
    } else {
      const season = fixture.league.season;
      const [homeStatsRes, awayStatsRes] = await Promise.all([
        apiGet(`/teams/statistics?team=${home.id}&league=${fixture.league.id}&season=${season}`),
        apiGet(`/teams/statistics?team=${away.id}&league=${fixture.league.id}&season=${season}`),
      ]);
      preds = computePredictions(homeStatsRes, awayStatsRes, home.name, away.name);
    }

    container.innerHTML = preds.map(p => `
      <div class="pred-item">
        <div class="pred-type">${p.type}</div>
        <div class="pred-pick">${p.pick}</div>
        ${confidenceBarHTML(p.confidence)}
      </div>
    `).join("");
    container.dataset.loaded = "true";
    container.style.display = "block";
    btn.textContent = "🙈 Masquer les pronostics";
  } catch (e) {
    container.innerHTML = `<div style="color:#9b2c2c;font-size:13px;">⚠️ Stats indisponibles pour ce match (ligue peu couverte ou quota atteint).</div>`;
    container.style.display = "block";
    btn.textContent = "👁️ Voir les pronostics";
  } finally {
    btn.disabled = false;
  }
}

function renderMatch(fixture) {
  const home = fixture.teams.home;
  const away = fixture.teams.away;
  const league = fixture.league;
  const kickoff = new Date(fixture.fixture.date);
  const timeStr = kickoff.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-top">
      <span class="league">${league.name}</span>
      <span class="time">${timeStr}</span>
    </div>
    <div class="teams">
      <img src="${home.logo}" alt="" />
      <span class="team-name">${home.name}</span>
      <span class="vs">vs</span>
      <span class="team-name">${away.name}</span>
      <img src="${away.logo}" alt="" />
    </div>
    <button class="pred-btn">👁️ Voir les pronostics</button>
    <div class="predictions" style="display:none"></div>
  `;
  const btn = card.querySelector(".pred-btn");
  const predContainer = card.querySelector(".predictions");
  btn.addEventListener("click", () => showPredictions(fixture, predContainer, btn));
  return card;
}

function renderLeagueGroup(leagueName, countryName, fixtures) {
  const row = document.createElement("div");

  const header = document.createElement("div");
  header.className = "league-row";
  header.innerHTML = `
    <span class="league-flag">${countryFlag(countryName)}</span>
    <span class="league-name">${leagueName}</span>
    <span class="league-badge">${fixtures.length}</span>
    <span class="league-chevron">▼</span>
  `;

  const matchesContainer = document.createElement("div");
  matchesContainer.className = "league-matches";
  fixtures.forEach(f => matchesContainer.appendChild(renderMatch(f)));

  header.addEventListener("click", () => {
    const isOpen = matchesContainer.classList.toggle("open");
    header.querySelector(".league-chevron").classList.toggle("open", isOpen);
  });

  row.appendChild(header);
  row.appendChild(matchesContainer);
  return row;
}

async function loadFixtures() {
  const statusEl = document.getElementById("status");
  const errorBox = document.getElementById("errorBox");
  const matchList = document.getElementById("matchList");
  const refreshBtn = document.getElementById("refreshBtn");
  const footerNote = document.getElementById("footerNote");

  statusEl.style.display = "block";
  statusEl.innerHTML = '<span class="spin">🔄</span> Chargement des matchs du jour...';
  errorBox.innerHTML = "";
  matchList.innerHTML = "";

  try {
    const data = await apiGet(`/fixtures?date=${todayISO()}`);
    const sorted = [...data].sort((a, b) => new Date(a.fixture.date) - new Date(b.fixture.date));
    statusEl.style.display = "none";
    refreshBtn.style.display = "flex";

    if (sorted.length === 0) {
      matchList.innerHTML = '<p style="text-align:center;color:#8a8478;margin-top:40px;">Aucun match trouvé pour aujourd\'hui.</p>';
    } else {
      const grouped = {};
      sorted.forEach(f => {
        const cat = categorizeFixture(f);
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(f);
      });

      CATEGORY_ORDER.forEach(cat => {
        if (!grouped[cat] || grouped[cat].length === 0) return;
        const section = document.createElement("div");
        section.className = "category";
        section.innerHTML = `
          <div class="category-header">
            <span>${CATEGORY_LABELS[cat]}</span>
            <span class="category-count">${grouped[cat].length}</span>
          </div>
        `;

        const byLeague = {};
        grouped[cat].forEach(f => {
          const key = `${f.league.name}__${f.league.country}`;
          if (!byLeague[key]) byLeague[key] = { name: f.league.name, country: f.league.country, fixtures: [] };
          byLeague[key].fixtures.push(f);
        });

        Object.values(byLeague)
          .sort((a, b) => b.fixtures.length - a.fixtures.length)
          .forEach(group => {
            section.appendChild(renderLeagueGroup(group.name, group.country, group.fixtures));
          });

        matchList.appendChild(section);
      });

      footerNote.innerHTML = "Pronostics calculés à partir des statistiques de saison.<br>Outil d'aide à la réflexion, pas une garantie de résultat.";
      footerNote.className = "footer-note";
    }
  } catch (e) {
    statusEl.style.display = "none";
    errorBox.innerHTML = '<div class="error-box">⚠️ Impossible de récupérer les matchs. Réessaie dans un instant.</div>';
    refreshBtn.style.display = "flex";
  }
}

document.getElementById("dateLabel").textContent = new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
document.getElementById("refreshBtn").addEventListener("click", loadFixtures);
loadFixtures();
</script>
</body>
</html>
