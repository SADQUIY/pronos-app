<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";
const BOOKMAKER_1XBET = 8;
let allFixtures = [], currentTab = "upcoming";
const fixtureOddsCache = {}; // fixture.id -> {lh, la, parsed, source} | null (null = no odds found, cached to avoid refetch)
const matchUIState = {};     // fixture.id -> {expanded, html, btnLabel, btnClass}
const leagueOpenState = {};  // league.id -> true/false
const teamFormCache = {};    // team.id -> {avgScored, avgConceded, matches} | null

// Forme récente d'une équipe : moyenne buts marqués/encaissés sur ses ~8 derniers matchs joués
// (toutes compétitions confondues). Sert à affiner les lambdas quand les cotes sont absentes ou
// pour corriger un décalage entre la cote et une forme très récente (blessure, série...).
async function getTeamRecentForm(teamId) {
  if (Object.prototype.hasOwnProperty.call(teamFormCache, teamId)) return teamFormCache[teamId];
  let data=null;
  try {
    data = await apiGet(`/fixtures?team=${teamId}&last=10`);
  } catch(e) {
    console.warn(`[pronos] Forme récente indisponible pour l'équipe ${teamId}:`, e.message);
    teamFormCache[teamId]=null;
    return null;
  }
  if(!data || data.length===0){ teamFormCache[teamId]=null; return null; }
  let scored=0, conceded=0, n=0;
  let hScored=0, hConceded=0, hN=0, aScored=0, aConceded=0, aN=0;
  data.forEach(f=>{
    if(f.goals.home===null||f.goals.away===null) return; // match pas encore joué/terminé
    const isHome = f.teams.home.id===teamId;
    const gFor=isHome?f.goals.home:f.goals.away, gAgainst=isHome?f.goals.away:f.goals.home;
    scored+=gFor; conceded+=gAgainst; n++;
    if(isHome){ hScored+=gFor; hConceded+=gAgainst; hN++; }
    else { aScored+=gFor; aConceded+=gAgainst; aN++; }
  });
  if(n===0){ teamFormCache[teamId]=null; return null; }
  const overallAvgScored=scored/n, overallAvgConceded=conceded/n;
  // Une équipe peut être bien plus forte à domicile qu'à l'extérieur (ou l'inverse) : on sépare les
  // 2 formes. Mais avec seulement ~5 matchs domicile et 5 extérieur sur 10 matchs, l'échantillon est
  // petit et bruité : on le mélange ("shrinkage") avec la moyenne globale, pondéré par le nombre de
  // matchs disponibles dans ce sous-groupe (poids équivalent à 2 matchs de moyenne globale).
  const shrink=(sum,cnt,overallAvg,pseudo=2)=> cnt>0 ? (sum+overallAvg*pseudo)/(cnt+pseudo) : overallAvg;
  const home={
    avgScored: shrink(hScored,hN,overallAvgScored),
    avgConceded: shrink(hConceded,hN,overallAvgConceded),
    n:hN
  };
  const away={
    avgScored: shrink(aScored,aN,overallAvgScored),
    avgConceded: shrink(aConceded,aN,overallAvgConceded),
    n:aN
  };
  const result={avgScored:overallAvgScored, avgConceded:overallAvgConceded, matches:n, home, away};
  teamFormCache[teamId]=result;
  return result;
}

// --- Journal technique mobile : capture les console.warn/error pour les afficher dans un panneau,
// puisqu'on ne peut pas ouvrir la console développeur sur téléphone.
let debugLog = [];
let debugUnread = 0;
const _origWarn = console.warn.bind(console);
const _origError = console.error.bind(console);
function pushDebugLog(level, args) {
  const msg = args.map(a=>{
    if (typeof a === 'string') return a;
    try { return JSON.stringify(a); } catch(e){ return String(a); }
  }).join(' ');
  const time = new Date().toLocaleTimeString('fr-FR');
  debugLog.push({level, text:`[${time}] ${level.toUpperCase()}: ${msg}`});
  if (debugLog.length > 100) debugLog.shift();
  debugUnread++;
  updateDebugBadge();
  const panel = document.getElementById('debugPanel');
  if (panel && panel.classList.contains('open')) renderDebugLog();
}
console.warn = function(...args){ pushDebugLog('warn', args); _origWarn(...args); };
console.error = function(...args){ pushDebugLog('error', args); _origError(...args); };
function updateDebugBadge(){
  const b=document.getElementById('debugBadge'); if(!b) return;
  if(debugUnread>0){ b.style.display='inline'; b.textContent=debugUnread>99?'99+':debugUnread; } else { b.style.display='none'; }
}
function renderDebugLog(){
  const list=document.getElementById('debugLogList'); if(!list) return;
  if(debugLog.length===0){ list.innerHTML='<div class="debug-empty">Aucun message pour l\'instant. Ouvre un match (surtout en direct) et appuie sur "Analyser" : si quelque chose ne va pas, ça s\'affichera ici.</div>'; return; }
  list.innerHTML=debugLog.slice().reverse().map(l=>`<div class="debug-log-entry${l.level==='error'?' err':''}">${l.text.replace(/</g,'&lt;')}</div>`).join('');
}
function toggleDebugPanel(){
  const panel=document.getElementById('debugPanel'); if(!panel) return;
  panel.classList.toggle('open');
  if(panel.classList.contains('open')){ renderDebugLog(); debugUnread=0; updateDebugBadge(); renderTrackerPanel(); renderVBTrackerPanel(); }
}
function clearDebugLog(){ debugLog=[]; renderDebugLog(); }
async function copyDebugLog(){
  const text=debugLog.map(l=>l.text).join('\n')||'(vide)';
  try{
    await navigator.clipboard.writeText(text);
    alert('Journal copié ! Tu peux le coller dans le chat.');
  }catch(e){
    alert('Copie automatique impossible sur ce navigateur. Sélectionne le texte manuellement dans le panneau.');
  }
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) throw new Error(JSON.stringify(json.errors));
  return json.response;
}
const LIVE_STATUSES = ["1H","HT","2H","ET","BT","P","SUSP","INT","LIVE"];
const DONE_STATUSES = ["FT","AET","PEN","AWD","WO"];
function isLive(f) { return LIVE_STATUSES.includes(f.fixture.status.short); }
function isFinished(f) { return DONE_STATUSES.includes(f.fixture.status.short); }
function isUpcoming(f) { return !isLive(f) && !isFinished(f); }
const LEAGUE_PRIORITY = ["world cup","fifa world cup","champions league","premier league","la liga","serie a","bundesliga","ligue 1","europa league","conference league","eredivisie","primeira liga","super lig","botola","nations league","afcon","copa america"];
function leaguePriority(n) { const name=(n||"").toLowerCase(); for(let i=0;i<LEAGUE_PRIORITY.length;i++) if(name.includes(LEAGUE_PRIORITY[i])) return i; return LEAGUE_PRIORITY.length; }
const COUNTRY_TO_ISO = {"morocco":"MA","world":"🌍","england":"GB","spain":"ES","italy":"IT","germany":"DE","france":"FR","portugal":"PT","netherlands":"NL","belgium":"BE","turkey":"TR","greece":"GR","switzerland":"CH","austria":"AT","denmark":"DK","sweden":"SE","norway":"NO","croatia":"HR","serbia":"RS","brazil":"BR","argentina":"AR","usa":"US","mexico":"MX","egypt":"EG","algeria":"DZ","tunisia":"TN","saudi-arabia":"SA","qatar":"QA","nigeria":"NG","senegal":"SN","cameroon":"CM","ghana":"GH","ivory coast":"CI","scotland":"GB","poland":"PL","czech-republic":"CZ"};
function isoToFlag(iso) { if(!iso||iso.length!==2) return "🏳️"; return String.fromCodePoint(...iso.toUpperCase().split("").map(c=>127397+c.charCodeAt(0))); }
function countryFlag(c) { const k=(c||"").toLowerCase(); if(k==="world") return "🌍"; const iso=COUNTRY_TO_ISO[k]; return iso?isoToFlag(iso):"🏳️"; }
function formatLeagueName(league,country) { const c=(country||"").trim(),l=(league||"").trim(); if(!c||c.toLowerCase()==="world") return l; if(l.toLowerCase().startsWith(c.toLowerCase())) return l; return `${c}. ${l}`; }

function oddsToProb(odds) { return odds > 1 ? 1/odds : 0; }
function normalizeProbabilities(probs) { const t=probs.reduce((s,p)=>s+p,0); return t===0?probs:probs.map(p=>p/t); }

function poissonProb(lambda, k) { let p=Math.exp(-lambda); for(let i=0;i<k;i++) p*=lambda/(i+1); return p; }
function buildScoreMatrix(lh, la, max=7) { const m=[]; for(let i=0;i<=max;i++){m[i]=[];for(let j=0;j<=max;j++)m[i][j]=poissonProb(lh,i)*poissonProb(la,j);} return m; }
// Marché "Handicap" 1xBet : "1 (h)" = équipe domicile gagne après ajout de h à son score,
// "2 (h)" = équipe extérieure gagne après ajout de h à son score. On réutilise la grille de scores.
function handicapProb(lh, la, team, h) {
  const M=buildScoreMatrix(lh,la,8);
  let p=0;
  for(let i=0;i<=8;i++) for(let j=0;j<=8;j++){
    const adjHome=team===1?i+h:i, adjAway=team===2?j+h:j;
    if(adjHome>adjAway) p+=M[i][j];
  }
  return p;
}

function estimateLambdas(pH, pD, pA) {
  function scoreAt(lh, la) {
    let ph=0,pd=0,pa=0; const M=buildScoreMatrix(lh,la,6);
    for(let i=0;i<=6;i++) for(let j=0;j<=6;j++){const p=M[i][j];if(i>j)ph+=p;else if(i===j)pd+=p;else pa+=p;}
    return Math.pow(ph-pH,2)+Math.pow(pd-pD,2)+Math.pow(pa-pA,2);
  }
  // Passe 1 : recherche grossière (pas 0.1) pour trouver une zone approximative
  let best={lh:1.3,la:1.1},bestErr=Infinity;
  for(let lh=0.2;lh<=4.0;lh+=0.1) for(let la=0.2;la<=4.0;la+=0.1){
    const e=scoreAt(lh,la);
    if(e<bestErr){bestErr=e;best={lh,la};}
  }
  // Passe 2 : recherche fine (pas 0.005) autour du meilleur point trouvé, pour éviter que des
  // matchs différents ne retombent tous sur les mêmes lambdas "arrondis" (cause des pronos répétés).
  const range=0.12, step=0.005;
  for(let lh=Math.max(0.05,best.lh-range); lh<=best.lh+range; lh+=step){
    for(let la=Math.max(0.05,best.la-range); la<=best.la+range; la+=step){
      const e=scoreAt(lh,la);
      if(e<bestErr){bestErr=e;best={lh,la};}
    }
  }
  return best;
}

function computeModelProbabilities(lh, la) {
  const M=buildScoreMatrix(lh,la), FH=0.44;
  const M1=buildScoreMatrix(lh*FH,la*FH), M2=buildScoreMatrix(lh*(1-FH),la*(1-FH));
  const max=7;
  let pH=0,pD=0,pA=0,pO05=0,pO15=0,pO25=0,pO35=0,pBTTS=0,pNilNil=0,pSD=0;
  let p1HO05=0,p1HO15=0,p2HO05=0,p2HO15=0,pHScore05=0,pHScore15=0,pAScore05=0,pAScore15=0,pWTNH=0,pWTNA=0;
  let pFH_H=0,pFH_D=0,pFH_A=0,pSH_H=0,pSH_D=0,pSH_A=0;
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p=M[i][j];
    if(i>j)pH+=p;else if(i===j)pD+=p;else pA+=p;
    if(i+j>0)pO05+=p;if(i+j>1)pO15+=p;if(i+j>2)pO25+=p;if(i+j>3)pO35+=p;
    if(i>0&&j>0)pBTTS+=p;if(i===0&&j===0)pNilNil+=p;if(i===j&&i>0)pSD+=p;
    if(i>0)pHScore05+=p;if(i>1)pHScore15+=p;if(j>0)pAScore05+=p;if(j>1)pAScore15+=p;
    if(i>j&&j===0)pWTNH+=p;if(j>i&&i===0)pWTNA+=p;
  }
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j], p2=M2[i][j];
    if(i+j>0)p1HO05+=p1;if(i+j>1)p1HO15+=p1;
    if(i+j>0)p2HO05+=p2;if(i+j>1)p2HO15+=p2;
    if(i>j)pFH_H+=p1;else if(i===j)pFH_D+=p1;else pFH_A+=p1;
    if(i>j)pSH_H+=p2;else if(i===j)pSH_D+=p2;else pSH_A+=p2;
  }
  const htftMap={};
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j];if(!p1)continue;const htR=i>j?'1':i===j?'X':'2';
    for(let k=0;k<=max;k++) for(let l=0;l<=max;l++){
      const p2=M2[k][l];if(!p2)continue;
      const ftR=(i+k)>(j+l)?'1':(i+k)===(j+l)?'X':'2';
      htftMap[htR+'/'+ftR]=(htftMap[htR+'/'+ftR]||0)+p1*p2;
    }
  }
  // "First Half/Second Half Result" (marché réel 1xBet) : résultat de la 1ère MT ET de la 2ème MT,
  // chacune prise ISOLÉMENT (pas cumulée comme HT-FT) — 9 combinaisons 1/1, 1/X, 1/2, X/1, X/X, X/2, 2/1, 2/X, 2/2.
  const fhshMap={};
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j];if(!p1)continue;const r1=i>j?'1':i===j?'X':'2';
    for(let k=0;k<=max;k++) for(let l=0;l<=max;l++){
      const p2=M2[k][l];if(!p2)continue;const r2=k>l?'1':k===l?'X':'2';
      fhshMap[r1+'/'+r2]=(fhshMap[r1+'/'+r2]||0)+p1*p2;
    }
  }
  let pWBH=0,pWBA=0,pDB=0,pBEH=0;
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j];if(!p1)continue;
    for(let k=0;k<=max;k++) for(let l=0;l<=max;l++){
      const p2=M2[k][l];if(!p2)continue;const w=p1*p2;
      if(i>j&&k>l)pWBH+=w;if(i<j&&k<l)pWBA+=w;if(i===j&&k===l)pDB+=w;if(i>0&&j>0&&k>0&&l>0)pBEH+=w;
    }
  }
  // Toutes les probabilités de score exact (pas juste 0-0), pour comparer à TOUS les scores que
  // 1xBet propose réellement dans son marché "Correct Score", plutôt qu'une liste devinée à l'avance.
  const exactScoreMap={};
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){ exactScoreMap[`${i}-${j}`]=M[i][j]; }
  return {pH,pD,pA,pO05,pO15,pO25,pO35,pBTTS,pNilNil,pSD,p1HO05,p1HO15,p2HO05,p2HO15,pHScore05,pHScore15,pAScore05,pAScore15,pWTNH,pWTNA,pWTNAny:pWTNH+pWTNA,htftMap,exactScoreMap,fhshMap,pWBH,pWBA,pDB,pBEH,pFH_H,pFH_D,pFH_A,pSH_H,pSH_D,pSH_A};
}

// Évite d'afficher plusieurs paris corrélés qui racontent la même histoire (ex: Under 1.5/2.5/3.5
// en même temps) : on ne garde que le meilleur edge par marché (ex: un seul "Total buts", un seul
// "HT-FT", etc.), plutôt que de multiplier des variantes du même avis sous-jacent.
function dedupeByMarket(bets){
  const bestByMarket={};
  bets.forEach(vb=>{
    if(!bestByMarket[vb.market] || vb.edge>bestByMarket[vb.market].edge) bestByMarket[vb.market]=vb;
  });
  return Object.values(bestByMarket);
}

function findValueBets(modelProbs, odds1xbet, homeName, awayName, lh, la) {
  const valueBets=[];
  function checkValue(market,pick,modelProb,odd1xbet){
    if(!odd1xbet||odd1xbet<=1)return;
    const impliedProb=oddsToProb(odd1xbet), edge=modelProb-impliedProb;
    if(edge>0.03){
      // On arrondit modèle et implicite d'abord, puis on calcule l'edge affiché à partir de ces
      // valeurs arrondies, pour que le badge corresponde toujours exactement à Modèle - Implicite.
      const mp100=Math.round(modelProb*100), ip100=Math.round(impliedProb*100);
      valueBets.push({market,pick,modelProb:mp100,impliedProb:ip100,odd:odd1xbet,edge:mp100-ip100});
    }
  }
  const o=odds1xbet;
  if(o.home1x2)checkValue('Résultat (1X2)',`Victoire ${homeName}`,modelProbs.pH,o.home1x2);
  if(o.draw1x2)checkValue('Résultat (1X2)','Match nul',modelProbs.pD,o.draw1x2);
  if(o.away1x2)checkValue('Résultat (1X2)',`Victoire ${awayName}`,modelProbs.pA,o.away1x2);
  if(o.dc1x)checkValue('Double Chance',`${homeName} ou Nul`,modelProbs.pH+modelProbs.pD,o.dc1x);
  if(o.dc12)checkValue('Double Chance',`${homeName} ou ${awayName}`,modelProbs.pH+modelProbs.pA,o.dc12);
  if(o.dcx2)checkValue('Double Chance',`Nul ou ${awayName}`,modelProbs.pD+modelProbs.pA,o.dcx2);
  if(o.over05)checkValue('Total buts','Over 0.5',modelProbs.pO05,o.over05);
  if(o.under05)checkValue('Total buts','Under 0.5',1-modelProbs.pO05,o.under05);
  if(o.over15)checkValue('Total buts','Over 1.5',modelProbs.pO15,o.over15);
  if(o.under15)checkValue('Total buts','Under 1.5',1-modelProbs.pO15,o.under15);
  if(o.over25)checkValue('Total buts','Over 2.5',modelProbs.pO25,o.over25);
  if(o.under25)checkValue('Total buts','Under 2.5',1-modelProbs.pO25,o.under25);
  if(o.over35)checkValue('Total buts','Over 3.5',modelProbs.pO35,o.over35);
  if(o.under35)checkValue('Total buts','Under 3.5',1-modelProbs.pO35,o.under35);
  if(o.bttsYes)checkValue('Les deux équipes marquent','Oui',modelProbs.pBTTS,o.bttsYes);
  if(o.bttsNo)checkValue('Les deux équipes marquent','Non',1-modelProbs.pBTTS,o.bttsNo);
  if(o.wtnHome)checkValue(`${homeName} gagne sans encaisser`,'Oui',modelProbs.pWTNH,o.wtnHome);
  if(o.wtnAway)checkValue(`${awayName} gagne sans encaisser`,'Oui',modelProbs.pWTNA,o.wtnAway);
  if(o.scoreDraw)checkValue('Match nul avec buts','Oui',modelProbs.pSD,o.scoreDraw);
  (o.exactScores||[]).forEach(es=>{
    const p=modelProbs.exactScoreMap[es.label];
    if(p!==undefined) checkValue('Score exact',es.label,p,es.odd);
  });
  if(o.ht_over05)checkValue('1ère MT Over 0.5','Oui',modelProbs.p1HO05,o.ht_over05);
  if(o.ht_under05)checkValue('1ère MT Under 0.5','Oui',1-modelProbs.p1HO05,o.ht_under05);
  if(o.ht_over15)checkValue('1ère MT Over 1.5','Oui',modelProbs.p1HO15,o.ht_over15);
  if(o.ht_under15)checkValue('1ère MT Under 1.5','Oui',1-modelProbs.p1HO15,o.ht_under15);
  if(o.sh_over05)checkValue('2ème MT Over 0.5','Oui',modelProbs.p2HO05,o.sh_over05);
  if(o.sh_over15)checkValue('2ème MT Over 1.5','Oui',modelProbs.p2HO15,o.sh_over15);
  if(o.homeScore05)checkValue(`${homeName} marque`,'Oui',modelProbs.pHScore05,o.homeScore05);
  if(o.awayScore05)checkValue(`${awayName} marque`,'Oui',modelProbs.pAScore05,o.awayScore05);
  // "First Half/Second Half Result" : on essaie plusieurs formats de libellé possibles (1/1, 1-1,
  // Home/Home...) car on ne peut pas garantir lequel 1xBet utilise exactement sans avoir pu tester en direct.
  const fhshLabelVariants={
    '1/1':[`${homeName}/${homeName}`],'1/X':[`${homeName}/Nul`],'1/2':[`${homeName}/${awayName}`],
    'X/1':[`Nul/${homeName}`],'X/X':['Nul/Nul'],'X/2':[`Nul/${awayName}`],
    '2/1':[`${awayName}/${homeName}`],'2/X':[`${awayName}/Nul`],'2/2':[`${awayName}/${awayName}`]
  };
  (o.fhshOdds||[]).forEach(fs=>{
    let p=modelProbs.fhshMap[fs.label]; // tente d'abord le format brut "1/1", "X/2", etc.
    if(p===undefined){
      // sinon cherche si le libellé correspond à une variante nommée (ex: "France/France")
      const key=Object.keys(fhshLabelVariants).find(k=>fhshLabelVariants[k].includes(fs.label));
      if(key) p=modelProbs.fhshMap[key];
    }
    if(p!==undefined) checkValue('1ère MT/2ème MT',fs.label,p,fs.odd);
  });
  const htftKeys={'1/1':`${homeName}/${homeName}`,'1/X':`${homeName}/Nul`,'X/X':'Nul/Nul','X/1':`Nul/${homeName}`,'X/2':`Nul/${awayName}`,'2/2':`${awayName}/${awayName}`,'2/X':`${awayName}/Nul`,'2/1':`${awayName}/${homeName}`,'1/2':`${homeName}/${awayName}`};
  Object.entries(htftKeys).forEach(([key,label])=>{if(o[`htft_${key}`])checkValue('HT-FT',label,modelProbs.htftMap[key]||0,o[`htft_${key}`]);});
  // "Total 1" / "Total 2" (buts d'une équipe précise, indépendamment de l'autre) : chaque équipe suit
  // sa propre loi de Poisson (lh pour l'équipe à domicile, la pour l'extérieur), donc pas besoin de la
  // grille croisée — juste la probabilité directe qu'elle marque plus/moins que la ligne proposée.
  function teamTotalProb(lambda, line, isOver){
    const k=Math.floor(line);
    let pUnderOrEqual=0;
    for(let n=0;n<=k;n++) pUnderOrEqual+=poissonProb(lambda,n);
    return isOver ? 1-pUnderOrEqual : pUnderOrEqual - (Number.isInteger(line)?poissonProb(lambda,line):0);
  }
  if(lh!==undefined&&la!==undefined){
    (o.team1Totals||[]).forEach(t=>{
      const m=t.label.match(/(Over|Under) ([\d.]+)/);
      if(m) checkValue(`Total ${homeName}`,t.label,teamTotalProb(lh,parseFloat(m[2]),m[1]==='Over'),t.odd);
    });
    (o.team2Totals||[]).forEach(t=>{
      const m=t.label.match(/(Over|Under) ([\d.]+)/);
      if(m) checkValue(`Total ${awayName}`,t.label,teamTotalProb(la,parseFloat(m[2]),m[1]==='Over'),t.odd);
    });
    (o.handicapOdds||[]).forEach(h=>{
      const p=handicapProb(lh,la,h.team,h.h);
      const teamName=h.team===1?homeName:awayName;
      const label=`${teamName} (${h.h>0?'+':''}${h.h})`;
      checkValue('Handicap',label,p,h.odd);
    });
  }
  return dedupeByMarket(valueBets).sort((a,b)=>b.edge-a.edge);
}

function parseOdds1xbet(oddsData, homeName, awayName) {
  if(!oddsData||oddsData.length===0)return null;
  let bk=null;
  for(const item of oddsData){const found=(item.bookmakers||[]).find(b=>b.id===BOOKMAKER_1XBET);if(found){bk=found;break;}}
  // Important : on ne prend JAMAIS les cotes d'un autre bookmaker en repli silencieux. Toute l'app
  // se présente comme "vs 1xBet" ; utiliser un autre bookmaker sans le dire fausserait le sens même
  // du value bet affiché (l'edge serait calculé contre la mauvaise cote).
  if(!bk)return null;
  const result={};
  const getBet=(betName,valueName)=>{const bet=bk.bets?.find(b=>b.name===betName);if(!bet)return null;const v=bet.values?.find(v=>v.value===valueName||v.value?.toLowerCase()===valueName?.toLowerCase());return v?parseFloat(v.odd):null;};
  result.home1x2=getBet('Match Winner','Home');result.draw1x2=getBet('Match Winner','Draw');result.away1x2=getBet('Match Winner','Away');
  result.dc1x=getBet('Double Chance','Home/Draw');result.dc12=getBet('Double Chance','Home/Away');result.dcx2=getBet('Double Chance','Draw/Away');
  ['0.5','1.5','2.5','3.5'].forEach(line=>{const key=line.replace('.','');result[`over${key}`]=getBet('Goals Over/Under',`Over ${line}`);result[`under${key}`]=getBet('Goals Over/Under',`Under ${line}`);});
  result.bttsYes=getBet('Both Teams Score','Yes');result.bttsNo=getBet('Both Teams Score','No');
  result.ht_over05=getBet('First Half - Goals Over/Under','Over 0.5');result.ht_under05=getBet('First Half - Goals Over/Under','Under 0.5');
  result.ht_over15=getBet('First Half - Goals Over/Under','Over 1.5');result.ht_under15=getBet('First Half - Goals Over/Under','Under 1.5');
  result.sh_over05=getBet('Second Half - Goals Over/Under','Over 0.5');result.sh_over15=getBet('Second Half - Goals Over/Under','Over 1.5');
  result.wtnHome=getBet('Win to Nil','Home');result.wtnAway=getBet('Win to Nil','Away');
  result.scoreDraw=getBet('Score - Both Teams To Score','Yes');
  // Tous les scores exacts que 1xBet propose réellement pour ce match (variable selon le match :
  // certains n'ont que 8-10 scores listés, d'autres 20+), plutôt qu'une liste de scores devinée à l'avance.
  const exactScoreBet=bk.bets?.find(b=>b.name==='Exact Score'||b.name==='Correct Score');
  result.exactScores=exactScoreBet ? exactScoreBet.values.map(v=>{
    const odd=parseFloat(v.odd);
    return isNaN(odd)?null:{label:v.value,odd};
  }).filter(Boolean) : [];
  result.homeScore05=getBet(`${homeName} Total Goals`,'Over 0.5');result.awayScore05=getBet(`${awayName} Total Goals`,'Over 0.5');
  // Résultat de chaque mi-temps séparément (Victoire/Nul/Défaite en 1ère et 2ème MT). Noms de marché
  // devinés par analogie avec 'Match Winner' — à vérifier via le journal technique si jamais absents.
  // Confirmé via une capture réelle de 1xBet : le marché s'appelle "First Half/Second Half Result",
  // avec 9 combinaisons (résultat de la 1ère MT / résultat de la 2ème MT, chacune prise isolément,
  // pas cumulée comme pour HT-FT). On récupère toutes celles que 1xBet propose pour ce match.
  const fhshBet=bk.bets?.find(b=>b.name==='First Half/Second Half Result');
  result.fhshOdds=fhshBet ? fhshBet.values.map(v=>{
    const odd=parseFloat(v.odd);
    return isNaN(odd)?null:{label:v.value,odd};
  }).filter(Boolean) : [];
  if(fhshBet===undefined){
    console.warn(`[pronos] Marché 'First Half/Second Half Result' introuvable pour ${homeName} vs ${awayName}. Marchés disponibles :`, (bk.bets||[]).map(b=>b.name).join(', '));
  }
  // "Total 1" / "Total 2" (buts d'une équipe précise, toutes lignes proposées par 1xBet)
  const parseTeamTotal=(marketName)=>{
    const bet=bk.bets?.find(b=>b.name===marketName);
    return bet ? bet.values.map(v=>{
      const odd=parseFloat(v.odd);
      return isNaN(odd)?null:{label:v.value,odd};
    }).filter(Boolean) : [];
  };
  result.team1Totals=parseTeamTotal('Total 1');
  result.team2Totals=parseTeamTotal('Total 2');
  // "Handicap" : format "1 (-3.5)" / "2 (3.5)" etc. (équipe 1 ou 2 + valeur du handicap appliqué)
  const handicapBet=bk.bets?.find(b=>b.name==='Handicap');
  result.handicapOdds=handicapBet ? handicapBet.values.map(v=>{
    const odd=parseFloat(v.odd);
    const m=v.value.match(/^(1|2)\s*\(([+-]?[\d.]+)\)$/);
    if(!m||isNaN(odd)) return null;
    return {team:parseInt(m[1]),h:parseFloat(m[2]),odd,label:v.value};
  }).filter(Boolean) : [];
  return result;
}

function renderValueBet(vb) {
  let cls,badgeCls,label;
  if(vb.edge>=10){cls='value-high';badgeCls='high';label=`🔥 +${vb.edge}%`;}
  else if(vb.edge>=6){cls='value-mid';badgeCls='mid';label=`⚡ +${vb.edge}%`;}
  else{cls='value-low';badgeCls='low';label=`+${vb.edge}%`;}
  return `<div class="value-item ${cls}"><div class="value-market">${vb.market}</div><div class="value-pick">${vb.pick}</div><div class="value-row"><div class="value-odds">Cote: <b>${vb.odd}</b> · Implicite: <b>${vb.impliedProb}%</b> · Modèle: <b>${vb.modelProb}%</b></div><span class="value-badge ${badgeCls}">${label}</span></div></div>`;
}

// --- Suivi prospectif des prédictions : on ne peut pas backtester sur des mois de données passées
// (API-Football ne garde les cotes que 7 jours après le coup d'envoi), donc on enregistre chaque
// prédiction dès maintenant (cotes ET forme séparément) et on la compare au résultat réel une fois
// le match terminé, pour savoir empiriquement quel ratio cotes/forme est le plus fiable.
// --- Résultat final d'un match, mis en cache et partagé entre les différents suivis (évite de
// refaire un appel API pour le même match si plusieurs trackers ont besoin du même résultat).
const fixtureResultCache = {};
async function getFixtureResult(fixtureId) {
  if (Object.prototype.hasOwnProperty.call(fixtureResultCache, fixtureId)) return fixtureResultCache[fixtureId];
  try {
    const data = await apiGet(`/fixtures?id=${fixtureId}`);
    const f = data && data[0];
    if (!f || f.goals.home===null || f.goals.away===null || !DONE_STATUSES.includes(f.fixture.status.short)) {
      fixtureResultCache[fixtureId]=null; return null;
    }
    const result = {home:f.goals.home, away:f.goals.away};
    fixtureResultCache[fixtureId]=result;
    return result;
  } catch(e) {
    console.warn(`[pronos] Résultat indisponible pour fixture ${fixtureId}:`, e.message);
    return null;
  }
}

const TRACKER_KEY='pronosTracker_v1';
const RATIO_CANDIDATES=[1.0,0.85,0.7,0.5,0.3,0.15,0.0]; // poids sur les cotes (reste = poids sur la forme)
function loadTracker(){ try{ return JSON.parse(localStorage.getItem(TRACKER_KEY)||'[]'); }catch(e){ return []; } }
function saveTracker(arr){ try{ localStorage.setItem(TRACKER_KEY, JSON.stringify(arr)); }catch(e){ console.warn('[pronos] Sauvegarde du suivi impossible:', e.message); } }
function recordPrediction(fixture, oddsLh, oddsLa, formLh, formLa){
  const tracker=loadTracker();
  if(tracker.find(t=>t.fixtureId===fixture.fixture.id)) return; // déjà enregistré
  tracker.push({
    fixtureId: fixture.fixture.id,
    homeName: fixture.teams.home.name, awayName: fixture.teams.away.name,
    kickoff: fixture.fixture.date,
    oddsLh, oddsLa, formLh, formLa,
    resolved:false, actualResult:null
  });
  if(tracker.length>500) tracker.splice(0, tracker.length-500); // évite de saturer le stockage local
  saveTracker(tracker);
}
async function evaluateTracker(){
  const tracker=loadTracker();
  const unresolved=tracker.filter(t=>!t.resolved);
  let apiCalls=0;
  for(const rec of unresolved){
    if(apiCalls>=20) break; // on limite le nombre d'appels API par vérification
    const kickoff=new Date(rec.kickoff);
    if(Date.now()-kickoff.getTime()<2.5*3600*1000) continue; // match probablement pas encore fini
    apiCalls++;
    const result=await getFixtureResult(rec.fixtureId);
    if(!result) continue;
    rec.actualResult = result.home>result.away?'H':result.home===result.away?'D':'A';
    rec.resolved=true;
  }
  saveTracker(tracker);
  return tracker;
}
function computeBrierByRatio(tracker){
  const resolved=tracker.filter(t=>t.resolved);
  return RATIO_CANDIDATES.map(w=>{
    let sum=0, n=0;
    resolved.forEach(rec=>{
      const lh=rec.oddsLh*w+rec.formLh*(1-w), la=rec.oddsLa*w+rec.formLa*(1-w);
      const mp=computeModelProbabilities(lh,la);
      const actual={H:[1,0,0],D:[0,1,0],A:[0,0,1]}[rec.actualResult];
      const pred=[mp.pH,mp.pD,mp.pA];
      let brier=0; for(let i=0;i<3;i++) brier+=Math.pow(pred[i]-actual[i],2);
      sum+=brier; n++;
    });
    return {weight:w, avgBrier:n>0?sum/n:null, n};
  });
}
function renderTrackerPanel(){
  const el=document.getElementById('trackerPanel'); if(!el) return;

    return;
  }
  const scores=computeBrierByRatio(tracker);

  const best=valid.reduce((b,s)=>s.avgBrier<b.avgBrier?s:b, valid[0]);
  el.innerHTML=`<div style="font-size:11px;color:#8a9ab8;margin-bottom:8px;">${resolved.length} match${resolved.length>1?'s':''} résolu${resolved.length>1?'s':''} sur ${tracker.length} suivi${tracker.length>1?'s':''} · score de Brier, plus bas = meilleur</div>`+
    scores.map(s=>`<div class="debug-log-entry${s.weight===best.weight?' best':''}">Cotes ${Math.round(s.weight*100)}% / Forme ${Math.round((1-s.weight)*100)}% → Brier ${s.avgBrier!==null?s.avgBrier.toFixed(4):'—'} (n=${s.n})</div>`).join('');
}

// --- Suivi de rentabilité réelle des value bets détectés (pas juste la précision des probabilités).
// On enregistre chaque value bet affiché (marché, pick, cote, edge), et une fois le match terminé,
// on vérifie s'il aurait gagné pour calculer un ROI réel en mise plate (1 unité par pari).
const VB_TRACKER_KEY='pronosValueBetTracker_v1';
function loadVBTracker(){ try{ return JSON.parse(localStorage.getItem(VB_TRACKER_KEY)||'[]'); }catch(e){ return []; } }
function saveVBTracker(arr){ try{ localStorage.setItem(VB_TRACKER_KEY, JSON.stringify(arr)); }catch(e){ console.warn('[pronos] Sauvegarde du suivi value bets impossible:', e.message); } }
function recordValueBet(fixture, vb){
  const tracker=loadVBTracker();
  const key=`${fixture.fixture.id}|${vb.market}|${vb.pick}`;
  if(tracker.find(t=>t.key===key)) return; // déjà enregistré
  tracker.push({
    key, fixtureId:fixture.fixture.id,
    homeName:fixture.teams.home.name, awayName:fixture.teams.away.name,
    kickoff:fixture.fixture.date,
    market:vb.market, pick:vb.pick, odd:vb.odd, edge:vb.edge,
    resolved:false, won:null
  });
  if(tracker.length>800) tracker.splice(0, tracker.length-800);
  saveVBTracker(tracker);
}
// Détermine si un value bet aurait gagné, à partir du score final. Retourne null si le marché n'est
// pas gérable de façon fiable ici (HT-FT, mi-temps, etc.) : ces paris ne sont alors pas comptés dans
// le ROI plutôt que d'être évalués au hasard.
function evaluateBetOutcome(vb, finalHome, finalAway, homeName, awayName){
  const tot=finalHome+finalAway;
  if(vb.market==='Résultat (1X2)'){
    if(vb.pick===`Victoire ${homeName}`) return finalHome>finalAway;
    if(vb.pick==='Match nul') return finalHome===finalAway;
    if(vb.pick===`Victoire ${awayName}`) return finalAway>finalHome;
  }
  if(vb.market==='Double Chance'){
    if(vb.pick===`${homeName} ou Nul`) return finalHome>=finalAway;
    if(vb.pick===`${homeName} ou ${awayName}`) return finalHome!==finalAway;
    if(vb.pick===`Nul ou ${awayName}`) return finalAway>=finalHome;
  }
  if(vb.market==='Total buts'){
    const m=vb.pick.match(/(Over|Under) ([\d.]+)/);
    if(m){ const line=parseFloat(m[2]); return m[1]==='Over' ? tot>line : tot<line; }
  }
  if(vb.market==='Les deux équipes marquent'){
    const btts=finalHome>0 && finalAway>0;
    return vb.pick==='Oui' ? btts : !btts;
  }
  if(vb.market===`${homeName} gagne sans encaisser`) return finalHome>finalAway && finalAway===0;
  if(vb.market===`${awayName} gagne sans encaisser`) return finalAway>finalHome && finalHome===0;
  return null;
}
async function evaluateVBTracker(){
  const tracker=loadVBTracker();
  const unresolved=tracker.filter(t=>!t.resolved);
  let apiCalls=0;
  for(const rec of unresolved){
    if(apiCalls>=20) break;
    const kickoff=new Date(rec.kickoff);
    if(Date.now()-kickoff.getTime()<2.5*3600*1000) continue;
    apiCalls++;
    const result=await getFixtureResult(rec.fixtureId);
    if(!result) continue;
    const won=evaluateBetOutcome(rec, result.home, result.away, rec.homeName, rec.awayName);
    if(won===null){ rec.resolved=true; rec.skipped=true; continue; } // marché non évaluable, exclu du ROI
    rec.resolved=true; rec.won=won;
  }
  saveVBTracker(tracker);
  return tracker;
}
function computeROI(tracker){
  const evaluated=tracker.filter(t=>t.resolved && !t.skipped);
  let staked=0, profit=0, wins=0;
  evaluated.forEach(rec=>{
    staked+=1;
    profit += rec.won ? (rec.odd-1) : -1;
    if(rec.won) wins++;
  });
  return {n:evaluated.length, staked, profit, roi:staked>0?profit/staked*100:null, winRate:evaluated.length>0?wins/evaluated.length*100:null};
}
function computeROIByEdgeTier(tracker){
  const evaluated=tracker.filter(t=>t.resolved && !t.skipped);
  const tiers=[{label:'🔥 +10%',test:e=>e>=10},{label:'⚡ +6-10%',test:e=>e>=6&&e<10},{label:'+3-6%',test:e=>e<6}];
  return tiers.map(t=>{
    const subset=evaluated.filter(r=>t.test(r.edge));
    let profit=0; subset.forEach(r=>profit+=r.won?(r.odd-1):-1);
    return {label:t.label, n:subset.length, roi:subset.length>0?profit/subset.length*100:null};
  });
}
function renderVBTrackerPanel(){
  const el=document.getElementById('vbTrackerPanel'); if(!el) return;
  const tracker=loadVBTracker();
  const evaluated=tracker.filter(t=>t.resolved && !t.skipped);
  const pending=tracker.filter(t=>!t.resolved);
  if(evaluated.length<10){
    el.innerHTML=`<div class="debug-empty">Échantillon encore trop faible (${evaluated.length} pari${evaluated.length>1?'s':''} évalué${evaluated.length>1?'s':''} sur ${tracker.length} enregistré${tracker.length>1?'s':''}, ${pending.length} en attente). Continue à analyser des matchs avant-match avec value bets détectés.</div>`;
    return;
  }
  const global=computeROI(tracker);
  const byTier=computeROIByEdgeTier(tracker);
  el.innerHTML=`<div style="font-size:11px;color:#8a9ab8;margin-bottom:8px;">${global.n} pari${global.n>1?'s':''} évalué${global.n>1?'s':''} (mise plate 1 unité/pari) · taux de réussite ${global.winRate.toFixed(0)}%</div>`+
    `<div class="debug-log-entry${global.roi>0?' best':' err'}">ROI global : ${global.roi>=0?'+':''}${global.roi.toFixed(1)}% (n=${global.n})</div>`+
    byTier.map(t=>`<div class="debug-log-entry">${t.label} → ROI ${t.roi!==null?(t.roi>=0?'+':'')+t.roi.toFixed(1)+'%':'—'} (n=${t.n})</div>`).join('');
}
async function refreshVBTrackerPanel(){
  const el=document.getElementById('vbTrackerPanel');
  if(el) el.innerHTML='<div class="debug-empty">Vérification des résultats en cours...</div>';

}

async function getCalibratedModel(fixture) {
  const fid = fixture.fixture.id;
  if (Object.prototype.hasOwnProperty.call(fixtureOddsCache, fid)) return fixtureOddsCache[fid];
  const home=fixture.teams.home, away=fixture.teams.away;
  let oddsData=null;
  try {
    oddsData = await apiGet(`/odds?fixture=${fid}&bookmaker=${BOOKMAKER_1XBET}`);
  } catch(e) {
    console.warn(`[pronos] Cotes 1xBet indisponibles pour fixture ${fid} (${home.name} vs ${away.name}):`, e.message);
  }
  const parsed = parseOdds1xbet(oddsData, home.name, away.name);
  const [homeForm, awayForm] = await Promise.all([getTeamRecentForm(home.id), getTeamRecentForm(away.id)]);
  const hasForm = homeForm && awayForm;

  if (parsed && parsed.home1x2) {
    // Cas idéal : cotes 1xBet disponibles. On calibre dessus, puis on mélange légèrement avec la
    // forme récente (70% cotes / 30% forme) pour capter un changement de forme que la cote n'a pas
    // encore totalement intégré (petite série, blessure...), sans pour autant s'en écarter trop.
    const rawH=oddsToProb(parsed.home1x2), rawD=oddsToProb(parsed.draw1x2||2), rawA=oddsToProb(parsed.away1x2);
    const [nH,nD,nA]=normalizeProbabilities([rawH,rawD,rawA]);
    const {lh:oddsLh,la:oddsLa}=estimateLambdas(nH,nD,nA);
    let lh=oddsLh, la=oddsLa, source='odds';
    if (hasForm) {
      const formLh=(homeForm.home.avgScored+awayForm.away.avgConceded)/2;
      const formLa=(awayForm.away.avgScored+homeForm.home.avgConceded)/2;
      recordPrediction(fixture, oddsLh, oddsLa, formLh, formLa);
      // Le suivi (panneau Debug > Fiabilité cotes vs forme) montre de façon constante, sur un
      // échantillon croissant, que mélanger la forme récente dégrade la précision par rapport aux
      // cotes seules (100% cotes reste toujours le meilleur score de Brier). On arrête donc d'appliquer
      // ce mélange aux probabilités affichées, tout en continuant d'enregistrer les prédictions pour
      // vérifier que ça reste vrai sur un échantillon encore plus grand.
    }
    const result={lh,la,parsed,source};
    fixtureOddsCache[fid]=result;
    return result;
  }

  if (hasForm) {
    // Pas de cotes 1xBet, mais on a l'historique des 2 équipes : on estime les lambdas à partir de
    // l'attaque de l'équipe à domicile SPÉCIFIQUEMENT à domicile, et l'attaque de l'équipe à
    // l'extérieur SPÉCIFIQUEMENT à l'extérieur (une équipe peut être bien plus forte chez elle
    // qu'en déplacement, ou l'inverse) — plus précis qu'une simple moyenne globale.
    const lh=(homeForm.home.avgScored+awayForm.away.avgConceded)/2;
    const la=(awayForm.away.avgScored+homeForm.home.avgConceded)/2;
    console.warn(`[pronos] Forme domicile/extérieur pour fixture ${fid} : ${home.name} à domicile (buts marqués ${homeForm.home.avgScored.toFixed(2)}/match sur ${homeForm.home.n} matchs, moyenne globale ${homeForm.avgScored.toFixed(2)}) | ${away.name} à l'extérieur (buts marqués ${awayForm.away.avgScored.toFixed(2)}/match sur ${awayForm.away.n} matchs, moyenne globale ${awayForm.avgScored.toFixed(2)})`);
    const result={lh,la,parsed:null,source:'form'};
    fixtureOddsCache[fid]=result;
    return result;
  }

  fixtureOddsCache[fid] = null;
  return null;
}

function computeRemainingMarketProbs(hG, aG, lhRem, laRem) {
  const M = buildScoreMatrix(lhRem, laRem, 8);
  let pH=0,pD=0,pA=0,pO05=0,pO15=0,pO25=0,pO35=0,pO45=0,pO55=0,pBTTS=0,pWTNH=0,pWTNA=0,pHomeScores=0,pAwayScores=0;
  for(let i=0;i<=8;i++) for(let j=0;j<=8;j++){
    const p=M[i][j], fh=hG+i, fa=aG+j, tot=fh+fa;
    if(fh>fa)pH+=p; else if(fh===fa)pD+=p; else pA+=p;
    if(tot>0)pO05+=p; if(tot>1)pO15+=p; if(tot>2)pO25+=p; if(tot>3)pO35+=p; if(tot>4)pO45+=p; if(tot>5)pO55+=p;
    if(fh>0&&fa>0)pBTTS+=p;
    if(fh>0)pHomeScores+=p; if(fa>0)pAwayScores+=p;
    if(fh>fa&&fa===0)pWTNH+=p;
    if(fa>fh&&fh===0)pWTNA+=p;
  }
  return {pH,pD,pA,pO05,pO15,pO25,pO35,pO45,pO55,pBTTS,pWTNH,pWTNA,pHomeScores,pAwayScores};
}

// Cotes live 1xBet (endpoint /odds/live, distinct du /odds pré-match).
// La structure exacte n'est pas garantie identique au pré-match : on tente de réutiliser le même
// parseur (même schéma probable : bookmakers > bets > values), et on logue la réponse brute si ça échoue,
// pour pouvoir ajuster le parseur si 1xBet/API-Football renvoie un format différent en live.
async function getLiveOdds1xbet(fixture) {
  const fid = fixture.fixture.id;
  const home=fixture.teams.home, away=fixture.teams.away;
  let data=null;
  try {
    data = await apiGet(`/odds/live?fixture=${fid}`);
  } catch(e) {
    console.warn(`[pronos] /odds/live indisponible pour fixture ${fid} (${home.name} vs ${away.name}):`, e.message);
    return null;
  }
  if (!data || data.length===0) {
    console.warn(`[pronos] /odds/live vide pour fixture ${fid} (${home.name} vs ${away.name})`);
    return null;
  }
  const parsed = parseOdds1xbet(data, home.name, away.name);
  if (!parsed || !parsed.home1x2) {
    console.warn(`[pronos] /odds/live : structure inattendue pour fixture ${fid}, réponse brute :`, JSON.stringify(data).slice(0,3000));
    return null;
  }
  return parsed;
}

function findLiveValueBets(mp, liveOdds, homeName, awayName) {
  const valueBets=[];
  function checkValue(market,pick,modelProb,odd){
    if(!odd||odd<=1||modelProb===undefined)return;
    const impliedProb=oddsToProb(odd), edge=modelProb-impliedProb;
    if(edge>0.03){
      const mp100=Math.round(modelProb*100), ip100=Math.round(impliedProb*100);
      valueBets.push({market,pick,modelProb:mp100,impliedProb:ip100,odd,edge:mp100-ip100});
    }
  }
  const o=liveOdds;
  if(o.home1x2)checkValue('Résultat (1X2)',`Victoire ${homeName}`,mp.pH,o.home1x2);
  if(o.draw1x2)checkValue('Résultat (1X2)','Match nul',mp.pD,o.draw1x2);
  if(o.away1x2)checkValue('Résultat (1X2)',`Victoire ${awayName}`,mp.pA,o.away1x2);
  if(o.over05)checkValue('Total buts','Over 0.5',mp.pO05,o.over05);
  if(o.under05)checkValue('Total buts','Under 0.5',1-mp.pO05,o.under05);
  if(o.over15)checkValue('Total buts','Over 1.5',mp.pO15,o.over15);
  if(o.under15)checkValue('Total buts','Under 1.5',1-mp.pO15,o.under15);
  if(o.over25)checkValue('Total buts','Over 2.5',mp.pO25,o.over25);
  if(o.under25)checkValue('Total buts','Under 2.5',1-mp.pO25,o.under25);
  if(o.over35)checkValue('Total buts','Over 3.5',mp.pO35,o.over35);
  if(o.under35)checkValue('Total buts','Under 3.5',1-mp.pO35,o.under35);
  if(o.bttsYes)checkValue('BTTS (les 2 marquent)','Oui',mp.pBTTS,o.bttsYes);
  if(o.bttsNo)checkValue('BTTS (les 2 marquent)','Non',1-mp.pBTTS,o.bttsNo);
  if(o.wtnHome)checkValue(`${homeName} gagne sans encaisser`,'Oui',mp.pWTNH,o.wtnHome);
  if(o.wtnAway)checkValue(`${awayName} gagne sans encaisser`,'Oui',mp.pWTNA,o.wtnAway);
  return dedupeByMarket(valueBets).sort((a,b)=>b.edge-a.edge);
}

async function showPredictions(fixture,container,btn) {
  const live=isLive(fixture);
  if(!live&&container.dataset.loaded==="true"){
    container.style.display=container.style.display==="none"?"block":"none";
    btn.textContent=container.style.display==="none"?"👁 Analyser":"🙈 Masquer";
    if(matchUIState[fixture.fixture.id]) matchUIState[fixture.fixture.id].expanded = container.style.display!=="none";
    return;
  }
  btn.textContent="🔄 Analyse...";btn.disabled=true;
  try {
    const home=fixture.teams.home,away=fixture.teams.away;let html="";
    console.warn(`[pronos] Analyse fixture ${fixture.fixture.id} : ${home.name} (id ${home.id}) vs ${away.name} (id ${away.id})`);
    if(live) {
      const elapsed=fixture.fixture.status.elapsed??45,remaining=Math.max(0,90-elapsed);
      const hG=fixture.goals.home??0,aG=fixture.goals.away??0;
      let ls=null;
      try{
        const sr=await apiGet(`/fixtures/statistics?fixture=${fixture.fixture.id}`);
        if(sr&&sr.length>=2){const gS=(ts,t)=>{const s=ts.statistics.find(s=>s.type===t);return s?(parseInt(s.value)||0):0;};const hS=sr.find(t=>t.team.id===home.id)||sr[0],aS=sr.find(t=>t.team.id===away.id)||sr[1];ls={hP:gS(hS,"Ball Possession")||50,aP:gS(aS,"Ball Possession")||50,hSh:gS(hS,"Total Shots"),aSh:gS(aS,"Total Shots"),hShOn:gS(hS,"Shots on Goal"),aShOn:gS(aS,"Shots on Goal"),hC:gS(hS,"Corner Kicks"),aC:gS(aS,"Corner Kicks")};}
      }catch(e){
        console.warn(`[pronos] Stats live indisponibles pour fixture ${fixture.fixture.id} (${home.name} vs ${away.name}):`, e.message);
      }
      html=`<div class="live-header-note">🔴 ${elapsed}' | Score: ${hG}-${aG}</div>`;
      if(ls)html+=`<div class="stats-box">📊 <b>${home.name}</b>: ${ls.hP}% poss · ${ls.hSh} tirs (${ls.hShOn} cadrés) · ${ls.hC} corners<br>📊 <b>${away.name}</b>: ${ls.aP}% poss · ${ls.aSh} tirs (${ls.aShOn} cadrés) · ${ls.aC} corners</div>`;

      const cal = await getCalibratedModel(fixture);
      let pH,pD,pA,extraRows=[],liveValueBets=null;
      if (cal) {
        if(cal.source==='form') html+=`<div class="no-odds" style="padding:4px 0 8px;text-align:left;">📈 Cotes 1xBet indisponibles : modèle basé sur la forme récente des 2 équipes.</div>`;
        else if(cal.source==='odds+form') html+=`<div class="no-odds" style="padding:4px 0 8px;text-align:left;">🎯 Modèle basé sur les cotes 1xBet, affiné avec la forme récente.</div>`;
        // Ancré sur le modèle Poisson pré-match (calibré sur les cotes 1xBet et/ou la forme récente) :
        // on simule uniquement les buts du temps restant, puis on les ajoute au score actuel.
        const frac = remaining/90;
        const dom = ls ? (ls.hP-50)/100 : 0;
        // La possession/domination influence légèrement la répartition des buts restants entre les 2 équipes
        const lhRem = Math.max(0.02, cal.lh*frac*(1+dom*0.3));
        const laRem = Math.max(0.02, cal.la*frac*(1-dom*0.3));
        const mp = computeRemainingMarketProbs(hG, aG, lhRem, laRem);
        pH=mp.pH;pD=mp.pD;pA=mp.pA;

        // Tentative de comparaison à de vraies cotes live 1xBet (edge réel, comme en pré-match)
        const liveOdds = await getLiveOdds1xbet(fixture);
        if (liveOdds) liveValueBets = findLiveValueBets(mp, liveOdds, home.name, away.name);

        // On ne garde que les marchés encore réellement incertains (ni quasi acquis, ni quasi exclus par le score actuel)
        const isOpen = p => p>0.04 && p<0.96;
        const candidates=[
          {label:'Plus de 1.5 but (total)',p:mp.pO15},
          {label:'Plus de 2.5 but (total)',p:mp.pO25},
          {label:'Plus de 3.5 but (total)',p:mp.pO35},
          {label:'Plus de 4.5 but (total)',p:mp.pO45},
          {label:'Plus de 5.5 but (total)',p:mp.pO55},
          {label:'Les deux équipes marquent',p:mp.pBTTS},
          {label:`${home.name} ${hG>0?'marque encore':'marque'}`,p:mp.pHomeScores},
          {label:`${away.name} ${aG>0?'marque encore':'marque'}`,p:mp.pAwayScores},
          {label:`${home.name} gagne sans encaisser`,p:mp.pWTNH},
          {label:`${away.name} gagne sans encaisser`,p:mp.pWTNA},
        ].filter(r=>isOpen(r.p));
        // Priorité aux marchés les plus incertains (proches de 50%), qui sont les plus utiles à suivre en live
        candidates.sort((a,b)=>Math.abs(a.p-0.5)-Math.abs(b.p-0.5));
        extraRows = candidates.slice(0,4);
        // Si tout est déjà décidé par le score actuel (gros score, fin de match...), on ne force plus
        // l'affichage d'un marché déjà résolu : le 1X2 reste seul, c'est plus honnête.
      } else {
        // Repli si les cotes 1xBet ne sont pas disponibles : heuristique basée sur score/temps/possession
        const sd=hG-aG, dom = ls?(ls.hP-50)/100:0;
        if(remaining<=5){pH=sd>0?0.93:sd<0?0.03:0.12;pD=sd===0?0.82:0.05;pA=sd<0?0.93:sd>0?0.03:0.12;}
        else if(remaining<=20){pH=sd>0?0.75:sd<0?0.12:0.28+dom*0.25;pD=sd===0?0.48:0.13;pA=sd<0?0.75:sd>0?0.12:0.24-dom*0.25;}
        else if(remaining<=45){pH=sd>0?0.58:sd<0?0.22:0.33+dom*0.15;pD=sd===0?0.38:0.20;pA=sd<0?0.58:sd>0?0.22:0.29-dom*0.15;}
        else{pH=sd>0?0.48:sd<0?0.28:0.35+dom*0.1;pD=sd===0?0.30:0.22;pA=sd<0?0.48:sd>0?0.28:0.32-dom*0.1;}
        const sR=pH+pD+pA;pH/=sR;pD/=sR;pA/=sR;
        // Avant, le taux de but observé (souvent instable en tout début de match) était extrapolé
        // linéairement sur tout le temps restant, ce qui donnait des projections absurdes (ex: 1 but
        // à la 11e minute → 8 buts projetés sur 90 min). On mélange maintenant ce taux avec une
        // moyenne de référence (2.6 buts/match), pondérée par un "temps équivalent" de 20 minutes,
        // puis on calcule une vraie probabilité Poisson sur les buts restants au lieu d'une règle de trois.
        const tG=hG+aG;
        // Quand les stats live existent, le volume de tirs cadrés est un signal plus stable que le
        // nombre de buts déjà marqués (le but est un évènement rare et bruité, surtout tôt dans le match) :
        // on estime un "rythme d'attaque" à partir des tirs, et on prend le plus informatif des deux.
        const xgSoFar = ls ? (ls.hShOn*0.3 + ls.aShOn*0.3 + Math.max(0,ls.hSh-ls.hShOn)*0.04 + Math.max(0,ls.aSh-ls.aShOn)*0.04) : tG;
        const paceGoals = ls ? Math.max(tG, xgSoFar) : tG;
        const priorRatePerMin=2.6/90, priorMinutes=20;
        const effectiveRate=(paceGoals+priorRatePerMin*priorMinutes)/(elapsed+priorMinutes);
        const lambdaRemaining=effectiveRate*remaining;
        function pOverLine(line){
          const goalsNeeded=Math.max(0,Math.floor(line)+1-tG); // buts restants nécessaires pour dépasser cette ligne
          if(tG>line) return 1; // déjà dépassée par le score actuel : ce n'est plus une prédiction, c'est un fait
          let pUnder=0;
          for(let k=0;k<goalsNeeded;k++) pUnder+=poissonProb(lambdaRemaining,k);
          return Math.max(0.05,Math.min(0.95,1-pUnder));
        }
        const isOpenOU = p => p>0.04 && p<0.96;
        const ouCandidates=[1.5,2.5,3.5,4.5].map(line=>({label:`Plus de ${line} but (total)`,p:pOverLine(line)})).filter(r=>isOpenOU(r.p));
        // On garde la ligne la plus informative (la plus proche de 50%) ; si toutes les lignes sont déjà
        // décidées par le score actuel (ex: 2-2 rend "+2.5" trivialement vrai), on ne montre plus ça
        // comme un "pari" puisque ce n'est plus une prédiction.
        ouCandidates.sort((a,b)=>Math.abs(a.p-0.5)-Math.abs(b.p-0.5));
        extraRows=ouCandidates.slice(0,2);
        html+=`<div class="no-odds" style="padding:8px 0;text-align:left;">⚠️ Cotes 1xBet indisponibles : estimation basée sur le score/temps${ls?' + statistiques live':''} uniquement.</div>`;
        if(!ls){
          // Ni cotes, ni stats : la fiabilité est nettement plus faible. On le dit clairement plutôt
          // que d'afficher un pourcentage avec une fausse impression de précision, et on resserre
          // l'intervalle affiché pour ne pas paraître trop catégorique.
          html+=`<div class="no-odds" style="padding:4px 0 8px;text-align:left;color:#9b2c2c;">📉 Aucune statistique live disponible non plus pour ce match : fiabilité réduite, à prendre avec prudence.</div>`;
          pH=Math.max(0.12,Math.min(0.80,pH));pD=Math.max(0.12,Math.min(0.50,pD));pA=Math.max(0.12,Math.min(0.80,pA));
          const sR2=pH+pD+pA;pH/=sR2;pD/=sR2;pA/=sR2;
          extraRows=extraRows.map(r=>({label:r.label,p:Math.max(0.10,Math.min(0.85,r.p))}));
        }
      }
      const all1X2 = [{label:`Victoire ${home.name}`,p:pH},{label:'Match nul',p:pD},{label:`Victoire ${away.name}`,p:pA}];
      if (liveValueBets && liveValueBets.length>0) {
        html+=renderTopPick(liveValueBets[0]);
        const rest=liveValueBets.slice(1);
        if(rest.length>0){
          html+=`<div style="font-size:11px;color:#8a9ab8;margin:4px 0 10px;">${rest.length} autre${rest.length>1?'s':''} opportunité${rest.length>1?'s':''} en direct</div>`;
          html+=rest.map(renderValueBet).join("");
        }
      } else {
        const topPick = [...all1X2,...extraRows].reduce((best,r)=>r.p>best.p?r:best, all1X2[0]);
        html+=renderTopPickLive(topPick.label, topPick.p, !cal);
      }
      html+=`<div style="font-size:11px;font-weight:700;color:#1a3a6b;margin-bottom:6px;">📊 Probabilités en temps réel</div>`;
      all1X2.sort((a,b)=>b.p-a.p).forEach(r=>{html+=`<div style="padding:6px 0;border-top:1px solid #f0f2f5"><div style="font-size:13px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
      extraRows.forEach(r=>{html+=`<div style="padding:6px 0;border-top:1px solid #f0f2f5"><div style="font-size:13px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
    } else {
      const cal = await getCalibratedModel(fixture);
      if(!cal){
        html=`<div class="odds-header">🎯 Value Bets vs 1xBet</div>`;
        html+=`<div class="no-odds">⚠️ Cotes 1xBet non disponibles, et historique récent introuvable pour ce match.</div>`;
      } else if (cal.source==='form') {
        // Pas de cotes 1xBet pour ce match : on n'a rien à comparer, donc pas de "value bet" possible,
        // mais on peut quand même donner des probabilités basées sur la forme récente des 2 équipes
        // (nettement plus fiable que la simple heuristique score/temps).
        html=`<div class="odds-header">📊 Estimation (forme récente)</div>`;
        html+=`<div class="no-odds" style="padding:6px 0 14px;">⚠️ Cotes 1xBet indisponibles pour ce match : estimation basée sur les derniers matchs de chaque équipe (pas de comparaison à une cote possible).</div>`;
        const modelProbs=computeModelProbabilities(cal.lh,cal.la);
        [{label:`Victoire ${home.name}`,p:modelProbs.pH},{label:'Match nul',p:modelProbs.pD},{label:`Victoire ${away.name}`,p:modelProbs.pA},{label:'BTTS Oui',p:modelProbs.pBTTS},{label:'Over 2.5',p:modelProbs.pO25}].forEach(r=>{html+=`<div style="padding:5px 0;border-top:1px solid #f0f2f5"><div style="font-size:12px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
        const fhFav=[{label:`1ère MT : ${home.name}`,p:modelProbs.pFH_H},{label:'1ère MT : Nul',p:modelProbs.pFH_D},{label:`1ère MT : ${away.name}`,p:modelProbs.pFH_A}].sort((a,b)=>b.p-a.p)[0];
        const shFav=[{label:`2ème MT : ${home.name}`,p:modelProbs.pSH_H},{label:'2ème MT : Nul',p:modelProbs.pSH_D},{label:`2ème MT : ${away.name}`,p:modelProbs.pSH_A}].sort((a,b)=>b.p-a.p)[0];
        [fhFav,shFav].forEach(r=>{html+=`<div style="padding:5px 0;border-top:1px solid #f0f2f5"><div style="font-size:12px;font-weight:700">${r.label} (favori)</div>${confidenceBarHTML(r.p)}</div>`;});
      } else {
        html=`<div class="odds-header">🎯 Value Bets vs 1xBet</div>`;
        const {lh,la,parsed}=cal;
        const modelProbs=computeModelProbabilities(lh,la);
        const valueBets=findValueBets(modelProbs,parsed,home.name,away.name,lh,la);
        if(valueBets.length===0){
          html+=`<div class="no-odds">✅ Aucun value bet détecté.<br>Les cotes semblent correctement évaluées.</div>`;
        } else {
          valueBets.forEach(vb=>recordValueBet(fixture, vb));
          html+=renderTopPick(valueBets[0]);
          const rest=valueBets.slice(1);
          if(rest.length>0){
            html+=`<div style="font-size:11px;color:#8a9ab8;margin:4px 0 10px;">${rest.length} autre${rest.length>1?'s':''} opportunité${rest.length>1?'s':''} · Trié par avantage</div>`;
            html+=rest.map(renderValueBet).join("");
          }
        }
        html+=`<div style="font-size:10px;font-weight:700;color:#8a9ab8;margin:12px 0 6px;padding-top:10px;border-top:1px dashed #e0e4ee;text-transform:uppercase;letter-spacing:0.5px;">Probabilités du modèle${cal.source==='odds+form'?' (cotes + forme récente)':''}</div>`;
        [{label:`Victoire ${home.name}`,p:modelProbs.pH},{label:'Match nul',p:modelProbs.pD},{label:`Victoire ${away.name}`,p:modelProbs.pA},{label:'BTTS Oui',p:modelProbs.pBTTS},{label:'Over 2.5',p:modelProbs.pO25}].forEach(r=>{html+=`<div style="padding:5px 0;border-top:1px solid #f0f2f5"><div style="font-size:12px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
        const fhFav=[{label:`1ère MT : ${home.name}`,p:modelProbs.pFH_H},{label:'1ère MT : Nul',p:modelProbs.pFH_D},{label:`1ère MT : ${away.name}`,p:modelProbs.pFH_A}].sort((a,b)=>b.p-a.p)[0];
        const shFav=[{label:`2ème MT : ${home.name}`,p:modelProbs.pSH_H},{label:'2ème MT : Nul',p:modelProbs.pSH_D},{label:`2ème MT : ${away.name}`,p:modelProbs.pSH_A}].sort((a,b)=>b.p-a.p)[0];
        [fhFav,shFav].forEach(r=>{html+=`<div style="padding:5px 0;border-top:1px solid #f0f2f5"><div style="font-size:12px;font-weight:700">${r.label} (favori)</div>${confidenceBarHTML(r.p)}</div>`;});
      }
      container.dataset.loaded="true";
    }
    container.innerHTML=html;container.style.display="block";
    btn.textContent=live?"🔄 Recalculer":"🙈 Masquer";
    btn.className=live?"pred-btn live-btn":"pred-btn";
    // Sauvegarde l'état pour survivre au rafraîchissement auto (toutes les 2 min)
    matchUIState[fixture.fixture.id] = {expanded:true, html, btnLabel:btn.textContent, btnClass:btn.className};
  } catch(e) {
    container.innerHTML=`<div style="color:#9b2c2c;font-size:12px;">⚠️ Erreur : ${e.message}</div>`;
    container.style.display="block";btn.textContent="👁 Analyser";
  } finally {btn.disabled=false;}
}

function renderMatch(fixture) {
  const home=fixture.teams.home,away=fixture.teams.away;
  const kickoff=new Date(fixture.fixture.date);
  const timeStr=kickoff.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  const elapsed=fixture.fixture.status.elapsed;
  const minutesSinceKickoff=(Date.now()-kickoff.getTime())/60000;
  let tb;
  if(isLive(fixture))tb=`<span class="badge-live">${elapsed?elapsed+"'":"Live"}</span>`;
  else if(isFinished(fixture)){const sc=fixture.goals.home!==null?`${fixture.goals.home}-${fixture.goals.away}`:"FT";tb=`<span class="badge-done">✅ ${sc}</span>`;}
  else if(isUpcoming(fixture) && minutesSinceKickoff>70){
    // Le coup d'envoi est passé depuis longtemps mais l'API n'a jamais mis à jour le statut du match
    // (fréquent sur des amicaux peu suivis, sans flux live fiable) : on le signale au lieu de faire
    // comme si le match n'avait pas encore commencé.
    tb=`<span class="time-badge" style="color:#b08900;" title="Statut non mis à jour par l'API">⚠️ ${timeStr}</span>`;
  }
  else tb=`<span class="time-badge">${timeStr}</span>`;
  const ss=(isLive(fixture)||isFinished(fixture))&&fixture.goals.home!==null;
  const card=document.createElement("div");card.className="card";
  card.innerHTML=`<div class="card-top"><span class="card-round">${fixture.league.round||""}</span>${tb}</div><div class="teams-row"><div class="team-block"><img src="${home.logo}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain;flex-shrink:0" alt=""/><span class="team-name">${home.name}</span></div><div class="score-block">${ss?`<span class="score">${fixture.goals.home}</span><span class="score-sep">-</span><span class="score">${fixture.goals.away}</span>`:`<span class="vs-text">VS</span>`}</div><div class="team-block away"><img src="${away.logo}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain;flex-shrink:0" alt=""/><span class="team-name">${away.name}</span></div></div><button class="pred-btn${isLive(fixture)?" live-btn":""}">👁 Analyser</button><div class="predictions" style="display:none"></div>`;
  const btn=card.querySelector(".pred-btn"),pc=card.querySelector(".predictions");
  btn.addEventListener("click",()=>showPredictions(fixture,pc,btn));

  const saved = matchUIState[fixture.fixture.id];
  if (saved && saved.expanded) {
    if (isLive(fixture)) {
      // Le score/temps a pu changer depuis le dernier calcul : on relance le calcul en direct.
      showPredictions(fixture,pc,btn);
    } else {
      pc.innerHTML = saved.html;
      pc.style.display = "block";
      pc.dataset.loaded = "true";
      btn.textContent = saved.btnLabel;
      btn.className = saved.btnClass;
    }
  }
  return card;
}

function renderLeagueGroup(leagueId,leagueName,countryName,fixtures,hasLive) {
  const w=document.createElement("div");w.className="league-group";
  const isOpen = !!leagueOpenState[leagueId];
  const h=document.createElement("div");h.className="league-header"+(hasLive?" live-header":"");
  h.innerHTML=`<span class="league-flag">${countryFlag(countryName)}</span><span class="league-title">${formatLeagueName(leagueName,countryName)}</span>${hasLive?`<span class="league-live-badge">LIVE</span>`:""}<span class="league-count${hasLive?" live-count":""}">${fixtures.length}</span><span class="league-chevron${isOpen?" open":""}">▼</span>`;
  const mc=document.createElement("div");mc.className="league-matches"+(isOpen?" open":"");
  fixtures.forEach(f=>mc.appendChild(renderMatch(f)));
  h.addEventListener("click",()=>{const o=mc.classList.toggle("open");h.querySelector(".league-chevron").classList.toggle("open",o);leagueOpenState[leagueId]=o;});
  w.appendChild(h);w.appendChild(mc);return w;
}

function renderTab(fixtures) {
  const ml=document.getElementById("matchList"),fn=document.getElementById("footerNote");
  ml.innerHTML="";fn.innerHTML="";
  if(fixtures.length===0){ml.innerHTML=`<div class="empty-tab">Aucun match dans cet onglet.</div>`;return;}
  const bl={};
  fixtures.forEach(f=>{const k=`${f.league.id}`;if(!bl[k])bl[k]={id:k,name:f.league.name,country:f.league.country,fixtures:[]};bl[k].fixtures.push(f);});
  Object.values(bl).forEach(g=>{
    g.hasLive=g.fixtures.some(f=>isLive(f));
    g.earliest=Math.min(...g.fixtures.map(f=>new Date(f.fixture.date).getTime()));
  });
  // Les groupes avec un match en direct remontent en premier ; sinon, les matchs les plus proches
  // dans le temps (coup d'envoi le plus proche) apparaissent en haut.
  Object.values(bl).sort((a,b)=>{
    if(a.hasLive!==b.hasLive) return a.hasLive?-1:1;
    return a.earliest-b.earliest;
  }).forEach(g=>{
    g.fixtures.sort((a,b)=>{const pa=isLive(a)?0:isUpcoming(a)?1:2,pb=isLive(b)?0:isUpcoming(b)?1:2;if(pa!==pb)return pa-pb;return new Date(a.fixture.date)-new Date(b.fixture.date);});
    ml.appendChild(renderLeagueGroup(g.id,g.name,g.country,g.fixtures,g.hasLive));
  });
  fn.innerHTML="🔥 +10% edge fort · ⚡ +6% solide · +3% léger. Joue avec prudence.";
  fn.className="footer-note";
}

function switchTab(tab) {
  currentTab=tab;
  ["upcoming","live","done"].forEach(t=>document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("active",t===tab));
  let fx;
  if(tab==="live")fx=allFixtures.filter(f=>isLive(f));
  else if(tab==="upcoming")fx=allFixtures.filter(f=>isUpcoming(f));
  else fx=allFixtures.filter(f=>isFinished(f));
  renderTab(fx);
  const lc=allFixtures.filter(f=>isLive(f)).length;
  document.getElementById("tabLive").innerHTML=`<span class="live-dot"></span>EN DIRECT${lc>0?` (${lc})`:""}`;
  document.getElementById("tabUpcoming").textContent=`AVANT-MATCH (${allFixtures.filter(f=>isUpcoming(f)).length})`;
  document.getElementById("tabDone").textContent=`TERMINÉS (${allFixtures.filter(f=>isFinished(f)).length})`;
}

async function loadFixtures(silent=false) {
  const se=document.getElementById("status"),eb=document.getElementById("errorBox"),rb=document.getElementById("refreshBtn");
  if(!silent){se.style.display="block";se.innerHTML='<span class="spin">🔄</span> Chargement...';eb.innerHTML="";document.getElementById("matchList").innerHTML="";}
  try {
    const [dateData,liveData]=await Promise.all([apiGet(`/fixtures?date=${todayISO()}`),apiGet(`/fixtures?live=all`).catch(()=>[])]);
    const lm={};(liveData||[]).forEach(f=>{lm[f.fixture.id]=f;});
    // Vérifie que les 2 appels API s'accordent sur les noms d'équipes pour un même ID de match :
    // si ce n'est pas le cas, c'est une incohérence dans les données de l'API elle-même (pas dans
    // notre logique de fusion), utile à savoir pour diagnostiquer un futur cas de nom d'équipe erroné.
    (dateData||[]).forEach(f=>{
      const live=lm[f.fixture.id];
      if(live && (live.teams.away.name!==f.teams.away.name || live.teams.home.name!==f.teams.home.name)){
        console.warn(`[pronos] Incohérence API pour fixture ${f.fixture.id} : /fixtures?date= dit "${f.teams.home.name} vs ${f.teams.away.name}", /fixtures?live=all dit "${live.teams.home.name} vs ${live.teams.away.name}"`);
      }
    });
    const merged=(dateData||[]).map(f=>lm[f.fixture.id]||f);
    (liveData||[]).forEach(f=>{if(!merged.find(m=>m.fixture.id===f.fixture.id))merged.push(f);});
    allFixtures=merged.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date));
    se.style.display="none";rb.style.display="flex";
    switchTab(currentTab);
  } catch(e) {
    if(!silent){se.style.display="none";eb.innerHTML=`<div class="error-box">⚠️ Impossible de récupérer les matchs.</div>`;rb.style.display="flex";}
  }
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
loadFixtures();
setInterval(()=>loadFixtures(true),2*60*1000);
</script>
