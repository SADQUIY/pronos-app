<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";
let allFixtures = [], currentTab = "live";

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) throw new Error(JSON.stringify(json.errors));
  return json.response;
}
const LIVE_STATUSES = ["1H","HT","2H","ET","BT","P","SUSP","INT","LIVE"];
const DONE_STATUSES = ["FT","AET","PEN","AWD","WO"];
function isLive(f) { return LIVE_STATUSES.includes(f.fixture.status.short); }
function isFinished(f) { return DONE_STATUSES.includes(f.fixture.status.short); }
function isUpcoming(f) { return !isLive(f) && !isFinished(f); }
const LEAGUE_PRIORITY = ["world cup","fifa world cup","champions league","uefa champions league","europa league","uefa europa league","conference league","premier league","la liga","primera division","serie a","bundesliga","ligue 1","eredivisie","primeira liga","super lig","botola","botola pro","nations league","afcon","africa cup","copa america","concacaf"];
function leaguePriority(n) { const name=(n||"").toLowerCase(); for(let i=0;i<LEAGUE_PRIORITY.length;i++) if(name.includes(LEAGUE_PRIORITY[i])) return i; return LEAGUE_PRIORITY.length; }
const COUNTRY_TO_ISO = {"morocco":"MA","world":"🌍","england":"GB","spain":"ES","italy":"IT","germany":"DE","france":"FR","portugal":"PT","netherlands":"NL","belgium":"BE","scotland":"GB","turkey":"TR","greece":"GR","switzerland":"CH","austria":"AT","russia":"RU","ukraine":"UA","poland":"PL","czech-republic":"CZ","denmark":"DK","sweden":"SE","norway":"NO","croatia":"HR","serbia":"RS","romania":"RO","brazil":"BR","argentina":"AR","usa":"US","mexico":"MX","china":"CN","japan":"JP","south-korea":"KR","australia":"AU","egypt":"EG","algeria":"DZ","tunisia":"TN","saudi-arabia":"SA","qatar":"QA","uae":"AE","nigeria":"NG","senegal":"SN","cameroon":"CM","ghana":"GH","ivory coast":"CI","mali":"ML","kyrgyzstan":"KG","kazakhstan":"KZ","belarus":"BY","paraguay":"PY","bolivia":"BO","colombia":"CO","chile":"CL","peru":"PE","uruguay":"UY","venezuela":"VE","ecuador":"EC","costa rica":"CR","guatemala":"GT","honduras":"HN","kenya":"KE","ethiopia":"ET","south africa":"ZA","angola":"AO","iran":"IR","iraq":"IQ","israel":"IL","jordan":"JO","kuwait":"KW","india":"IN","thailand":"TH","vietnam":"VN","indonesia":"ID","malaysia":"MY","philippines":"PH","finland":"FI","bulgaria":"BG","slovakia":"SK","slovenia":"SI","hungary":"HU","moldova":"MD","georgia":"GE","armenia":"AM","azerbaijan":"AZ","albania":"AL","lithuania":"LT","latvia":"LV","estonia":"EE","iceland":"IS","ireland":"IE","somalia":"SO","togo":"TG","congo":"CG","rwanda":"RW","cuba":"CU","haiti":"HT","jamaica":"JM"};
function isoToFlag(iso) { if(!iso||iso.length!==2) return "🏳️"; return String.fromCodePoint(...iso.toUpperCase().split("").map(c=>127397+c.charCodeAt(0))); }
function countryFlag(c) { const k=(c||"").toLowerCase(); if(k==="world") return "🌍"; const iso=COUNTRY_TO_ISO[k]; return iso?isoToFlag(iso):"🏳️"; }
function formatLeagueName(league,country) { const c=(country||"").trim(),l=(league||"").trim(); if(!c||c.toLowerCase()==="world") return l; if(l.toLowerCase().startsWith(c.toLowerCase())) return l; return `${c}. ${l}`; }
function safe(v,f=0) { return (typeof v==="number"&&!isNaN(v))?v:f; }
const INTL_KW = ["world cup","world-cup","uefa","afcon","africa cup","nations league","champions league","europa league","conference league","copa america","concacaf","confederations","qualification","qualifiers","friendlies","international"];
function isNationalTeamMatch(f) { const c=(f.league.country||"").toLowerCase(),n=(f.league.name||"").toLowerCase(); return c==="world"||INTL_KW.some(kw=>n.includes(kw)); }

function calcWeightedForm(matches, teamId) {
  if (!matches||matches.length===0) return {winRate:0.33,drawRate:0.25,avgGF:1.2,avgGA:1.2,bttsRate:0.5,over25Rate:0.5,matchCount:0};
  const finished=[...matches].filter(m=>["FT","AET","PEN"].includes(m.fixture.status.short)).sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date));
  if(finished.length===0) return {winRate:0.33,drawRate:0.25,avgGF:1.2,avgGA:1.2,bttsRate:0.5,over25Rate:0.5,matchCount:0};
  let tw=0,wins=0,draws=0,gf=0,ga=0,btts=0,over25=0;
  finished.forEach((m,idx)=>{ const w=Math.pow(0.85,idx); tw+=w; const isH=m.teams.home.id===teamId; const scored=isH?(m.goals.home??0):(m.goals.away??0); const conceded=isH?(m.goals.away??0):(m.goals.home??0); const won=isH?m.teams.home.winner:m.teams.away.winner; const draw=m.teams.home.winner===null&&m.teams.away.winner===null; if(won)wins+=w; else if(draw)draws+=w; gf+=scored*w; ga+=conceded*w; if(scored>0&&conceded>0)btts+=w; if(scored+conceded>2)over25+=w; });
  return {winRate:wins/tw,drawRate:draws/tw,avgGF:gf/tw,avgGA:ga/tw,bttsRate:btts/tw,over25Rate:over25/tw,matchCount:finished.length};
}

function computePredictions(homeStats,awayStats,homeForm,awayForm,homeName,awayName) {
  const homeGF=safe(homeStats?.goals?.for?.average?.total),homeGA=safe(homeStats?.goals?.against?.average?.total);
  const awayGF=safe(awayStats?.goals?.for?.average?.total),awayGA=safe(awayStats?.goals?.against?.average?.total);
  const homeWinPct=safe(homeStats?.fixtures?.wins?.total)/Math.max(1,safe(homeStats?.fixtures?.played?.total,1));
  const awayWinPct=safe(awayStats?.fixtures?.wins?.total)/Math.max(1,safe(awayStats?.fixtures?.played?.total,1));
  const haS=(homeGF+awayGA)/2*1.1,aaS=(awayGF+homeGA)/2;
  const haF=(homeForm.avgGF+awayForm.avgGA)/2*1.1,aaF=(awayForm.avgGF+homeForm.avgGA)/2;
  const ha=haS*0.5+haF*0.5,aa=aaS*0.5+aaF*0.5,ta=ha+aa||1;
  let pH=(ha/ta)*0.6+(homeWinPct*0.5+homeForm.winRate*0.5)*0.4;
  let pA=(aa/ta)*0.6+(awayWinPct*0.5+awayForm.winRate*0.5)*0.4;
  pH=Math.max(0.05,Math.min(0.85,pH));pA=Math.max(0.05,Math.min(0.85,pA));
  let pD=Math.max(0.1,1-pH-pA);const s=pH+pD+pA;pH/=s;pD/=s;pA/=s;
  const r=[{label:`Victoire ${homeName}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${awayName}`,pct:pA}].sort((a,b)=>b.pct-a.pct)[0];
  const eg=ha+aa;
  const pO=Math.max(0.1,Math.min(0.9,(eg-1.5)/3+0.5))*0.5+((homeForm.over25Rate+awayForm.over25Rate)/2)*0.5;
  const pB=Math.max(0.15,Math.min(0.9,ha/1.4))*Math.max(0.15,Math.min(0.9,aa/1.4))*0.5+((homeForm.bttsRate+awayForm.bttsRate)/2)*0.5;
  const pDH=pH+pD,pDA=pA+pD;
  const dc=pDH>=pDA?{label:`DC: ${homeName} ou nul`,pct:pDH}:{label:`DC: ${awayName} ou nul`,pct:pDA};
  return {
    predictions:[{type:"Résultat (1N2)",pick:r.label,confidence:r.pct},{type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO},{type:"BTTS",pick:pB>=0.5?"Les deux équipes marquent: Oui":"Les deux équipes marquent: Non",confidence:pB>=0.5?pB:1-pB},{type:"Double chance",pick:dc.label,confidence:Math.min(0.95,dc.pct)}].sort((a,b)=>b.confidence-a.confidence),
    formNote:`📈 Forme ${homeName}: ${homeForm.matchCount||0} matchs analysés · ${Math.round(homeForm.winRate*100)}% victoires · ${homeForm.avgGF?.toFixed(1)||"?"} buts/match\n📈 Forme ${awayName}: ${awayForm.matchCount||0} matchs analysés · ${Math.round(awayForm.winRate*100)}% victoires · ${awayForm.avgGF?.toFixed(1)||"?"} buts/match`,
    pH,pD,pA,pBTTS:pB,pOver25:pO,homeForm,awayForm,
  };
}

function computeExtendedMarkets(homeForm,awayForm,pH,pD,pA,pBTTS,pOver25,homeName,awayName,currentHomeGoals=null,currentAwayGoals=null,elapsedMin=null) {
  const MAX=7,FH=0.44;
  const FACT=[1];for(let i=1;i<=MAX;i++)FACT[i]=FACT[i-1]*i;
  const pmf=(l,k)=>Math.exp(-l)*Math.pow(l,k)/FACT[k];
  const clamp=(v,a=0.01,b=0.99)=>Math.max(a,Math.min(b,v));
  function estimateLambdas(){let best={lh:1.3,la:1.1},bestErr=Infinity;for(let lh=0.2;lh<=4.5;lh+=0.1){for(let la=0.2;la<=4.5;la+=0.1){let ph=0,pd=0,pa=0,po=0,pb=0;for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){const p=pmf(lh,i)*pmf(la,j);if(i>j)ph+=p;else if(i===j)pd+=p;else pa+=p;if(i+j>2.5)po+=p;if(i>0&&j>0)pb+=p;}const e=Math.pow(ph-pH,2)+Math.pow(pd-pD,2)+Math.pow(pa-pA,2)+Math.pow(po-pOver25,2)*1.5+Math.pow(pb-pBTTS,2)*1.5;if(e<bestErr){bestErr=e;best={lh,la};}}}return best;}
  const{lh,la}=estimateLambdas();
  const lh1=lh*FH,la1=la*FH,lh2=lh*(1-FH),la2=la*(1-FH);
  function matrix(lH,lA){const m=[];for(let i=0;i<=MAX;i++){m[i]=[];for(let j=0;j<=MAX;j++)m[i][j]=pmf(lH,i)*pmf(lA,j);}return m;}
  const M=matrix(lh,la),HT=matrix(lh1,la1),SH=matrix(lh2,la2);
  let pWTNH=0,pWTNA=0,pScoreDraw=0,pNilNil=0,pHTHome=0,pHTDraw=0,pHTAway=0;
  let pWinBothHome=0,pWinBothAway=0,pDrawBoth=0,pBTTSEachHalf=0;
  let pLeadNoLoseHome=0,pLeadNoLoseAway=0,pNeither1=0,pNeither2=0;
  let pHomeOver05=0,pHomeOver15=0,pAwayOver05=0,pAwayOver15=0;
  let pHomeWinExact1orDraw=0,pAwayWinExact1orDraw=0;
  const htftMap={},intervalGoals={15:0,30:0,45:0,60:0,75:0};
  for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){const p=M[i][j];if(i>j&&j===0)pWTNH+=p;if(j>i&&i===0)pWTNA+=p;if(i===j&&i>0)pScoreDraw+=p;if(i===0&&j===0)pNilNil+=p;if(i>0)pHomeOver05+=p;if(i>1)pHomeOver15+=p;if(j>0)pAwayOver05+=p;if(j>1)pAwayOver15+=p;if(i>j&&Math.abs(i-j)===1)pHomeWinExact1orDraw+=p;if(i===j)pHomeWinExact1orDraw+=p;if(j>i&&Math.abs(j-i)===1)pAwayWinExact1orDraw+=p;if(i===j)pAwayWinExact1orDraw+=p;}
  for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){const ph=HT[i][j];if(!ph)continue;const htR=i>j?'1':i===j?'X':'2';if(i>j)pHTHome+=ph;else if(i===j)pHTDraw+=ph;else pHTAway+=ph;for(let k=0;k<=MAX;k++)for(let l=0;l<=MAX;l++){const ps=SH[k][l];if(!ps)continue;const w=ph*ps,fh=i+k,fa=j+l;const ftR=fh>fa?'1':fh===fa?'X':'2';htftMap[htR+'/'+ftR]=(htftMap[htR+'/'+ftR]||0)+w;if(i>j&&k>l)pWinBothHome+=w;if(i<j&&k<l)pWinBothAway+=w;if(i===j&&k===l)pDrawBoth+=w;if(i>0&&j>0&&k>0&&l>0)pBTTSEachHalf+=w;if(i===0&&j===0)pNeither1+=ph;if(k===0&&l===0)pNeither2+=ps;if((i>j||(i===j&&htR==='X'))&&fh>=fa)pLeadNoLoseHome+=w;if((i<j||(i===j&&htR==='X'))&&fa>=fh)pLeadNoLoseAway+=w;}}
  [15,30,45,60,75].forEach(min=>{intervalGoals[min]=1-pmf((lh+la)*(min/90),0);});
  const pAnyWinToNil=pWTNH+pWTNA,pNeither=pNeither1*pNeither2;
  const pHomeQualifies=Math.min(0.95,pH+pD*0.5),pAwayQualifies=Math.min(0.95,pA+pD*0.5);
  const hFR=safe(homeForm?.avgGA)*0.15+0.08,aFR=safe(awayForm?.avgGA)*0.15+0.08;
  const pSendingOff=1-Math.pow(1-hFR-aFR,2),pPenalty=1-Math.pow(1-(hFR+aFR)*0.4,1.5);
  const markets=[];
  function push(type,pYes){const pNo=1-pYes;markets.push({type,pick:pYes>=pNo?'Oui':'Non',confidence:clamp(Math.max(pYes,pNo))});}
  push('Une équipe gagne sans encaisser (Any Team To Win To Nil)',pAnyWinToNil);
  push(`${homeName} gagne sans encaisser`,pWTNH);
  push(`${awayName} gagne sans encaisser`,pWTNA);
  push('Match nul avec buts (Score Draw)',pScoreDraw);
  push('0-0 (Aucun but)',pNilNil);
  const htftCombos=[{label:`${homeName}/${homeName}`,p:htftMap['1/1']||0},{label:`${homeName}/Nul`,p:htftMap['1/X']||0},{label:`Nul/Nul`,p:htftMap['X/X']||0},{label:`Nul/${homeName}`,p:htftMap['X/1']||0},{label:`Nul/${awayName}`,p:htftMap['X/2']||0},{label:`${awayName}/${awayName}`,p:htftMap['2/2']||0},{label:`${awayName}/Nul`,p:htftMap['2/X']||0},{label:`${awayName}/${homeName}`,p:htftMap['2/1']||0},{label:`${homeName}/${awayName}`,p:htftMap['1/2']||0}].sort((a,b)=>b.p-a.p);
  markets.push({type:'Mi-temps / Final (HT-FT)',pick:htftCombos[0].label,confidence:clamp(htftCombos[0].p*3)});
  push(`${homeName} gagne les deux mi-temps`,pWinBothHome);
  push(`${awayName} gagne les deux mi-temps`,pWinBothAway);
  push('Nul dans les deux mi-temps',pDrawBoth);
  push('Les deux équipes marquent dans chaque mi-temps',pBTTSEachHalf);
  push('Aucun but dans les deux mi-temps',pNeither);
  const pFG1H=lh1/(lh1+la1+0.01),pFG1A=la1/(lh1+la1+0.01);
  const pFG2H=lh2/(lh2+la2+0.01),pFG2A=la2/(lh2+la2+0.01);
  markets.push({type:'1er but 1ère mi-temps',pick:pFG1H>=pFG1A?`${homeName} marque en 1er`:`${awayName} marque en 1er`,confidence:clamp(Math.max(pFG1H,pFG1A))});
  markets.push({type:'1er but 2ème mi-temps',pick:pFG2H>=pFG2A?`${homeName} marque en 1er`:`${awayName} marque en 1er`,confidence:clamp(Math.max(pFG2H,pFG2A))});
  [15,30,45,60,75].forEach(min=>push(`But avant la ${min}e minute`,intervalGoals[min]));
  [[1,15],[1,20],[1,25],[1,30],[1,35],[1,40]].forEach(([s,e])=>{push(`But de ${s}' à ${e}' (1ère MT)`,1-pmf((lh+la)*((e-s)/90),0));});
  const rtC=[{label:`${homeName} + Plus de 2.5 buts`,p:pH*pOver25},{label:`${awayName} + Plus de 2.5 buts`,p:pA*pOver25},{label:`Nul + Moins de 2.5 buts`,p:pD*(1-pOver25)},{label:`${homeName} + BTTS Oui`,p:pH*pBTTS},{label:`${awayName} + BTTS Oui`,p:pA*pBTTS},{label:`Nul + BTTS Oui`,p:pD*pBTTS},{label:`${homeName} + Moins de 2.5 buts`,p:pH*(1-pOver25)},{label:`${awayName} + Moins de 2.5 buts`,p:pA*(1-pOver25)}].sort((a,b)=>b.p-a.p);
  markets.push({type:'Résultat + Total (meilleure combo)',pick:rtC[0].label,confidence:clamp(rtC[0].p*2.5)});
  push(`${homeName} marque (Over 0.5)`,pHomeOver05);push(`${awayName} marque (Over 0.5)`,pAwayOver05);
  push(`${homeName} marque 2+ buts (Over 1.5)`,pHomeOver15);push(`${awayName} marque 2+ buts (Over 1.5)`,pAwayOver15);
  push(`${homeName} mène et ne perd pas`,pLeadNoLoseHome);push(`${awayName} mène et ne perd pas`,pLeadNoLoseAway);
  push(`${homeName} gagne par 1 but ou nul`,pHomeWinExact1orDraw);push(`${awayName} gagne par 1 but ou nul`,pAwayWinExact1orDraw);
  push('Carton rouge dans le match (Sending Off)',pSendingOff);push('Penalty sifflé dans le match',pPenalty);
  push('Ni penalty ni carton rouge',1-Math.min(0.95,pSendingOff+pPenalty));
  push(`${homeName} se qualifie`,pHomeQualifies);push(`${awayName} se qualifie`,pAwayQualifies);
  push(`${homeName} se qualifie en temps réglementaire`,pH);push(`${awayName} se qualifie en temps réglementaire`,pA);

  // === CORRECTION COMPLÈTE POUR MATCHS EN COURS ===
  if(currentHomeGoals!==null&&currentAwayGoals!==null){
    const hG=currentHomeGoals,aG=currentAwayGoals,tG=hG+aG;
    const isHT=elapsedMin!==null&&elapsedMin===45;
    const is2H=elapsedMin!==null&&elapsedMin>45;
    const is1H=elapsedMin!==null&&elapsedMin>0&&elapsedMin<=45;
    const htResult=(is2H||isHT)?(hG>aG?'1':hG<aG?'2':'X'):null;
    markets.forEach(m=>{
      if(tG>=3&&m.type.includes('2.5 buts')){m.pick='Plus de 2.5 buts ✅';m.confidence=0.99;}
      if(tG>0&&(m.type.includes('0-0')||m.type.toLowerCase().includes('aucun but'))){m.pick='Non';m.confidence=0.99;}
      if(m.type.includes(`${homeName} gagne sans encaisser`)&&aG>0){m.pick='Non';m.confidence=0.99;}
      if(m.type.includes(`${awayName} gagne sans encaisser`)&&hG>0){m.pick='Non';m.confidence=0.99;}
      if((m.type.includes('Any Team')||m.type.includes('Une équipe gagne sans'))&&hG>0&&aG>0){m.pick='Non';m.confidence=0.99;}
      if(m.type.includes('chaque mi-temps')&&is2H&&(hG===0||aG===0)){m.pick='Non';m.confidence=0.99;}
      if(m.type.includes('Score Draw')){if(hG!==aG){m.pick='Non';m.confidence=0.75;}else if(hG===aG&&hG>0&&is2H&&elapsedMin>80){m.pick='Oui';m.confidence=0.80;}else if(hG===0&&aG===0&&is2H&&elapsedMin>80){m.pick='Non';m.confidence=0.80;}}
      if(m.type.includes('HT-FT')){if(is1H){m.confidence=0.01;}else if(htResult!==null){const htLabel=htResult==='1'?homeName:htResult==='2'?awayName:'Nul';if(!m.pick.startsWith(htLabel)){m.pick='Non';m.confidence=0.99;}}}
      if(m.type.includes(`${homeName} gagne les deux mi-temps`)&&is2H&&htResult!=='1'){m.pick='Non';m.confidence=0.99;}
      if(m.type.includes(`${awayName} gagne les deux mi-temps`)&&is2H&&htResult!=='2'){m.pick='Non';m.confidence=0.99;}
      if(m.type.includes('Nul dans les deux mi-temps')){if(is2H&&htResult!=='X'){m.pick='Non';m.confidence=0.99;}else if(is2H&&htResult==='X'&&elapsedMin>80&&hG===aG){m.pick='Oui';m.confidence=0.75;}}
      if(m.type.includes('1er but 1ère mi-temps')&&is2H){if(hG>0&&aG===0){m.pick=`${homeName} marque en 1er`;m.confidence=0.99;}else if(aG>0&&hG===0){m.pick=`${awayName} marque en 1er`;m.confidence=0.99;}else if(tG>0){m.pick='But marqué en 1ère MT';m.confidence=0.99;}else{m.pick='Aucun but en 1ère MT';m.confidence=0.99;}}
      [15,30,45,60,75].forEach(min=>{if(m.type.includes(`avant la ${min}e`)&&elapsedMin!==null&&elapsedMin>min){if(tG===0){m.pick='Non';m.confidence=0.99;}}});
      if(m.type.includes('Carton rouge')&&m.confidence>0.75){m.confidence=0.75;}
      if(m.type.includes('Ni penalty ni carton rouge')&&m.confidence>0.75){m.confidence=0.75;}
      if(m.type.includes('Penalty sifflé')&&m.confidence>0.70){m.confidence=0.70;}
      if(m.type.includes('se qualifie en temps réglementaire')&&is2H&&elapsedMin>85){if(m.type.includes(homeName)&&hG>aG){m.pick='Oui';m.confidence=0.95;}if(m.type.includes(awayName)&&aG>hG){m.pick='Oui';m.confidence=0.95;}}
    });
  }
  return markets.sort((a,b)=>b.confidence-a.confidence);
}

async function computeNationalPredictions(home,away) {
  const [h2hRes,hC,hP,aC,aP]=await Promise.all([apiGet(`/fixtures/headtohead?h2h=${home.id}-${away.id}`),apiGet(`/fixtures?team=${home.id}&season=2024`),apiGet(`/fixtures?team=${home.id}&season=2023`),apiGet(`/fixtures?team=${away.id}&season=2024`),apiGet(`/fixtures?team=${away.id}&season=2023`)]);
  const hAll=[...(hC||[]),...(hP||[])],aAll=[...(aC||[]),...(aP||[])];
  const hF=calcWeightedForm(hAll,home.id),aF=calcWeightedForm(aAll,away.id);
  const h2h=[...(h2hRes||[])].filter(m=>["FT","AET","PEN"].includes(m.fixture.status.short)).sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date));
  let pH=hF.winRate*0.55+0.05,pA=aF.winRate*0.55;
  if(h2h.length>0){const h2hF=calcWeightedForm(h2h,home.id);pH=hF.winRate*0.4+h2hF.winRate*0.3+0.05;pA=aF.winRate*0.4+(1-h2hF.winRate-h2hF.drawRate)*0.3;}
  pH=Math.max(0.05,Math.min(0.85,pH));pA=Math.max(0.05,Math.min(0.85,pA));
  let pD=Math.max(0.12,1-pH-pA);const s=pH+pD+pA;pH/=s;pD/=s;pA/=s;
  const r=[{label:`Victoire ${home.name}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${away.name}`,pct:pA}].sort((a,b)=>b.pct-a.pct)[0];
  const pO=(hF.over25Rate+aF.over25Rate)/2,pB=(hF.bttsRate+aF.bttsRate)/2;
  const pDH=Math.min(0.95,pH+pD),pDA=Math.min(0.95,pA+pD);
  const dc=pDH>=pDA?{label:`DC: ${home.name} ou nul`,pct:pDH}:{label:`DC: ${away.name} ou nul`,pct:pDA};
  return {predictions:[{type:"Résultat (1N2)",pick:r.label,confidence:r.pct},{type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO},{type:"BTTS",pick:pB>=0.5?"Les deux équipes marquent: Oui":"Les deux équipes marquent: Non",confidence:pB>=0.5?pB:1-pB},{type:"Double chance",pick:dc.label,confidence:dc.pct}].sort((a,b)=>b.confidence-a.confidence),formNote:`📈 ${home.name}: ${hF.matchCount||0} matchs · ${Math.round(hF.winRate*100)}% victoires\n📈 ${away.name}: ${aF.matchCount||0} matchs · ${Math.round(aF.winRate*100)}% victoires${h2h.length>0?` · ${h2h.length} confrontations directes`:""}`,pH,pD,pA,pBTTS:pB,pOver25:pO,homeForm:hF,awayForm:aF};
}

async function computeLivePredictions(fixture) {
  const home=fixture.teams.home,away=fixture.teams.away;
  const hG=fixture.goals.home??0,aG=fixture.goals.away??0;
  const elapsed=fixture.fixture.status.elapsed??45,remaining=Math.max(0,90-elapsed);
  const status=fixture.fixture.status.short;
  let ls=null;
  try{const sr=await apiGet(`/fixtures/statistics?fixture=${fixture.fixture.id}`);if(sr&&sr.length>=2){const gS=(ts,t)=>{const s=ts.statistics.find(s=>s.type===t);return s?(parseInt(s.value)||0):0;};const hS=sr.find(t=>t.team.id===home.id)||sr[0],aS=sr.find(t=>t.team.id===away.id)||sr[1];ls={hP:gS(hS,"Ball Possession")||50,aP:gS(aS,"Ball Possession")||50,hSh:gS(hS,"Total Shots"),aSh:gS(aS,"Total Shots"),hShOn:gS(hS,"Shots on Goal"),aShOn:gS(aS,"Shots on Goal"),hC:gS(hS,"Corner Kicks"),aC:gS(aS,"Corner Kicks")};}}catch(e){}
  const preds=[],sd=hG-aG,dom=ls?(ls.hP-50)/100:0;
  if(hG>0&&aG>0)preds.push({type:"BTTS",pick:"Les deux équipes marquent: Oui ✅",confidence:1.0});
  else if(status==="2H"&&elapsed>75){const n=hG===0?home.name:away.name;preds.push({type:"BTTS",pick:`Les deux équipes marquent: Non (${n} n'a pas marqué)`,confidence:0.88});}
  else{const hF=ls?(ls.hShOn*0.5+ls.hP/200):0.5,aF=ls?(ls.aShOn*0.5+ls.aP/200):0.5;const pHM=hG>0?1:Math.min(0.85,hF*remaining/50),pAM=aG>0?1:Math.min(0.85,aF*remaining/50);const pB=pHM*pAM;preds.push({type:"BTTS",pick:pB>=0.5?"Les deux équipes marquent: Oui":"Les deux équipes marquent: Non",confidence:pB>=0.5?pB:1-pB});}
  const tG=hG+aG,gr=elapsed>0?tG/elapsed:0,proj=tG+gr*remaining;
  if(tG>=3)preds.push({type:"Total de buts",pick:"Plus de 2.5 buts ✅ (déjà atteint)",confidence:1.0});
  else{const pO=Math.max(0.05,Math.min(0.95,(proj-2.5)/2+0.5));preds.push({type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO});}
  let pH,pD,pA;
  if(remaining<=5){pH=sd>0?0.93:sd<0?0.03:0.12;pD=sd===0?0.82:0.05;pA=sd<0?0.93:sd>0?0.03:0.12;}
  else if(remaining<=20){pH=sd>0?0.75:sd<0?0.12:0.28+dom*0.25;pD=sd===0?0.48:0.13;pA=sd<0?0.75:sd>0?0.12:0.24-dom*0.25;}
  else if(remaining<=45){pH=sd>0?0.58:sd<0?0.22:0.33+dom*0.15;pD=sd===0?0.38:0.20;pA=sd<0?0.58:sd>0?0.22:0.29-dom*0.15;}
  else{pH=sd>0?0.48:sd<0?0.28:0.35+dom*0.1;pD=sd===0?0.30:0.22;pA=sd<0?0.48:sd>0?0.28:0.32-dom*0.1;}
  const sR=pH+pD+pA;pH/=sR;pD/=sR;pA/=sR;
  const rO=[{label:`Victoire ${home.name}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${away.name}`,pct:pA}].sort((a,b)=>b.pct-a.pct);
  preds.push({type:`Résultat final (${elapsed}')`,pick:rO[0].label,confidence:rO[0].pct});
  const pDH=Math.min(0.98,pH+pD),pDA=Math.min(0.98,pA+pD);
  preds.push({type:"Double chance",pick:pDH>=pDA?`DC: ${home.name} ou nul`:`DC: ${away.name} ou nul`,confidence:Math.max(pDH,pDA)});
  let sn="";
  if(ls)sn=`<div class="stats-box">📊 <b>${home.name}</b>: ${ls.hP}% possession · ${ls.hSh} tirs (${ls.hShOn} cadrés) · ${ls.hC} corners<br>📊 <b>${away.name}</b>: ${ls.aP}% possession · ${ls.aSh} tirs (${ls.aShOn} cadrés) · ${ls.aC} corners</div>`;
  return {predictions:preds.sort((a,b)=>b.confidence-a.confidence),statsNote:sn};
}

function confidenceBarHTML(v) {
  const pct=Math.round(v*100);
  const color=pct>=65?"#1a6b3a":pct>=50?"#b08900":"#9b2c2c";
  return `<div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="bar-pct" style="color:${color}">${pct}%</span></div>`;
}

  const w=document.createElement("div");w.className="league-group";
  const h=document.createElement("div");h.className="league-header"+(hasLive?" live-header":"");
  h.innerHTML=`<span class="league-flag">${countryFlag(countryName)}</span><span class="league-title">${formatLeagueName(leagueName,countryName)}</span>${hasLive?`<span class="league-live-badge">LIVE</span>`:""}<span class="league-count${hasLive?" live-count":""}">${fixtures.length}</span><span class="league-chevron">▼</span>`;
  const mc=document.createElement("div");mc.className="league-matches";
  fixtures.forEach(f=>mc.appendChild(renderMatch(f)));
  h.addEventListener("click",()=>{const o=mc.classList.toggle("open");h.querySelector(".league-chevron").classList.toggle("open",o);});
  w.appendChild(h);w.appendChild(mc);return w;
}

function renderTab(fixtures) {
  const ml=document.getElementById("matchList"),fn=document.getElementById("footerNote");
  ml.innerHTML="";fn.innerHTML="";
  if(fixtures.length===0){ml.innerHTML=`<div class="empty-tab">Aucun match dans cet onglet.</div>`;return;}
  const bl={};
  fixtures.forEach(f=>{const k=`${f.league.id}`;if(!bl[k])bl[k]={name:f.league.name,country:f.league.country,fixtures:[]};bl[k].fixtures.push(f);});
  Object.values(bl).sort((a,b)=>leaguePriority(a.name)-leaguePriority(b.name)).forEach(g=>{
    const hl=g.fixtures.some(f=>isLive(f));
    g.fixtures.sort((a,b)=>{const pa=isLive(a)?0:isUpcoming(a)?1:2,pb=isLive(b)?0:isUpcoming(b)?1:2;if(pa!==pb)return pa-pb;return new Date(a.fixture.date)-new Date(b.fixture.date);});
    ml.appendChild(renderLeagueGroup(g.name,g.country,g.fixtures,hl));
  });
  fn.innerHTML="Pronostics : stats de saison + forme pondérée + modèle Poisson. Outil d'aide à la réflexion.";
  fn.className="footer-note";
}

function switchTab(tab) {
  currentTab=tab;
  ["live","upcoming","done"].forEach(t=>document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("active",t===tab));
  let fx;
  if(tab==="live")fx=allFixtures.filter(f=>isLive(f));
  else if(tab==="upcoming")fx=allFixtures.filter(f=>isUpcoming(f));
  else fx=allFixtures.filter(f=>isFinished(f));
  renderTab(fx);
  const lc=allFixtures.filter(f=>isLive(f)).length;
  document.getElementById("tabLive").innerHTML=`<span class="live-dot"></span>EN DIRECT${lc>0?` (${lc})`:""}`;
  document.getElementById("tabUpcoming").textContent=`AVANT-MATCH (${allFixtures.filter(f=>isUpcoming(f)).length})`;
  document.getElementById("tabDone").textContent=`TERMINÉS (${allFixtures.filter(f=>isFinished(f)).length})`;
}

async function loadFixtures(silent=false) {
  const se=document.getElementById("status"),eb=document.getElementById("errorBox"),rb=document.getElementById("refreshBtn");
  if(!silent){se.style.display="block";se.innerHTML='<span class="spin">🔄</span> Chargement...';eb.innerHTML="";document.getElementById("matchList").innerHTML="";}
  try {
    const [dateData,liveData]=await Promise.all([apiGet(`/fixtures?date=${todayISO()}`),apiGet(`/fixtures?live=all`).catch(()=>[])]);
    const lm={};(liveData||[]).forEach(f=>{lm[f.fixture.id]=f;});
    const merged=(dateData||[]).map(f=>lm[f.fixture.id]||f);
    (liveData||[]).forEach(f=>{if(!merged.find(m=>m.fixture.id===f.fixture.id))merged.push(f);});
    allFixtures=merged.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date));
    se.style.display="none";rb.style.display="flex";
    switchTab(currentTab);
  } catch(e) {
    if(!silent){se.style.display="none";eb.innerHTML=`<div class="error-box">⚠️ Impossible de récupérer les matchs. Réessaie dans un instant.</div>`;rb.style.display="flex";}
  }
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
loadFixtures();
setInterval(()=>loadFixtures(true),2*60*1000);
</script>
