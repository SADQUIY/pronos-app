<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";
const BOOKMAKER_1XBET = 8;
let allFixtures = [], currentTab = "upcoming";
const fixtureOddsCache = {}; // fixture.id -> {lh, la, parsed} | null (null = no odds found, cached to avoid refetch)
const matchUIState = {};     // fixture.id -> {expanded, html, btnLabel, btnClass}
const leagueOpenState = {};  // league.id -> true/false

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) throw new Error(JSON.stringify(json.errors));
  return json.response;
}
const LIVE_STATUSES = ["1H","HT","2H","ET","BT","P","SUSP","INT","LIVE"];
const DONE_STATUSES = ["FT","AET","PEN","AWD","WO"];
function isLive(f) { return LIVE_STATUSES.includes(f.fixture.status.short); }
function isFinished(f) { return DONE_STATUSES.includes(f.fixture.status.short); }
function isUpcoming(f) { return !isLive(f) && !isFinished(f); }
const LEAGUE_PRIORITY = ["world cup","fifa world cup","champions league","premier league","la liga","serie a","bundesliga","ligue 1","europa league","conference league","eredivisie","primeira liga","super lig","botola","nations league","afcon","copa america"];
function leaguePriority(n) { const name=(n||"").toLowerCase(); for(let i=0;i<LEAGUE_PRIORITY.length;i++) if(name.includes(LEAGUE_PRIORITY[i])) return i; return LEAGUE_PRIORITY.length; }
const COUNTRY_TO_ISO = {"morocco":"MA","world":"🌍","england":"GB","spain":"ES","italy":"IT","germany":"DE","france":"FR","portugal":"PT","netherlands":"NL","belgium":"BE","turkey":"TR","greece":"GR","switzerland":"CH","austria":"AT","denmark":"DK","sweden":"SE","norway":"NO","croatia":"HR","serbia":"RS","brazil":"BR","argentina":"AR","usa":"US","mexico":"MX","egypt":"EG","algeria":"DZ","tunisia":"TN","saudi-arabia":"SA","qatar":"QA","nigeria":"NG","senegal":"SN","cameroon":"CM","ghana":"GH","ivory coast":"CI","scotland":"GB","poland":"PL","czech-republic":"CZ"};
function isoToFlag(iso) { if(!iso||iso.length!==2) return "🏳️"; return String.fromCodePoint(...iso.toUpperCase().split("").map(c=>127397+c.charCodeAt(0))); }
function countryFlag(c) { const k=(c||"").toLowerCase(); if(k==="world") return "🌍"; const iso=COUNTRY_TO_ISO[k]; return iso?isoToFlag(iso):"🏳️"; }
function formatLeagueName(league,country) { const c=(country||"").trim(),l=(league||"").trim(); if(!c||c.toLowerCase()==="world") return l; if(l.toLowerCase().startsWith(c.toLowerCase())) return l; return `${c}. ${l}`; }

function oddsToProb(odds) { return odds > 1 ? 1/odds : 0; }
function normalizeProbabilities(probs) { const t=probs.reduce((s,p)=>s+p,0); return t===0?probs:probs.map(p=>p/t); }

function poissonProb(lambda, k) { let p=Math.exp(-lambda); for(let i=0;i<k;i++) p*=lambda/(i+1); return p; }
function buildScoreMatrix(lh, la, max=7) { const m=[]; for(let i=0;i<=max;i++){m[i]=[];for(let j=0;j<=max;j++)m[i][j]=poissonProb(lh,i)*poissonProb(la,j);} return m; }

function estimateLambdas(pH, pD, pA) {
  function scoreAt(lh, la) {
    let ph=0,pd=0,pa=0; const M=buildScoreMatrix(lh,la,6);
    for(let i=0;i<=6;i++) for(let j=0;j<=6;j++){const p=M[i][j];if(i>j)ph+=p;else if(i===j)pd+=p;else pa+=p;}
    return Math.pow(ph-pH,2)+Math.pow(pd-pD,2)+Math.pow(pa-pA,2);
  }
  // Passe 1 : recherche grossière (pas 0.1) pour trouver une zone approximative
  let best={lh:1.3,la:1.1},bestErr=Infinity;
  for(let lh=0.2;lh<=4.0;lh+=0.1) for(let la=0.2;la<=4.0;la+=0.1){
    const e=scoreAt(lh,la);
    if(e<bestErr){bestErr=e;best={lh,la};}
  }
  // Passe 2 : recherche fine (pas 0.005) autour du meilleur point trouvé, pour éviter que des
  // matchs différents ne retombent tous sur les mêmes lambdas "arrondis" (cause des pronos répétés).
  const range=0.12, step=0.005;
  for(let lh=Math.max(0.05,best.lh-range); lh<=best.lh+range; lh+=step){
    for(let la=Math.max(0.05,best.la-range); la<=best.la+range; la+=step){
      const e=scoreAt(lh,la);
      if(e<bestErr){bestErr=e;best={lh,la};}
    }
  }
  return best;
}

function computeModelProbabilities(lh, la) {
  const M=buildScoreMatrix(lh,la), FH=0.44;
  const M1=buildScoreMatrix(lh*FH,la*FH), M2=buildScoreMatrix(lh*(1-FH),la*(1-FH));
  const max=7;
  let pH=0,pD=0,pA=0,pO05=0,pO15=0,pO25=0,pO35=0,pBTTS=0,pNilNil=0,pSD=0;
  let p1HO05=0,p1HO15=0,p2HO05=0,p2HO15=0,pHScore05=0,pHScore15=0,pAScore05=0,pAScore15=0,pWTNH=0,pWTNA=0;
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p=M[i][j];
    if(i>j)pH+=p;else if(i===j)pD+=p;else pA+=p;
    if(i+j>0)pO05+=p;if(i+j>1)pO15+=p;if(i+j>2)pO25+=p;if(i+j>3)pO35+=p;
    if(i>0&&j>0)pBTTS+=p;if(i===0&&j===0)pNilNil+=p;if(i===j&&i>0)pSD+=p;
    if(i>0)pHScore05+=p;if(i>1)pHScore15+=p;if(j>0)pAScore05+=p;if(j>1)pAScore15+=p;
    if(i>j&&j===0)pWTNH+=p;if(j>i&&i===0)pWTNA+=p;
  }
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    if(i+j>0)p1HO05+=M1[i][j];if(i+j>1)p1HO15+=M1[i][j];
    if(i+j>0)p2HO05+=M2[i][j];if(i+j>1)p2HO15+=M2[i][j];
  }
  const htftMap={};
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j];if(!p1)continue;const htR=i>j?'1':i===j?'X':'2';
    for(let k=0;k<=max;k++) for(let l=0;l<=max;l++){
      const p2=M2[k][l];if(!p2)continue;
      const ftR=(i+k)>(j+l)?'1':(i+k)===(j+l)?'X':'2';
      htftMap[htR+'/'+ftR]=(htftMap[htR+'/'+ftR]||0)+p1*p2;
    }
  }
  let pWBH=0,pWBA=0,pDB=0,pBEH=0;
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j];if(!p1)continue;
    for(let k=0;k<=max;k++) for(let l=0;l<=max;l++){
      const p2=M2[k][l];if(!p2)continue;const w=p1*p2;
      if(i>j&&k>l)pWBH+=w;if(i<j&&k<l)pWBA+=w;if(i===j&&k===l)pDB+=w;if(i>0&&j>0&&k>0&&l>0)pBEH+=w;
    }
  }
  return {pH,pD,pA,pO05,pO15,pO25,pO35,pBTTS,pNilNil,pSD,p1HO05,p1HO15,p2HO05,p2HO15,pHScore05,pHScore15,pAScore05,pAScore15,pWTNH,pWTNA,pWTNAny:pWTNH+pWTNA,htftMap,pWBH,pWBA,pDB,pBEH};
}

function findValueBets(modelProbs, odds1xbet, homeName, awayName) {
  const valueBets=[];
  function checkValue(market,pick,modelProb,odd1xbet){
    if(!odd1xbet||odd1xbet<=1)return;
    const impliedProb=oddsToProb(odd1xbet), edge=modelProb-impliedProb;
    if(edge>0.03) valueBets.push({market,pick,modelProb:Math.round(modelProb*100),impliedProb:Math.round(impliedProb*100),odd:odd1xbet,edge:Math.round(edge*100)});
  }
  const o=odds1xbet;
  if(o.home1x2)checkValue('Résultat (1X2)',`Victoire ${homeName}`,modelProbs.pH,o.home1x2);
  if(o.draw1x2)checkValue('Résultat (1X2)','Match nul',modelProbs.pD,o.draw1x2);
  if(o.away1x2)checkValue('Résultat (1X2)',`Victoire ${awayName}`,modelProbs.pA,o.away1x2);
  if(o.dc1x)checkValue('Double Chance',`${homeName} ou Nul`,modelProbs.pH+modelProbs.pD,o.dc1x);
  if(o.dc12)checkValue('Double Chance',`${homeName} ou ${awayName}`,modelProbs.pH+modelProbs.pA,o.dc12);
  if(o.dcx2)checkValue('Double Chance',`Nul ou ${awayName}`,modelProbs.pD+modelProbs.pA,o.dcx2);
  if(o.over05)checkValue('Total buts','Over 0.5',modelProbs.pO05,o.over05);
  if(o.under05)checkValue('Total buts','Under 0.5',1-modelProbs.pO05,o.under05);
  if(o.over15)checkValue('Total buts','Over 1.5',modelProbs.pO15,o.over15);
  if(o.under15)checkValue('Total buts','Under 1.5',1-modelProbs.pO15,o.under15);
  if(o.over25)checkValue('Total buts','Over 2.5',modelProbs.pO25,o.over25);
  if(o.under25)checkValue('Total buts','Under 2.5',1-modelProbs.pO25,o.under25);
  if(o.over35)checkValue('Total buts','Over 3.5',modelProbs.pO35,o.over35);
  if(o.under35)checkValue('Total buts','Under 3.5',1-modelProbs.pO35,o.under35);
  if(o.bttsYes)checkValue('Les deux équipes marquent','Oui',modelProbs.pBTTS,o.bttsYes);
  if(o.bttsNo)checkValue('Les deux équipes marquent','Non',1-modelProbs.pBTTS,o.bttsNo);
  if(o.wtnHome)checkValue(`${homeName} gagne sans encaisser`,'Oui',modelProbs.pWTNH,o.wtnHome);
  if(o.wtnAway)checkValue(`${awayName} gagne sans encaisser`,'Oui',modelProbs.pWTNA,o.wtnAway);
  if(o.scoreDraw)checkValue('Match nul avec buts','Oui',modelProbs.pSD,o.scoreDraw);
  if(o.nilNil)checkValue('0-0','Oui',modelProbs.pNilNil,o.nilNil);
  if(o.ht_over05)checkValue('1ère MT Over 0.5','Oui',modelProbs.p1HO05,o.ht_over05);
  if(o.ht_under05)checkValue('1ère MT Under 0.5','Oui',1-modelProbs.p1HO05,o.ht_under05);
  if(o.ht_over15)checkValue('1ère MT Over 1.5','Oui',modelProbs.p1HO15,o.ht_over15);
  if(o.ht_under15)checkValue('1ère MT Under 1.5','Oui',1-modelProbs.p1HO15,o.ht_under15);
  if(o.sh_over05)checkValue('2ème MT Over 0.5','Oui',modelProbs.p2HO05,o.sh_over05);
  if(o.sh_over15)checkValue('2ème MT Over 1.5','Oui',modelProbs.p2HO15,o.sh_over15);
  if(o.homeScore05)checkValue(`${homeName} marque`,'Oui',modelProbs.pHScore05,o.homeScore05);
  if(o.awayScore05)checkValue(`${awayName} marque`,'Oui',modelProbs.pAScore05,o.awayScore05);
  const htftKeys={'1/1':`${homeName}/${homeName}`,'1/X':`${homeName}/Nul`,'X/X':'Nul/Nul','X/1':`Nul/${homeName}`,'X/2':`Nul/${awayName}`,'2/2':`${awayName}/${awayName}`,'2/X':`${awayName}/Nul`,'2/1':`${awayName}/${homeName}`,'1/2':`${homeName}/${awayName}`};
  Object.entries(htftKeys).forEach(([key,label])=>{if(o[`htft_${key}`])checkValue('HT-FT',label,modelProbs.htftMap[key]||0,o[`htft_${key}`]);});
  return valueBets.sort((a,b)=>b.edge-a.edge);
}

function parseOdds1xbet(oddsData, homeName, awayName) {
  if(!oddsData||oddsData.length===0)return null;
  let bk=null;
  for(const item of oddsData){const found=(item.bookmakers||[]).find(b=>b.id===BOOKMAKER_1XBET);if(found){bk=found;break;}}
  if(!bk){for(const item of oddsData){if(item.bookmakers&&item.bookmakers.length>0){bk=item.bookmakers[0];break;}}}
  if(!bk)return null;
  const result={};
  const getBet=(betName,valueName)=>{const bet=bk.bets?.find(b=>b.name===betName);if(!bet)return null;const v=bet.values?.find(v=>v.value===valueName||v.value?.toLowerCase()===valueName?.toLowerCase());return v?parseFloat(v.odd):null;};
  result.home1x2=getBet('Match Winner','Home');result.draw1x2=getBet('Match Winner','Draw');result.away1x2=getBet('Match Winner','Away');
  result.dc1x=getBet('Double Chance','Home/Draw');result.dc12=getBet('Double Chance','Home/Away');result.dcx2=getBet('Double Chance','Draw/Away');
  ['0.5','1.5','2.5','3.5'].forEach(line=>{const key=line.replace('.','');result[`over${key}`]=getBet('Goals Over/Under',`Over ${line}`);result[`under${key}`]=getBet('Goals Over/Under',`Under ${line}`);});
  result.bttsYes=getBet('Both Teams Score','Yes');result.bttsNo=getBet('Both Teams Score','No');
  result.ht_over05=getBet('First Half - Goals Over/Under','Over 0.5');result.ht_under05=getBet('First Half - Goals Over/Under','Under 0.5');
  result.ht_over15=getBet('First Half - Goals Over/Under','Over 1.5');result.ht_under15=getBet('First Half - Goals Over/Under','Under 1.5');
  result.sh_over05=getBet('Second Half - Goals Over/Under','Over 0.5');result.sh_over15=getBet('Second Half - Goals Over/Under','Over 1.5');
  result.wtnHome=getBet('Win to Nil','Home');result.wtnAway=getBet('Win to Nil','Away');
  result.scoreDraw=getBet('Score - Both Teams To Score','Yes');result.nilNil=getBet('Exact Score','0-0');
  result.homeScore05=getBet(`${homeName} Total Goals`,'Over 0.5');result.awayScore05=getBet(`${awayName} Total Goals`,'Over 0.5');
  return result;
}

function renderValueBet(vb) {
  let cls,badgeCls,label;
  if(vb.edge>=10){cls='value-high';badgeCls='high';label=`🔥 +${vb.edge}%`;}
  else if(vb.edge>=6){cls='value-mid';badgeCls='mid';label=`⚡ +${vb.edge}%`;}
  else{cls='value-low';badgeCls='low';label=`+${vb.edge}%`;}
  return `<div class="value-item ${cls}"><div class="value-market">${vb.market}</div><div class="value-pick">${vb.pick}</div><div class="value-row"><div class="value-odds">Cote: <b>${vb.odd}</b> · Implicite: <b>${vb.impliedProb}%</b> · Modèle: <b>${vb.modelProb}%</b></div><span class="value-badge ${badgeCls}">${label}</span></div></div>`;
}

function confidenceBarHTML(v) {
  const pct=Math.round(v*100),color=pct>=65?"#1a6b3a":pct>=50?"#b08900":"#9b2c2c";
  return `<div style="display:flex;align-items:center;gap:8px;margin-top:4px"><div style="flex:1;height:5px;background:#e8ecf4;border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div></div><span style="font-size:12px;font-weight:800;color:${color};min-width:36px;text-align:right">${pct}%</span></div>`;
}

async function getCalibratedModel(fixture) {
  const fid = fixture.fixture.id;
  if (Object.prototype.hasOwnProperty.call(fixtureOddsCache, fid)) return fixtureOddsCache[fid];
  const home=fixture.teams.home, away=fixture.teams.away;
  let oddsData=null;
  try {
    oddsData = await apiGet(`/odds?fixture=${fid}&bookmaker=${BOOKMAKER_1XBET}`);
  } catch(e) {
    console.warn(`[pronos] Cotes 1xBet indisponibles pour fixture ${fid} (${home.name} vs ${away.name}):`, e.message);
  }
  const parsed = parseOdds1xbet(oddsData, home.name, away.name);
  if (!parsed || !parsed.home1x2) {
    fixtureOddsCache[fid] = null;
    return null;
  }
  const rawH=oddsToProb(parsed.home1x2), rawD=oddsToProb(parsed.draw1x2||2), rawA=oddsToProb(parsed.away1x2);
  const [nH,nD,nA]=normalizeProbabilities([rawH,rawD,rawA]);
  const {lh,la}=estimateLambdas(nH,nD,nA);
  const result = {lh, la, parsed};
  fixtureOddsCache[fid] = result;
  return result;
}

function computeRemainingMarketProbs(hG, aG, lhRem, laRem) {
  const M = buildScoreMatrix(lhRem, laRem, 6);
  let pH=0,pD=0,pA=0,pO05=0,pO15=0,pO25=0,pO35=0,pBTTS=0,pWTNH=0,pWTNA=0,pHomeScores=0,pAwayScores=0;
  for(let i=0;i<=6;i++) for(let j=0;j<=6;j++){
    const p=M[i][j], fh=hG+i, fa=aG+j, tot=fh+fa;
    if(fh>fa)pH+=p; else if(fh===fa)pD+=p; else pA+=p;
    if(tot>0)pO05+=p; if(tot>1)pO15+=p; if(tot>2)pO25+=p; if(tot>3)pO35+=p;
    if(fh>0&&fa>0)pBTTS+=p;
    if(fh>0)pHomeScores+=p; if(fa>0)pAwayScores+=p;
    if(fh>fa&&fa===0)pWTNH+=p;
    if(fa>fh&&fh===0)pWTNA+=p;
  }
  return {pH,pD,pA,pO05,pO15,pO25,pO35,pBTTS,pWTNH,pWTNA,pHomeScores,pAwayScores};
}

async function showPredictions(fixture,container,btn) {
  const live=isLive(fixture);
  if(!live&&container.dataset.loaded==="true"){
    container.style.display=container.style.display==="none"?"block":"none";
    btn.textContent=container.style.display==="none"?"👁 Analyser":"🙈 Masquer";
    if(matchUIState[fixture.fixture.id]) matchUIState[fixture.fixture.id].expanded = container.style.display!=="none";
    return;
  }
  btn.textContent="🔄 Analyse...";btn.disabled=true;
  try {
    const home=fixture.teams.home,away=fixture.teams.away;let html="";
    if(live) {
      const elapsed=fixture.fixture.status.elapsed??45,remaining=Math.max(0,90-elapsed);
      const hG=fixture.goals.home??0,aG=fixture.goals.away??0;
      let ls=null;
      try{
        const sr=await apiGet(`/fixtures/statistics?fixture=${fixture.fixture.id}`);
        if(sr&&sr.length>=2){const gS=(ts,t)=>{const s=ts.statistics.find(s=>s.type===t);return s?(parseInt(s.value)||0):0;};const hS=sr.find(t=>t.team.id===home.id)||sr[0],aS=sr.find(t=>t.team.id===away.id)||sr[1];ls={hP:gS(hS,"Ball Possession")||50,aP:gS(aS,"Ball Possession")||50,hSh:gS(hS,"Total Shots"),aSh:gS(aS,"Total Shots"),hShOn:gS(hS,"Shots on Goal"),aShOn:gS(aS,"Shots on Goal"),hC:gS(hS,"Corner Kicks"),aC:gS(aS,"Corner Kicks")};}
      }catch(e){
        console.warn(`[pronos] Stats live indisponibles pour fixture ${fixture.fixture.id} (${home.name} vs ${away.name}):`, e.message);
      }
      html=`<div class="live-header-note">🔴 ${elapsed}' | Score: ${hG}-${aG}</div>`;
      if(ls)html+=`<div class="stats-box">📊 <b>${home.name}</b>: ${ls.hP}% poss · ${ls.hSh} tirs (${ls.hShOn} cadrés) · ${ls.hC} corners<br>📊 <b>${away.name}</b>: ${ls.aP}% poss · ${ls.aSh} tirs (${ls.aShOn} cadrés) · ${ls.aC} corners</div>`;

      const cal = await getCalibratedModel(fixture);
      let pH,pD,pA,extraRows=[];
      if (cal) {
        // Ancré sur le modèle Poisson pré-match (calibré sur les cotes 1xBet) :
        // on simule uniquement les buts du temps restant, puis on les ajoute au score actuel.
        const frac = remaining/90;
        const dom = ls ? (ls.hP-50)/100 : 0;
        // La possession/domination influence légèrement la répartition des buts restants entre les 2 équipes
        const lhRem = Math.max(0.02, cal.lh*frac*(1+dom*0.3));
        const laRem = Math.max(0.02, cal.la*frac*(1-dom*0.3));
        const mp = computeRemainingMarketProbs(hG, aG, lhRem, laRem);
        pH=mp.pH;pD=mp.pD;pA=mp.pA;

        // On ne garde que les marchés encore réellement incertains (ni quasi acquis, ni quasi exclus par le score actuel)
        const isOpen = p => p>0.04 && p<0.96;
        const candidates=[
          {label:'Plus de 1.5 but (total)',p:mp.pO15},
          {label:'Plus de 2.5 but (total)',p:mp.pO25},
          {label:'Plus de 3.5 but (total)',p:mp.pO35},
          {label:'Les deux équipes marquent',p:mp.pBTTS},
          {label:`${home.name} marque encore`,p:mp.pHomeScores},
          {label:`${away.name} marque encore`,p:mp.pAwayScores},
          {label:`${home.name} gagne sans encaisser`,p:mp.pWTNH},
          {label:`${away.name} gagne sans encaisser`,p:mp.pWTNA},
        ].filter(r=>isOpen(r.p));
        // Priorité aux marchés les plus incertains (proches de 50%), qui sont les plus utiles à suivre en live
        candidates.sort((a,b)=>Math.abs(a.p-0.5)-Math.abs(b.p-0.5));
        extraRows = candidates.slice(0,4);
        if(extraRows.length===0){
          // Tous les marchés annexes sont déjà décidés par le score actuel (ex: BTTS déjà validé, Over déjà atteint...)
          extraRows=[{label:'Plus de 2.5 but (total)',p:mp.pO25}];
        }
      } else {
        // Repli si les cotes 1xBet ne sont pas disponibles : heuristique basée sur score/temps/possession
        const sd=hG-aG, dom = ls?(ls.hP-50)/100:0;
        if(remaining<=5){pH=sd>0?0.93:sd<0?0.03:0.12;pD=sd===0?0.82:0.05;pA=sd<0?0.93:sd>0?0.03:0.12;}
        else if(remaining<=20){pH=sd>0?0.75:sd<0?0.12:0.28+dom*0.25;pD=sd===0?0.48:0.13;pA=sd<0?0.75:sd>0?0.12:0.24-dom*0.25;}
        else if(remaining<=45){pH=sd>0?0.58:sd<0?0.22:0.33+dom*0.15;pD=sd===0?0.38:0.20;pA=sd<0?0.58:sd>0?0.22:0.29-dom*0.15;}
        else{pH=sd>0?0.48:sd<0?0.28:0.35+dom*0.1;pD=sd===0?0.30:0.22;pA=sd<0?0.48:sd>0?0.28:0.32-dom*0.1;}
        const sR=pH+pD+pA;pH/=sR;pD/=sR;pA/=sR;
        const tG=hG+aG,gr=elapsed>0?tG/elapsed:0,proj=tG+gr*remaining;
        const pO25=tG>=3?1:Math.max(0.05,Math.min(0.95,(proj-2.5)/2+0.5));
        extraRows=[{label:'Plus de 2.5 but (total)',p:pO25}];
        html+=`<div class="no-odds" style="padding:8px 0;text-align:left;">⚠️ Cotes 1xBet indisponibles : estimation basée sur le score/temps uniquement.</div>`;
      }
      html+=`<div style="font-size:11px;font-weight:700;color:#1a3a6b;margin-bottom:6px;">📊 Probabilités en temps réel</div>`;
      [{label:`Victoire ${home.name}`,p:pH},{label:'Match nul',p:pD},{label:`Victoire ${away.name}`,p:pA}].sort((a,b)=>b.p-a.p).forEach(r=>{html+=`<div style="padding:6px 0;border-top:1px solid #f0f2f5"><div style="font-size:13px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
      extraRows.forEach(r=>{html+=`<div style="padding:6px 0;border-top:1px solid #f0f2f5"><div style="font-size:13px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
    } else {
      html=`<div class="odds-header">🎯 Value Bets vs 1xBet</div>`;
      const cal = await getCalibratedModel(fixture);
      if(!cal){
        html+=`<div class="no-odds">⚠️ Cotes 1xBet non disponibles pour ce match.</div>`;
      } else {
        const {lh,la,parsed}=cal;
        const modelProbs=computeModelProbabilities(lh,la);
        const valueBets=findValueBets(modelProbs,parsed,home.name,away.name);
        if(valueBets.length===0){
          html+=`<div class="no-odds">✅ Aucun value bet détecté.<br>Les cotes semblent correctement évaluées.</div>`;
        } else {
          html+=`<div style="font-size:11px;color:#8a9ab8;margin-bottom:10px;">${valueBets.length} opportunité${valueBets.length>1?'s':''} · Trié par avantage</div>`;
          html+=valueBets.map(renderValueBet).join("");
        }
        html+=`<div style="font-size:10px;font-weight:700;color:#8a9ab8;margin:12px 0 6px;padding-top:10px;border-top:1px dashed #e0e4ee;text-transform:uppercase;letter-spacing:0.5px;">Probabilités du modèle</div>`;
        [{label:`Victoire ${home.name}`,p:modelProbs.pH},{label:'Match nul',p:modelProbs.pD},{label:`Victoire ${away.name}`,p:modelProbs.pA},{label:'BTTS Oui',p:modelProbs.pBTTS},{label:'Over 2.5',p:modelProbs.pO25}].forEach(r=>{html+=`<div style="padding:5px 0;border-top:1px solid #f0f2f5"><div style="font-size:12px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
      }
      container.dataset.loaded="true";
    }
    container.innerHTML=html;container.style.display="block";
    btn.textContent=live?"🔄 Recalculer":"🙈 Masquer";
    btn.className=live?"pred-btn live-btn":"pred-btn";
    // Sauvegarde l'état pour survivre au rafraîchissement auto (toutes les 2 min)
    matchUIState[fixture.fixture.id] = {expanded:true, html, btnLabel:btn.textContent, btnClass:btn.className};
  } catch(e) {
    container.innerHTML=`<div style="color:#9b2c2c;font-size:12px;">⚠️ Erreur : ${e.message}</div>`;
    container.style.display="block";btn.textContent="👁 Analyser";
  } finally {btn.disabled=false;}
}

function renderMatch(fixture) {
  const home=fixture.teams.home,away=fixture.teams.away;
  const kickoff=new Date(fixture.fixture.date);
  const timeStr=kickoff.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  const elapsed=fixture.fixture.status.elapsed;
  let tb;
  if(isLive(fixture))tb=`<span class="badge-live">${elapsed?elapsed+"'":"Live"}</span>`;
  else if(isFinished(fixture)){const sc=fixture.goals.home!==null?`${fixture.goals.home}-${fixture.goals.away}`:"FT";tb=`<span class="badge-done">✅ ${sc}</span>`;}
  else tb=`<span class="time-badge">${timeStr}</span>`;
  const ss=(isLive(fixture)||isFinished(fixture))&&fixture.goals.home!==null;
  const card=document.createElement("div");card.className="card";
  card.innerHTML=`<div class="card-top"><span class="card-round">${fixture.league.round||""}</span>${tb}</div><div class="teams-row"><div class="team-block"><img src="${home.logo}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain;flex-shrink:0" alt=""/><span class="team-name">${home.name}</span></div><div class="score-block">${ss?`<span class="score">${fixture.goals.home}</span><span class="score-sep">-</span><span class="score">${fixture.goals.away}</span>`:`<span class="vs-text">VS</span>`}</div><div class="team-block away"><img src="${away.logo}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain;flex-shrink:0" alt=""/><span class="team-name">${away.name}</span></div></div><button class="pred-btn${isLive(fixture)?" live-btn":""}">👁 Analyser</button><div class="predictions" style="display:none"></div>`;
  const btn=card.querySelector(".pred-btn"),pc=card.querySelector(".predictions");
  btn.addEventListener("click",()=>showPredictions(fixture,pc,btn));

  const saved = matchUIState[fixture.fixture.id];
  if (saved && saved.expanded) {
    if (isLive(fixture)) {
      // Le score/temps a pu changer depuis le dernier calcul : on relance le calcul en direct.
      showPredictions(fixture,pc,btn);
    } else {
      pc.innerHTML = saved.html;
      pc.style.display = "block";
      pc.dataset.loaded = "true";
      btn.textContent = saved.btnLabel;
      btn.className = saved.btnClass;
    }
  }
  return card;
}

function renderLeagueGroup(leagueId,leagueName,countryName,fixtures,hasLive) {
  const w=document.createElement("div");w.className="league-group";
  const isOpen = !!leagueOpenState[leagueId];
  const h=document.createElement("div");h.className="league-header"+(hasLive?" live-header":"");
  h.innerHTML=`<span class="league-flag">${countryFlag(countryName)}</span><span class="league-title">${formatLeagueName(leagueName,countryName)}</span>${hasLive?`<span class="league-live-badge">LIVE</span>`:""}<span class="league-count${hasLive?" live-count":""}">${fixtures.length}</span><span class="league-chevron${isOpen?" open":""}">▼</span>`;
  const mc=document.createElement("div");mc.className="league-matches"+(isOpen?" open":"");
  fixtures.forEach(f=>mc.appendChild(renderMatch(f)));
  h.addEventListener("click",()=>{const o=mc.classList.toggle("open");h.querySelector(".league-chevron").classList.toggle("open",o);leagueOpenState[leagueId]=o;});
  w.appendChild(h);w.appendChild(mc);return w;
}

function renderTab(fixtures) {
  const ml=document.getElementById("matchList"),fn=document.getElementById("footerNote");
  ml.innerHTML="";fn.innerHTML="";
  if(fixtures.length===0){ml.innerHTML=`<div class="empty-tab">Aucun match dans cet onglet.</div>`;return;}
  const bl={};
  fixtures.forEach(f=>{const k=`${f.league.id}`;if(!bl[k])bl[k]={id:k,name:f.league.name,country:f.league.country,fixtures:[]};bl[k].fixtures.push(f);});
  Object.values(bl).sort((a,b)=>leaguePriority(a.name)-leaguePriority(b.name)).forEach(g=>{
    const hl=g.fixtures.some(f=>isLive(f));
    g.fixtures.sort((a,b)=>{const pa=isLive(a)?0:isUpcoming(a)?1:2,pb=isLive(b)?0:isUpcoming(b)?1:2;if(pa!==pb)return pa-pb;return new Date(a.fixture.date)-new Date(b.fixture.date);});
    ml.appendChild(renderLeagueGroup(g.id,g.name,g.country,g.fixtures,hl));
  });
  fn.innerHTML="🔥 +10% edge fort · ⚡ +6% solide · +3% léger. Joue avec prudence.";
  fn.className="footer-note";
}

function switchTab(tab) {
  currentTab=tab;
  ["upcoming","live","done"].forEach(t=>document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("active",t===tab));
  let fx;
  if(tab==="live")fx=allFixtures.filter(f=>isLive(f));
  else if(tab==="upcoming")fx=allFixtures.filter(f=>isUpcoming(f));
  else fx=allFixtures.filter(f=>isFinished(f));
  renderTab(fx);
  const lc=allFixtures.filter(f=>isLive(f)).length;
  document.getElementById("tabLive").innerHTML=`<span class="live-dot"></span>EN DIRECT${lc>0?` (${lc})`:""}`;
  document.getElementById("tabUpcoming").textContent=`AVANT-MATCH (${allFixtures.filter(f=>isUpcoming(f)).length})`;
  document.getElementById("tabDone").textContent=`TERMINÉS (${allFixtures.filter(f=>isFinished(f)).length})`;
}

async function loadFixtures(silent=false) {
  const se=document.getElementById("status"),eb=document.getElementById("errorBox"),rb=document.getElementById("refreshBtn");
  if(!silent){se.style.display="block";se.innerHTML='<span class="spin">🔄</span> Chargement...';eb.innerHTML="";document.getElementById("matchList").innerHTML="";}
  try {
    const [dateData,liveData]=await Promise.all([apiGet(`/fixtures?date=${todayISO()}`),apiGet(`/fixtures?live=all`).catch(()=>[])]);
    const lm={};(liveData||[]).forEach(f=>{lm[f.fixture.id]=f;});
    const merged=(dateData||[]).map(f=>lm[f.fixture.id]||f);
    (liveData||[]).forEach(f=>{if(!merged.find(m=>m.fixture.id===f.fixture.id))merged.push(f);});
    allFixtures=merged.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date));
    se.style.display="none";rb.style.display="flex";
    switchTab(currentTab);
  } catch(e) {
    if(!silent){se.style.display="none";eb.innerHTML=`<div class="error-box">⚠️ Impossible de récupérer les matchs.</div>`;rb.style.display="flex";}
  }
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
loadFixtures();
setInterval(()=>loadFixtures(true),2*60*1000);
</script>
