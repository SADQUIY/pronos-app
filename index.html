<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";

let currentTab = "live";

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) throw new Error(JSON.stringify(json.errors));
  return json.response;
}

const LIVE_STATUSES = ["1H","HT","2H","ET","BT","P","SUSP","INT","LIVE"];
const DONE_STATUSES = ["FT","AET","PEN","AWD","WO"];
function isLive(f) { return LIVE_STATUSES.includes(f.fixture.status.short); }
function isFinished(f) { return DONE_STATUSES.includes(f.fixture.status.short); }
function isUpcoming(f) { return !isLive(f) && !isFinished(f); }

const LEAGUE_PRIORITY = [
  "world cup","fifa world cup","champions league","uefa champions league",
  "europa league","uefa europa league","conference league","premier league",
  "la liga","primera division","serie a","bundesliga","ligue 1","eredivisie",
  "primeira liga","super lig","botola","botola pro","nations league",
  "afcon","africa cup","copa america","concacaf",
];

function leaguePriority(n) {
  const name = (n||"").toLowerCase();
  for (let i=0;i<LEAGUE_PRIORITY.length;i++) if(name.includes(LEAGUE_PRIORITY[i])) return i;
  return LEAGUE_PRIORITY.length;
}

const COUNTRY_TO_ISO = {
  "morocco":"MA","world":"­¤īŹ","england":"GB","spain":"ES","italy":"IT","germany":"DE",
  "france":"FR","portugal":"PT","netherlands":"NL","belgium":"BE","scotland":"GB",
  "turkey":"TR","greece":"GR","switzerland":"CH","austria":"AT","russia":"RU",

  "cameroon":"CM","ghana":"GH","ivory coast":"CI","mali":"ML","kyrgyzstan":"KG",
  "kazakhstan":"KZ","belarus":"BY","paraguay":"PY","bolivia":"BO","colombia":"CO",
  "chile":"CL","peru":"PE","uruguay":"UY","venezuela":"VE","ecuador":"EC",

  "south africa":"ZA","angola":"AO","iran":"IR","iraq":"IQ","israel":"IL",

  "armenia":"AM","azerbaijan":"AZ","albania":"AL","lithuania":"LT","latvia":"LV",

};

function isoToFlag(iso) {
  if (!iso||iso.length!==2) return "­¤Å│’ĖÅ";
  return String.fromCodePoint(...iso.toUpperCase().split("").map(c=>127397+c.charCodeAt(0)));
}
function countryFlag(c) {
  const k=(c||"").toLowerCase();
  if(k==="world") return "­¤īŹ";
  const iso=COUNTRY_TO_ISO[k];
  return iso?isoToFlag(iso):"­¤Å│’ĖÅ";
}
function formatLeagueName(league, country) {
  const c=(country||"").trim(), l=(league||"").trim();
  if(!c||c.toLowerCase()==="world") return l;
  if(l.toLowerCase().startsWith(c.toLowerCase())) return l;
  return `${c}. ${l}`;
}
function safe(v, f=0) { return (typeof v==="number"&&!isNaN(v))?v:f; }

const INTL_KW = ["world cup","world-cup","uefa","afcon","africa cup","nations league",
  "champions league","europa league","conference league","copa america",
  "concacaf","confederations","qualification","qualifiers","friendlies","international"];

function isNationalTeamMatch(f) {
  const c=(f.league.country||"").toLowerCase();
  const n=(f.league.name||"").toLowerCase();
  return c==="world"||INTL_KW.some(kw=>n.includes(kw));
}

function calcWeightedForm(matches, teamId) {
  if (!matches||matches.length===0) return { winRate:0.33, avgGF:1.2, avgGA:1.2, bttsRate:0.5, over25Rate:0.5 };
  const finished = [...matches]
    .filter(m=>["FT","AET","PEN"].includes(m.fixture.status.short))
    .sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date));
  if (finished.length===0) return { winRate:0.33, avgGF:1.2, avgGA:1.2, bttsRate:0.5, over25Rate:0.5 };
  let totalWeight=0, wins=0, draws=0, gf=0, ga=0, btts=0, over25=0;
  finished.forEach((m, idx) => {
    const weight = Math.pow(0.85, idx);
    totalWeight += weight;
    const isH = m.teams.home.id === teamId;
    const scored = isH ? (m.goals.home??0) : (m.goals.away??0);
    const conceded = isH ? (m.goals.away??0) : (m.goals.home??0);
    const won = isH ? m.teams.home.winner : m.teams.away.winner;
    const draw = m.teams.home.winner===null && m.teams.away.winner===null;
    if (won) wins += weight;
    else if (draw) draws += weight;
    gf += scored * weight;
    ga += conceded * weight;
    if (scored > 0 && conceded > 0) btts += weight;
    if (scored + conceded > 2) over25 += weight;
  });
  return {
    winRate: wins / totalWeight,
    drawRate: draws / totalWeight,
    avgGF: gf / totalWeight,
    avgGA: ga / totalWeight,
    bttsRate: btts / totalWeight,
    over25Rate: over25 / totalWeight,
    matchCount: finished.length,
  };
}

function computePredictions(homeStats, awayStats, homeForm, awayForm, homeName, awayName) {
  const homeGF = safe(homeStats?.goals?.for?.average?.total);
  const homeGA = safe(homeStats?.goals?.against?.average?.total);
  const awayGF = safe(awayStats?.goals?.for?.average?.total);
  const awayGA = safe(awayStats?.goals?.against?.average?.total);
  const homeWinPct = safe(homeStats?.fixtures?.wins?.total) / Math.max(1, safe(homeStats?.fixtures?.played?.total,1));
  const awayWinPct = safe(awayStats?.fixtures?.wins?.total) / Math.max(1, safe(awayStats?.fixtures?.played?.total,1));
  const homeAttackSeason = (homeGF + awayGA) / 2 * 1.1;
  const awayAttackSeason = (awayGF + homeGA) / 2;
  const homeAttackForm = (homeForm.avgGF + awayForm.avgGA) / 2 * 1.1;
  const awayAttackForm = (awayForm.avgGF + homeForm.avgGA) / 2;
  const homeAttack = homeAttackSeason * 0.5 + homeAttackForm * 0.5;
  const awayAttack = awayAttackSeason * 0.5 + awayAttackForm * 0.5;
  const totalAttack = homeAttack + awayAttack || 1;
  const homeWinCombined = homeWinPct * 0.5 + homeForm.winRate * 0.5;
  const awayWinCombined = awayWinPct * 0.5 + awayForm.winRate * 0.5;
  let pHome = (homeAttack/totalAttack)*0.6 + homeWinCombined*0.4;
  let pAway = (awayAttack/totalAttack)*0.6 + awayWinCombined*0.4;
  pHome = Math.max(0.05, Math.min(0.85, pHome));
  pAway = Math.max(0.05, Math.min(0.85, pAway));
  let pDraw = Math.max(0.1, 1-pHome-pAway);
  const s=pHome+pDraw+pAway; pHome/=s; pDraw/=s; pAway/=s;
  const r=[{label:`Victoire ${homeName}`,pct:pHome},{label:"Match nul",pct:pDraw},{label:`Victoire ${awayName}`,pct:pAway}].sort((a,b)=>b.pct-a.pct)[0];
  const expectedGoals = homeAttack + awayAttack;
  const pOver25Season = Math.max(0.1, Math.min(0.9, (expectedGoals-1.5)/3+0.5));
  const pOver25Form = (homeForm.over25Rate + awayForm.over25Rate) / 2;
  const pOver25 = pOver25Season*0.5 + pOver25Form*0.5;
  const pHSseason = Math.max(0.15, Math.min(0.9, homeAttack/1.4));
  const pASseason = Math.max(0.15, Math.min(0.9, awayAttack/1.4));
  const pBTTSSeason = pHSseason * pASseason;
  const pBTTSForm = (homeForm.bttsRate + awayForm.bttsRate) / 2;
  const pBTTS = pBTTSSeason*0.5 + pBTTSForm*0.5;
  const pDH=pHome+pDraw, pDA=pAway+pDraw;
  const dc=pDH>=pDA?{label:`DC: ${homeName} ou nul`,pct:pDH}:{label:`DC: ${awayName} ou nul`,pct:pDA};
  return {
    predictions: [
      {type:"R├®sultat (1N2)", pick:r.label, confidence:r.pct},
      {type:"Total de buts", pick:pOver25>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts", confidence:pOver25>=0.5?pOver25:1-pOver25},
      {type:"BTTS", pick:pBTTS>=0.5?"Les deux ├®quipes marquent: Oui":"Les deux ├®quipes marquent: Non", confidence:pBTTS>=0.5?pBTTS:1-pBTTS},
      {type:"Double chance", pick:dc.label, confidence:Math.min(0.95,dc.pct)},
    ].sort((a,b)=>b.confidence-a.confidence),
    formNote: `­¤ōł Forme ${homeName}: ${homeForm.matchCount||0} matchs ┬Ę ${Math.round(homeForm.winRate*100)}% victoires ┬Ę ${homeForm.avgGF?.toFixed(1)||"?"} buts/match\n­¤ōł Forme ${awayName}: ${awayForm.matchCount||0} matchs ┬Ę ${Math.round(awayForm.winRate*100)}% victoires ┬Ę ${awayForm.avgGF?.toFixed(1)||"?"} buts/match`,
    pH: pHome, pD: pDraw, pA: pAway, pBTTS, pOver25, homeForm, awayForm,
  };
}

function computeExtendedMarkets(homeForm, awayForm, pH, pD, pA, pBTTS, pOver25, homeName, awayName) {
  const MAX = 7, FH = 0.44;
  const FACT = [1]; for(let i=1;i<=MAX;i++) FACT[i]=FACT[i-1]*i;
  const pmf=(l,k)=>Math.exp(-l)*Math.pow(l,k)/FACT[k];
  const clamp=(v,a=0.01,b=0.99)=>Math.max(a,Math.min(b,v));
  function estimateLambdas() {
    let best={lh:1.3,la:1.1},bestErr=Infinity;
    for(let lh=0.2;lh<=4.5;lh+=0.1){
      for(let la=0.2;la<=4.5;la+=0.1){
        let ph=0,pd=0,pa=0,po=0,pb=0;
        for(let i=0;i<=MAX;i++) for(let j=0;j<=MAX;j++){
          const p=pmf(lh,i)*pmf(la,j);
          if(i>j)ph+=p;else if(i===j)pd+=p;else pa+=p;
          if(i+j>2.5)po+=p; if(i>0&&j>0)pb+=p;
        }
        const e=Math.pow(ph-pH,2)+Math.pow(pd-pD,2)+Math.pow(pa-pA,2)+Math.pow(po-pOver25,2)*1.5+Math.pow(pb-pBTTS,2)*1.5;
        if(e<bestErr){bestErr=e;best={lh,la};}
      }
    }
    return best;
  }
  const {lh,la}=estimateLambdas();
  const lh1=lh*FH,la1=la*FH,lh2=lh*(1-FH),la2=la*(1-FH);
  function matrix(lH,lA){const m=[];for(let i=0;i<=MAX;i++){m[i]=[];for(let j=0;j<=MAX;j++)m[i][j]=pmf(lH,i)*pmf(lA,j);}return m;}
  const M=matrix(lh,la),HT=matrix(lh1,la1),SH=matrix(lh2,la2);
  let pWTNH=0,pWTNA=0,pScoreDraw=0,pNilNil=0;
  let pWBH=0,pWBA=0,pDrawBoth=0,pBTTSEH=0;
  let pLNLH=0,pLNLA=0,pN1=0,pN2=0;
  let pHO05=0,pHO15=0,pAO05=0,pAO15=0,pHW1D=0,pAW1D=0;
  const htftMap={},igMap={15:0,30:0,45:0,60:0,75:0};
  for(let i=0;i<=MAX;i++) for(let j=0;j<=MAX;j++){
    const p=M[i][j];
    if(i>j&&j===0)pWTNH+=p; if(j>i&&i===0)pWTNA+=p;
    if(i===j&&i>0)pScoreDraw+=p; if(i===0&&j===0)pNilNil+=p;
    if(i>0)pHO05+=p; if(i>1)pHO15+=p; if(j>0)pAO05+=p; if(j>1)pAO15+=p;
    if(i>j&&Math.abs(i-j)===1)pHW1D+=p; if(i===j)pHW1D+=p;
    if(j>i&&Math.abs(j-i)===1)pAW1D+=p; if(i===j)pAW1D+=p;
  }
  for(let i=0;i<=MAX;i++) for(let j=0;j<=MAX;j++){
    const ph=HT[i][j];if(!ph)continue;
    const htR=i>j?'1':i===j?'X':'2';
    for(let k=0;k<=MAX;k++) for(let l=0;l<=MAX;l++){
      const ps=SH[k][l];if(!ps)continue;
      const w=ph*ps,fh=i+k,fa=j+l;
      const ftR=fh>fa?'1':fh===fa?'X':'2';
      htftMap[htR+'/'+ftR]=(htftMap[htR+'/'+ftR]||0)+w;
      if(i>j&&k>l)pWBH+=w; if(i<j&&k<l)pWBA+=w;
      if(i===j&&k===l)pDrawBoth+=w;
      if(i>0&&j>0&&k>0&&l>0)pBTTSEH+=w;
      if(i===0&&j===0)pN1+=ph; if(k===0&&l===0)pN2+=ps;
      if((i>j||(i===j))&&fh>=fa)pLNLH+=w;
      if((i<j||(i===j))&&fa>=fh)pLNLA+=w;
    }
  }
  [15,30,45,60,75].forEach(min=>{const l=(lh+la)*(min/90);igMap[min]=1-pmf(l,0);});
  const pAWTN=pWTNH+pWTNA,pNeither=pN1*pN2;
  const pHQ=Math.min(0.95,pH+pD*0.5),pAQ=Math.min(0.95,pA+pD*0.5);
  const hFR=safe(homeForm?.avgGA)*0.15+0.08,aFR=safe(awayForm?.avgGA)*0.15+0.08;
  const pSO=clamp(1-Math.pow(1-hFR-aFR,2)),pPen=clamp(1-Math.pow(1-(hFR+aFR)*0.4,1.5));
  const markets=[];
  function push(type,pYes){const pNo=1-pYes;markets.push({type,pick:pYes>=pNo?'Oui':'Non',confidence:clamp(Math.max(pYes,pNo))});}
  push('Une ├®quipe gagne sans encaisser (Any Team To Win To Nil)',pAWTN);
  push(`${homeName} gagne sans encaisser`,pWTNH);
  push(`${awayName} gagne sans encaisser`,pWTNA);
  push('Match nul avec buts (Score Draw)',pScoreDraw);
  push('0-0 (Aucun but)',pNilNil);
  const htftCombos=[
    {label:`${homeName}/${homeName}`,p:htftMap['1/1']||0},
    {label:`${homeName}/Nul`,p:htftMap['1/X']||0},
    {label:`Nul/Nul`,p:htftMap['X/X']||0},
    {label:`Nul/${homeName}`,p:htftMap['X/1']||0},
    {label:`Nul/${awayName}`,p:htftMap['X/2']||0},
    {label:`${awayName}/${awayName}`,p:htftMap['2/2']||0},
    {label:`${awayName}/Nul`,p:htftMap['2/X']||0},
    {label:`${awayName}/${homeName}`,p:htftMap['2/1']||0},
    {label:`${homeName}/${awayName}`,p:htftMap['1/2']||0},
  ].sort((a,b)=>b.p-a.p);
  markets.push({type:'Mi-temps / Final (HT-FT)',pick:htftCombos[0].label,confidence:clamp(htftCombos[0].p*3)});
  push(`${homeName} gagne les deux mi-temps`,pWBH);
  push(`${awayName} gagne les deux mi-temps`,pWBA);
  push('Nul dans les deux mi-temps',pDrawBoth);
  push('Les deux ├®quipes marquent dans chaque mi-temps',pBTTSEH);
  push('Aucun but dans les deux mi-temps',pNeither);
  const pFG1H=lh1/(lh1+la1+0.01),pFG1A=la1/(lh1+la1+0.01);
  const pFG2H=lh2/(lh2+la2+0.01),pFG2A=la2/(lh2+la2+0.01);
  markets.push({type:'1er but 1├©re mi-temps',pick:pFG1H>=pFG1A?`${homeName} marque en 1er`:`${awayName} marque en 1er`,confidence:clamp(Math.max(pFG1H,pFG1A))});
  markets.push({type:'1er but 2├©me mi-temps',pick:pFG2H>=pFG2A?`${homeName} marque en 1er`:`${awayName} marque en 1er`,confidence:clamp(Math.max(pFG2H,pFG2A))});
  [15,30,45,60,75].forEach(min=>push(`But avant la ${min}e minute`,igMap[min]));
  [[1,15],[1,20],[1,25],[1,30],[1,35],[1,40]].forEach(([s,e])=>{push(`But de ${s}' ├Ā ${e}' (1├©re MT)`,1-pmf((lh+la)*((e-s)/90),0));});
  const rtC=[
    {label:`${homeName} + Plus de 2.5 buts`,p:pH*pOver25},
    {label:`${awayName} + Plus de 2.5 buts`,p:pA*pOver25},
    {label:`Nul + Moins de 2.5 buts`,p:pD*(1-pOver25)},
    {label:`${homeName} + BTTS Oui`,p:pH*pBTTS},
    {label:`${awayName} + BTTS Oui`,p:pA*pBTTS},
    {label:`Nul + BTTS Oui`,p:pD*pBTTS},
    {label:`${homeName} + Moins de 2.5 buts`,p:pH*(1-pOver25)},
    {label:`${awayName} + Moins de 2.5 buts`,p:pA*(1-pOver25)},
  ].sort((a,b)=>b.p-a.p);
  markets.push({type:'R├®sultat + Total (meilleure combo)',pick:rtC[0].label,confidence:clamp(rtC[0].p*2.5)});
  push(`${homeName} marque (Over 0.5)`,pHO05);
  push(`${awayName} marque (Over 0.5)`,pAO05);
  push(`${homeName} marque 2+ buts (Over 1.5)`,pHO15);
  push(`${awayName} marque 2+ buts (Over 1.5)`,pAO15);
  push(`${homeName} m├©ne et ne perd pas`,pLNLH);
  push(`${awayName} m├©ne et ne perd pas`,pLNLA);
  push(`${homeName} gagne par 1 but ou nul`,pHW1D);
  push(`${awayName} gagne par 1 but ou nul`,pAW1D);
  push('Carton rouge dans le match',pSO);
  push('Penalty siffl├® dans le match',pPen);
  push('Ni penalty ni carton rouge',clamp(1-pSO-pPen));
  push(`${homeName} se qualifie`,pHQ);
  push(`${awayName} se qualifie`,pAQ);
  push(`${homeName} se qualifie en temps r├®glementaire`,pH);
  push(`${awayName} se qualifie en temps r├®glementaire`,pA);
  return markets.sort((a,b)=>b.confidence-a.confidence);
}

async function computeNationalPredictions(home, away) {
  const [h2hRes, homeCurr, homePrev, awayCurr, awayPrev] = await Promise.all([
    apiGet(`/fixtures/headtohead?h2h=${home.id}-${away.id}`),
    apiGet(`/fixtures?team=${home.id}&season=2024`),
    apiGet(`/fixtures?team=${home.id}&season=2023`),
    apiGet(`/fixtures?team=${away.id}&season=2024`),
    apiGet(`/fixtures?team=${away.id}&season=2023`),
  ]);
  const homeAll = [...(homeCurr||[]),...(homePrev||[])];
  const awayAll = [...(awayCurr||[]),...(awayPrev||[])];
  const homeForm = calcWeightedForm(homeAll, home.id);
  const awayForm = calcWeightedForm(awayAll, away.id);
  const h2hFinished = [...(h2hRes||[])].filter(m=>["FT","AET","PEN"].includes(m.fixture.status.short))
    .sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date));
  let pH = homeForm.winRate*0.55+0.05, pA = awayForm.winRate*0.55;
  if (h2hFinished.length > 0) {
    const h2hForm = calcWeightedForm(h2hFinished, home.id);
    pH = homeForm.winRate*0.4 + h2hForm.winRate*0.3 + 0.05;
    pA = awayForm.winRate*0.4 + (1-h2hForm.winRate-h2hForm.drawRate)*0.3;
  }
  pH=Math.max(0.05,Math.min(0.85,pH)); pA=Math.max(0.05,Math.min(0.85,pA));
  let pD=Math.max(0.12,1-pH-pA); const s=pH+pD+pA; pH/=s;pD/=s;pA/=s;
  const r=[{label:`Victoire ${home.name}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${away.name}`,pct:pA}].sort((a,b)=>b.pct-a.pct)[0];
  const pO=(homeForm.over25Rate+awayForm.over25Rate)/2, pB=(homeForm.bttsRate+awayForm.bttsRate)/2;
  const pDH=Math.min(0.95,pH+pD), pDA=Math.min(0.95,pA+pD);
  const dc=pDH>=pDA?{label:`DC: ${home.name} ou nul`,pct:pDH}:{label:`DC: ${away.name} ou nul`,pct:pDA};
  return {
    predictions:[
      {type:"R├®sultat (1N2)",pick:r.label,confidence:r.pct},
      {type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO},
      {type:"BTTS",pick:pB>=0.5?"Les deux ├®quipes marquent: Oui":"Les deux ├®quipes marquent: Non",confidence:pB>=0.5?pB:1-pB},
      {type:"Double chance",pick:dc.label,confidence:dc.pct},
    ].sort((a,b)=>b.confidence-a.confidence),
    formNote:`­¤ōł ${home.name}: ${homeForm.matchCount||0} matchs ┬Ę ${Math.round(homeForm.winRate*100)}% victoires\n­¤ōł ${away.name}: ${awayForm.matchCount||0} matchs ┬Ę ${Math.round(awayForm.winRate*100)}% victoires${h2hFinished.length>0?` ┬Ę ${h2hFinished.length} confrontations directes`:""}`,
    pH, pD, pA, pBTTS:pB, pOver25:pO, homeForm, awayForm,
  };
}

async function computeLivePredictions(fixture) {
  const home=fixture.teams.home, away=fixture.teams.away;
  const homeGoals=fixture.goals.home??0, awayGoals=fixture.goals.away??0;
  const elapsed=fixture.fixture.status.elapsed??45;
  const remaining=Math.max(0,90-elapsed);
  const status=fixture.fixture.status.short;
  let liveStats=null;
  try {
    const statsRes=await apiGet(`/fixtures/statistics?fixture=${fixture.fixture.id}`);
    if(statsRes&&statsRes.length>=2) {
      const getStat=(ts,type)=>{const s=ts.statistics.find(s=>s.type===type);return s?(parseInt(s.value)||0):0;};
      const hS=statsRes.find(t=>t.team.id===home.id)||statsRes[0];
      const aS=statsRes.find(t=>t.team.id===away.id)||statsRes[1];
      liveStats={
        homePoss:getStat(hS,"Ball Possession")||50, awayPoss:getStat(aS,"Ball Possession")||50,
        homeShots:getStat(hS,"Total Shots"), awayShots:getStat(aS,"Total Shots"),
        homeShotsOn:getStat(hS,"Shots on Goal"), awayShotsOn:getStat(aS,"Shots on Goal"),
        homeCorners:getStat(hS,"Corner Kicks"), awayCorners:getStat(aS,"Corner Kicks"),
      };
    }
  } catch(e){}
  const predictions=[];
  const scoreDiff=homeGoals-awayGoals;
  const dominance=liveStats?(liveStats.homePoss-50)/100:0;
  if(homeGoals>0&&awayGoals>0) {
    predictions.push({type:"BTTS",pick:"Les deux ├®quipes marquent: Oui Ō£ģ",confidence:1.0});
  } else if(status==="2H"&&elapsed>75) {
    const noGoal=homeGoals===0?home.name:away.name;
    predictions.push({type:"BTTS",pick:`Les deux ├®quipes marquent: Non (${noGoal} n'a pas marqu├®)`,confidence:0.88});
  } else {
    const hForce=liveStats?(liveStats.homeShotsOn*0.5+liveStats.homePoss/200):0.5;
    const aForce=liveStats?(liveStats.awayShotsOn*0.5+liveStats.awayPoss/200):0.5;
    const pHM=homeGoals>0?1:Math.min(0.85,hForce*remaining/50);
    const pAM=awayGoals>0?1:Math.min(0.85,aForce*remaining/50);
    const pB=pHM*pAM;
    predictions.push({type:"BTTS",pick:pB>=0.5?"Les deux ├®quipes marquent: Oui":"Les deux ├®quipes marquent: Non",confidence:pB>=0.5?pB:1-pB});
  }
  const totalGoals=homeGoals+awayGoals;
  const goalsRate=elapsed>0?totalGoals/elapsed:0;
  const projected=totalGoals+goalsRate*remaining;
  if(totalGoals>=3) {
    predictions.push({type:"Total de buts",pick:"Plus de 2.5 buts Ō£ģ (d├®j├Ā atteint)",confidence:1.0});
  } else {
    const pO=Math.max(0.05,Math.min(0.95,(projected-2.5)/2+0.5));
    predictions.push({type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO});
  }
  let pH,pD,pA;
  if(remaining<=5){pH=scoreDiff>0?0.93:scoreDiff<0?0.03:0.12;pD=scoreDiff===0?0.82:0.05;pA=scoreDiff<0?0.93:scoreDiff>0?0.03:0.12;}
  else if(remaining<=20){pH=scoreDiff>0?0.75:scoreDiff<0?0.12:0.28+dominance*0.25;pD=scoreDiff===0?0.48:0.13;pA=scoreDiff<0?0.75:scoreDiff>0?0.12:0.24-dominance*0.25;}
  else if(remaining<=45){pH=scoreDiff>0?0.58:scoreDiff<0?0.22:0.33+dominance*0.15;pD=scoreDiff===0?0.38:0.20;pA=scoreDiff<0?0.58:scoreDiff>0?0.22:0.29-dominance*0.15;}
  else{pH=scoreDiff>0?0.48:scoreDiff<0?0.28:0.35+dominance*0.1;pD=scoreDiff===0?0.30:0.22;pA=scoreDiff<0?0.48:scoreDiff>0?0.28:0.32-dominance*0.1;}
  const sR=pH+pD+pA; pH/=sR;pD/=sR;pA/=sR;
  const rOpts=[{label:`Victoire ${home.name}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${away.name}`,pct:pA}].sort((a,b)=>b.pct-a.pct);
  predictions.push({type:`R├®sultat final (${elapsed}')`,pick:rOpts[0].label,confidence:rOpts[0].pct});
  const pDH=Math.min(0.98,pH+pD), pDA=Math.min(0.98,pA+pD);
  predictions.push({type:"Double chance",pick:pDH>=pDA?`DC: ${home.name} ou nul`:`DC: ${away.name} ou nul`,confidence:Math.max(pDH,pDA)});
  let statsNote="";
  if(liveStats) {
    statsNote=`<div class="stats-box">­¤ōŖ <b>${home.name}</b>: ${liveStats.homePoss}% possession ┬Ę ${liveStats.homeShots} tirs (${liveStats.homeShotsOn} cadr├®s) ┬Ę ${liveStats.homeCorners} corners<br>­¤ōŖ <b>${away.name}</b>: ${liveStats.awayPoss}% possession ┬Ę ${liveStats.awayShots} tirs (${liveStats.awayShotsOn} cadr├®s) ┬Ę ${liveStats.awayCorners} corners</div>`;
  }
  return {predictions:predictions.sort((a,b)=>b.confidence-a.confidence),statsNote};
}

function confidenceBarHTML(v) {
  const pct=Math.round(v*100);
  const color=pct>=65?"#1a6b3a":pct>=50?"#b08900":"#9b2c2c";
  return `<div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="bar-pct" style="color:${color}">${pct}%</span></div>`;
}

function renderTab(fixtures) {

  if(fixtures.length===0){ml.innerHTML=`<div class="empty-tab">Aucun match dans cet onglet.</div>`;return;}

  fixtures.forEach(f=>{const k=`${f.league.id}`;if(!byLeague[k])byLeague[k]={name:f.league.name,country:f.league.country,fixtures:[]};byLeague[k].fixtures.push(f);});
  Object.values(byLeague).sort((a,b)=>leaguePriority(a.name)-leaguePriority(b.name)).forEach(g=>{
    const hasLive=g.fixtures.some(f=>isLive(f));
    g.fixtures.sort((a,b)=>{const pa=isLive(a)?0:isUpcoming(a)?1:2,pb=isLive(b)?0:isUpcoming(b)?1:2;if(pa!==pb)return pa-pb;return new Date(a.fixture.date)-new Date(b.fixture.date);});
    ml.appendChild(renderLeagueGroup(g.name,g.country,g.fixtures,hasLive));
  });
  fn.innerHTML="Pronostics : stats de saison + forme pond├®r├®e + mod├©le Poisson. Outil d'aide ├Ā la r├®flexion.";
  fn.className="footer-note";
}

function switchTab(tab) {
  currentTab=tab;
  ["live","upcoming","done"].forEach(t=>document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("active",t===tab));
  let fx;
  if(tab==="live") fx=allFixtures.filter(f=>isLive(f));
  else if(tab==="upcoming") fx=allFixtures.filter(f=>isUpcoming(f));
  else fx=allFixtures.filter(f=>isFinished(f));
  renderTab(fx);
  const lc=allFixtures.filter(f=>isLive(f)).length;
  document.getElementById("tabLive").innerHTML=`<span class="live-dot"></span>EN DIRECT${lc>0?` (${lc})`:""}`;
  document.getElementById("tabUpcoming").textContent=`AVANT-MATCH (${allFixtures.filter(f=>isUpcoming(f)).length})`;
  document.getElementById("tabDone").textContent=`TERMIN├ēS (${allFixtures.filter(f=>isFinished(f)).length})`;
}

async function loadFixtures(silent=false) {
  const se=document.getElementById("status"), eb=document.getElementById("errorBox"), rb=document.getElementById("refreshBtn");
  if(!silent){se.style.display="block";se.innerHTML='<span class="spin">­¤öä</span> Chargement...';eb.innerHTML="";document.getElementById("matchList").innerHTML="";}
  try {
    const [dateData,liveData]=await Promise.all([
      apiGet(`/fixtures?date=${todayISO()}`),
      apiGet(`/fixtures?live=all`).catch(()=>[]),
    ]);
    const liveMap={};
    (liveData||[]).forEach(f=>{liveMap[f.fixture.id]=f;});
    const merged=(dateData||[]).map(f=>liveMap[f.fixture.id]||f);
    (liveData||[]).forEach(f=>{if(!merged.find(m=>m.fixture.id===f.fixture.id))merged.push(f);});
    allFixtures=merged.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date));
    se.style.display="none"; rb.style.display="flex";
    switchTab(currentTab);
  } catch(e) {
    if(!silent){se.style.display="none";eb.innerHTML=`<div class="error-box">ŌÜĀ’ĖÅ Impossible de r├®cup├®rer les matchs. R├®essaie dans un instant.</div>`;rb.style.display="flex";}
  }
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
loadFixtures();
setInterval(()=>loadFixtures(true), 2*60*1000);
</script>
