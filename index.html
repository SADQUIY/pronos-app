<body>
<div class="header">

</div>
<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";
let allFixtures = [], currentTab = "live";

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) throw new Error(JSON.stringify(json.errors));
  return json.response;
}
const LIVE_STATUSES = ["1H","HT","2H","ET","BT","P","SUSP","INT","LIVE"];
const DONE_STATUSES = ["FT","AET","PEN","AWD","WO"];
function isLive(f) { return LIVE_STATUSES.includes(f.fixture.status.short); }
function isFinished(f) { return DONE_STATUSES.includes(f.fixture.status.short); }
function isUpcoming(f) { return !isLive(f) && !isFinished(f); }
const LEAGUE_PRIORITY = ["world cup","fifa world cup","champions league","uefa champions league","europa league","uefa europa league","conference league","premier league","la liga","primera division","serie a","bundesliga","ligue 1","eredivisie","primeira liga","super lig","botola","botola pro","nations league","afcon","africa cup","copa america","concacaf"];
function leaguePriority(n) { const name=(n||"").toLowerCase(); for(let i=0;i<LEAGUE_PRIORITY.length;i++) if(name.includes(LEAGUE_PRIORITY[i])) return i; return LEAGUE_PRIORITY.length; }
const COUNTRY_TO_ISO = {"morocco":"MA","world":"🌍","england":"GB","spain":"ES","italy":"IT","germany":"DE","france":"FR","portugal":"PT","netherlands":"NL","belgium":"BE","scotland":"GB","turkey":"TR","greece":"GR","switzerland":"CH","austria":"AT","russia":"RU","ukraine":"UA","poland":"PL","czech-republic":"CZ","denmark":"DK","sweden":"SE","norway":"NO","croatia":"HR","serbia":"RS","romania":"RO","brazil":"BR","argentina":"AR","usa":"US","mexico":"MX","china":"CN","japan":"JP","south-korea":"KR","australia":"AU","egypt":"EG","algeria":"DZ","tunisia":"TN","saudi-arabia":"SA","qatar":"QA","uae":"AE","nigeria":"NG","senegal":"SN","cameroon":"CM","ghana":"GH","ivory coast":"CI","mali":"ML","kyrgyzstan":"KG","kazakhstan":"KZ","belarus":"BY","paraguay":"PY","bolivia":"BO","colombia":"CO","chile":"CL","peru":"PE","uruguay":"UY","venezuela":"VE","ecuador":"EC","costa rica":"CR","guatemala":"GT","honduras":"HN","kenya":"KE","ethiopia":"ET","south africa":"ZA","angola":"AO","iran":"IR","iraq":"IQ","israel":"IL","jordan":"JO","kuwait":"KW","india":"IN","thailand":"TH","vietnam":"VN","indonesia":"ID","malaysia":"MY","philippines":"PH","finland":"FI","bulgaria":"BG","slovakia":"SK","slovenia":"SI","hungary":"HU","moldova":"MD","georgia":"GE","armenia":"AM","azerbaijan":"AZ","albania":"AL","lithuania":"LT","latvia":"LV","estonia":"EE","iceland":"IS","ireland":"IE","somalia":"SO","togo":"TG","congo":"CG","rwanda":"RW","cuba":"CU","haiti":"HT","jamaica":"JM"};
function isoToFlag(iso) { if(!iso||iso.length!==2) return "🏳️"; return String.fromCodePoint(...iso.toUpperCase().split("").map(c=>127397+c.charCodeAt(0))); }
function countryFlag(c) { const k=(c||"").toLowerCase(); if(k==="world") return "🌍"; const iso=COUNTRY_TO_ISO[k]; return iso?isoToFlag(iso):"🏳️"; }
function formatLeagueName(league,country) { const c=(country||"").trim(),l=(league||"").trim(); if(!c||c.toLowerCase()==="world") return l; if(l.toLowerCase().startsWith(c.toLowerCase())) return l; return `${c}. ${l}`; }
function safe(v,f=0) { return (typeof v==="number"&&!isNaN(v))?v:f; }
const INTL_KW = ["world cup","world-cup","uefa","afcon","africa cup","nations league","champions league","europa league","conference league","copa america","concacaf","confederations","qualification","qualifiers","friendlies","international"];
function isNationalTeamMatch(f) { const c=(f.league.country||"").toLowerCase(),n=(f.league.name||"").toLowerCase(); return c==="world"||INTL_KW.some(kw=>n.includes(kw)); }

function calcWeightedForm(matches, teamId) {
  if (!matches||matches.length===0) return {winRate:0.33,drawRate:0.25,avgGF:1.2,avgGA:1.2,bttsRate:0.5,over25Rate:0.5,matchCount:0};
  const finished=[...matches].filter(m=>["FT","AET","PEN"].includes(m.fixture.status.short)).sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date));
  if(finished.length===0) return {winRate:0.33,drawRate:0.25,avgGF:1.2,avgGA:1.2,bttsRate:0.5,over25Rate:0.5,matchCount:0};
  let tw=0,wins=0,draws=0,gf=0,ga=0,btts=0,over25=0;
  finished.forEach((m,idx)=>{ const w=Math.pow(0.85,idx); tw+=w; const isH=m.teams.home.id===teamId; const scored=isH?(m.goals.home??0):(m.goals.away??0); const conceded=isH?(m.goals.away??0):(m.goals.home??0); const won=isH?m.teams.home.winner:m.teams.away.winner; const draw=m.teams.home.winner===null&&m.teams.away.winner===null; if(won)wins+=w; else if(draw)draws+=w; gf+=scored*w; ga+=conceded*w; if(scored>0&&conceded>0)btts+=w; if(scored+conceded>2)over25+=w; });
  return {winRate:wins/tw,drawRate:draws/tw,avgGF:gf/tw,avgGA:ga/tw,bttsRate:btts/tw,over25Rate:over25/tw,matchCount:finished.length};
}

function computePredictions(homeStats,awayStats,homeForm,awayForm,homeName,awayName) {
  const homeGF=safe(homeStats?.goals?.for?.average?.total),homeGA=safe(homeStats?.goals?.against?.average?.total);
  const awayGF=safe(awayStats?.goals?.for?.average?.total),awayGA=safe(awayStats?.goals?.against?.average?.total);
  const homeWinPct=safe(homeStats?.fixtures?.wins?.total)/Math.max(1,safe(homeStats?.fixtures?.played?.total,1));
  const awayWinPct=safe(awayStats?.fixtures?.wins?.total)/Math.max(1,safe(awayStats?.fixtures?.played?.total,1));
  const haS=(homeGF+awayGA)/2*1.1,aaS=(awayGF+homeGA)/2,haF=(homeForm.avgGF+awayForm.avgGA)/2*1.1,aaF=(awayForm.avgGF+homeForm.avgGA)/2;
  const ha=haS*0.5+haF*0.5,aa=aaS*0.5+aaF*0.5,ta=ha+aa||1;
  let pH=(ha/ta)*0.6+(homeWinPct*0.5+homeForm.winRate*0.5)*0.4;
  let pA=(aa/ta)*0.6+(awayWinPct*0.5+awayForm.winRate*0.5)*0.4;
  pH=Math.max(0.05,Math.min(0.85,pH));pA=Math.max(0.05,Math.min(0.85,pA));
  let pD=Math.max(0.1,1-pH-pA);const s=pH+pD+pA;pH/=s;pD/=s;pA/=s;
  const r=[{label:`Victoire ${homeName}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${awayName}`,pct:pA}].sort((a,b)=>b.pct-a.pct)[0];
  const eg=ha+aa;
  const pO=Math.max(0.1,Math.min(0.9,(eg-1.5)/3+0.5))*0.5+((homeForm.over25Rate+awayForm.over25Rate)/2)*0.5;
  const pB=Math.max(0.15,Math.min(0.9,ha/1.4))*Math.max(0.15,Math.min(0.9,aa/1.4))*0.5+((homeForm.bttsRate+awayForm.bttsRate)/2)*0.5;
  const pDH=pH+pD,pDA=pA+pD;
  const dc=pDH>=pDA?{label:`DC: ${homeName} ou nul`,pct:pDH}:{label:`DC: ${awayName} ou nul`,pct:pDA};
  return {
    predictions:[{type:"Résultat (1N2)",pick:r.label,confidence:r.pct},{type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO},{type:"BTTS",pick:pB>=0.5?"Les deux équipes marquent: Oui":"Les deux équipes marquent: Non",confidence:pB>=0.5?pB:1-pB},{type:"Double chance",pick:dc.label,confidence:Math.min(0.95,dc.pct)}].sort((a,b)=>b.confidence-a.confidence),
    formNote:`📈 Forme ${homeName}: ${homeForm.matchCount||0} matchs · ${Math.round(homeForm.winRate*100)}% victoires · ${homeForm.avgGF?.toFixed(1)||"?"} buts/match\n📈 Forme ${awayName}: ${awayForm.matchCount||0} matchs · ${Math.round(awayForm.winRate*100)}% victoires · ${awayForm.avgGF?.toFixed(1)||"?"} buts/match`,
    pH,pD,pA,pBTTS:pB,pOver25:pO,homeForm,awayForm,
  };
}

// ============================================================
// MARCHÉS ÉTENDUS — marchés 1xBet connus uniquement
// ============================================================
function computeExtendedMarkets(homeForm,awayForm,pH,pD,pA,pBTTS,pOver25,homeName,awayName,currentHomeGoals=null,currentAwayGoals=null,elapsedMin=null) {
  const MAX=7;
  const FACT=[1]; for(let i=1;i<=MAX;i++) FACT[i]=FACT[i-1]*i;
  const pmf=(l,k)=>Math.exp(-l)*Math.pow(l,k)/FACT[k];
  const clamp=(v,a=0.01,b=0.99)=>Math.max(a,Math.min(b,v));
  const isLiveMatch=currentHomeGoals!==null&&currentAwayGoals!==null&&elapsedMin!==null;
  const hG=isLiveMatch?currentHomeGoals:0, aG=isLiveMatch?currentAwayGoals:0, tG=hG+aG;
  const remaining=isLiveMatch?Math.max(0,90-elapsedMin):90;
  const fracRemaining=remaining/90;
  const is1H=isLiveMatch&&elapsedMin>0&&elapsedMin<45;
  const is2H=isLiveMatch&&elapsedMin>45;
  const isHT=isLiveMatch&&elapsedMin===45;
  const htResult=(is2H||isHT)?(hG>aG?'1':hG<aG?'2':'X'):null;
  function estimateLambdas(){
    let best={lh:1.3,la:1.1},bestErr=Infinity;
    for(let lh=0.2;lh<=4.5;lh+=0.1) for(let la=0.2;la<=4.5;la+=0.1){
      let ph=0,pd=0,pa=0,po=0,pb=0;
      for(let i=0;i<=MAX;i++) for(let j=0;j<=MAX;j++){
        const p=pmf(lh,i)*pmf(la,j);
        if(i>j)ph+=p; else if(i===j)pd+=p; else pa+=p;
        if(i+j>2.5)po+=p; if(i>0&&j>0)pb+=p;
      }
      const e=Math.pow(ph-pH,2)+Math.pow(pd-pD,2)+Math.pow(pa-pA,2)+Math.pow(po-pOver25,2)*1.5+Math.pow(pb-pBTTS,2)*1.5;
      if(e<bestErr){bestErr=e;best={lh,la};}
    }
    return best;
  }
  const{lh:lh90,la:la90}=estimateLambdas();
  const lhR=lh90*fracRemaining, laR=la90*fracRemaining;
  const FH=0.44, lh1=lh90*FH, la1=la90*FH, lh2=lh90*(1-FH), la2=la90*(1-FH);
  function matrix(lH,lA){const m=[];for(let i=0;i<=MAX;i++){m[i]=[];for(let j=0;j<=MAX;j++)m[i][j]=pmf(lH,i)*pmf(lA,j);}return m;}
  const M90=matrix(lh90,la90), MR=matrix(lhR,laR), M1=matrix(lh1,la1), M2=matrix(lh2,la2);
  const markets=[];
  function push(type,pYes){const c=clamp(Math.max(pYes,1-pYes));markets.push({type,pick:pYes>=0.5?'Oui':'Non',confidence:c});}
  function pushPick(type,pick,conf){markets.push({type,pick,confidence:clamp(conf)});}

  // 1. RÉSULTAT 1X2
  const r=[{label:`Victoire ${homeName}`,pct:pH},{label:'Match nul',pct:pD},{label:`Victoire ${awayName}`,pct:pA}].sort((a,b)=>b.pct-a.pct)[0];
  pushPick('Résultat (1X2)',r.label,r.pct);

  // 2. DOUBLE CHANCE
  const pDH=Math.min(0.97,pH+pD), pDA=Math.min(0.97,pA+pD);
  const dc=pDH>=pDA?{label:`DC: ${homeName} ou Nul`,p:pDH}:{label:`DC: ${awayName} ou Nul`,p:pDA};
  pushPick('Double Chance',dc.label,dc.p);

  // 3. BTTS
  if(isLiveMatch){
    if(hG>0&&aG>0)push('Les deux équipes marquent (BTTS)',1);
    else if(hG>0)push('Les deux équipes marquent (BTTS)',1-pmf(laR,0));
    else if(aG>0)push('Les deux équipes marquent (BTTS)',1-pmf(lhR,0));
    else push('Les deux équipes marquent (BTTS)',(1-pmf(lhR,0))*(1-pmf(laR,0)));
  } else {push('Les deux équipes marquent (BTTS)',pBTTS);}

  // 4. WIN TO NIL
  if(isLiveMatch){
    const pHWTN=aG>0?0:pmf(laR,0)*pH, pAWTN=hG>0?0:pmf(lhR,0)*pA;
    push(`${homeName} gagne sans encaisser`,pHWTN);
    push(`${awayName} gagne sans encaisser`,pAWTN);
    push('Une équipe gagne sans encaisser',pHWTN+pAWTN);
  } else {
    let pWTNH=0,pWTNA=0;
    for(let i=1;i<=MAX;i++)pWTNH+=M90[i][0];
    for(let j=1;j<=MAX;j++)pWTNA+=M90[0][j];
    push(`${homeName} gagne sans encaisser`,pWTNH);
    push(`${awayName} gagne sans encaisser`,pWTNA);
    push('Une équipe gagne sans encaisser',pWTNH+pWTNA);
  }

  // 5. SCORE DRAW / 0-0
  if(isLiveMatch){
    push('0-0 (Aucun but)',tG>0?0:pmf(lhR,0)*pmf(laR,0));
    let pSD=0;
    if(hG===aG&&hG>0)pSD=pD;
    else if(hG===aG&&hG===0){for(let i=1;i<=MAX;i++)pSD+=MR[i][i];}
    else pSD=pD*0.5;
    push('Match nul avec buts (Score Draw)',pSD);
  } else {
    let pSD=0; for(let i=1;i<=MAX;i++)pSD+=M90[i][i];
    push('0-0 (Aucun but)',M90[0][0]);
    push('Match nul avec buts (Score Draw)',pSD);
  }

  // 6. HT-FT
  if(is2H||isHT){
    const htLabel=htResult==='1'?homeName:htResult==='2'?awayName:'Nul';
    const ftOpts=[{label:`${htLabel}/${homeName}`,conf:pH},{label:`${htLabel}/Nul`,conf:pD},{label:`${htLabel}/${awayName}`,conf:pA}].sort((a,b)=>b.conf-a.conf);
    pushPick('Mi-temps / Final (HT-FT)',ftOpts[0].label,ftOpts[0].conf);
  } else if(!is1H&&!isHT){
    const htftMap={};
    for(let i=0;i<=MAX;i++) for(let j=0;j<=MAX;j++){
      const ph=M1[i][j];if(!ph)continue;const htR=i>j?'1':i===j?'X':'2';
      for(let k=0;k<=MAX;k++) for(let l=0;l<=MAX;l++){
        const ps=M2[k][l];if(!ps)continue;
        const ftR=(i+k)>(j+l)?'1':(i+k)===(j+l)?'X':'2';
        htftMap[htR+'/'+ftR]=(htftMap[htR+'/'+ftR]||0)+ph*ps;
      }
    }
    const combos=[{label:`${homeName}/${homeName}`,p:htftMap['1/1']||0},{label:`${homeName}/Nul`,p:htftMap['1/X']||0},{label:`Nul/Nul`,p:htftMap['X/X']||0},{label:`Nul/${homeName}`,p:htftMap['X/1']||0},{label:`Nul/${awayName}`,p:htftMap['X/2']||0},{label:`${awayName}/${awayName}`,p:htftMap['2/2']||0},{label:`${awayName}/Nul`,p:htftMap['2/X']||0},{label:`${awayName}/${homeName}`,p:htftMap['2/1']||0},{label:`${homeName}/${awayName}`,p:htftMap['1/2']||0}].sort((a,b)=>b.p-a.p);
    pushPick('Mi-temps / Final (HT-FT)',combos[0].label,combos[0].p*3);
  }

  // 7. WIN BOTH HALVES / DRAW BOTH HALVES / BTTS EACH HALF
  if(!isLiveMatch){
    let pWBH=0,pWBA=0,pDB=0,pBEH=0;
    for(let i=0;i<=MAX;i++) for(let j=0;j<=MAX;j++){
      const ph=M1[i][j];if(!ph)continue;
      for(let k=0;k<=MAX;k++) for(let l=0;l<=MAX;l++){
        const ps=M2[k][l];if(!ps)continue;const w=ph*ps;
        if(i>j&&k>l)pWBH+=w; if(i<j&&k<l)pWBA+=w;
        if(i===j&&k===l)pDB+=w; if(i>0&&j>0&&k>0&&l>0)pBEH+=w;
      }
    }
    push(`${homeName} gagne les deux mi-temps`,pWBH);
    push(`${awayName} gagne les deux mi-temps`,pWBA);
    push('Nul dans les deux mi-temps',pDB);
    push('Les deux équipes marquent dans chaque mi-temps',pBEH);
  } else if(is2H){
    push(`${homeName} gagne les deux mi-temps`,htResult==='1'?pH:0);
    push(`${awayName} gagne les deux mi-temps`,htResult==='2'?pA:0);
    push('Nul dans les deux mi-temps',htResult==='X'?pD:0);
    push('Les deux équipes marquent dans chaque mi-temps',(hG>0&&aG>0)?(1-pmf(lhR,0))*(1-pmf(laR,0)):0);
  }

  // 8. TOTAUX MATCH ENTIER
  if(isLiveMatch){
    [0.5,1.5,2.5,3.5].forEach(th=>{
      const needed=Math.max(0,Math.ceil(th+0.01)-tG);
      if(needed<=0){push(`Total buts Over ${th}`,1);return;}
      let pO=0;
      for(let i=needed;i<=MAX*2;i++){let p=0;for(let h=0;h<=Math.min(i,MAX);h++){const a=i-h;if(a>MAX)continue;p+=pmf(lhR,h)*pmf(laR,a);}pO+=p;}
      push(`Total buts Over ${th}`,Math.min(0.99,pO));
    });
  } else {

    push('Total buts Over 1.5',1-M90[0][0]-M90[1][0]-M90[0][1]);
    push('Total buts Over 2.5',pOver25);
    let pO35=0;for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++)if(i+j>3.5)pO35+=M90[i][j];

  }

  // 9. TOTAUX 1ÈRE MI-TEMPS

    push('Total 1ère MT Over 0.5',p1O05);
    push('Total 1ère MT Over 1.5',p1O15);
  } else if(is2H||isHT){
    // 1ère MT terminée — score réel connu
    push('Total 1ère MT Over 0.5',tG>0?1:0);
    push('Total 1ère MT Over 1.5',tG>1?1:0);
  } else if(is1H){
    const remFH=Math.max(0,45-elapsedMin), lFHR=(lh90+la90)*FH*(remFH/45);
    push('Total 1ère MT Over 0.5',tG>0?1:1-pmf(lFHR,0));

  }

  // 10. TOTAUX 2ÈME MI-TEMPS
  if(!isLiveMatch){
    let p2O05=0,p2O15=0;

    push('Total 2ème MT Over 0.5',p2O05);
    push('Total 2ème MT Over 1.5',p2O15);
  } else if(is2H){
    const rem2H=Math.max(0,90-elapsedMin), l2HR=(lh90+la90)*(1-FH)*(rem2H/45);
    push('Total 2ème MT Over 0.5',1-pmf(l2HR,0));
    push('Total 2ème MT Over 1.5',1-pmf(l2HR,0)-pmf(l2HR,1));
  }

  // 11. TOTAUX PAR ÉQUIPE — MATCH ENTIER
  if(isLiveMatch){
    push(`${homeName} marque (Over 0.5)`,hG>=1?1:1-pmf(lhR,0));
    push(`${homeName} 2+ buts (Over 1.5)`,hG>=2?1:hG===1?1-pmf(lhR,0):1-pmf(lhR,0)-pmf(lhR,1));
    push(`${awayName} marque (Over 0.5)`,aG>=1?1:1-pmf(laR,0));
    push(`${awayName} 2+ buts (Over 1.5)`,aG>=2?1:aG===1?1-pmf(laR,0):1-pmf(laR,0)-pmf(laR,1));
  } else {

    for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){if(i>0)pHO05+=M90[i][j];if(i>1)pHO15+=M90[i][j];if(j>0)pAO05+=M90[i][j];if(j>1)pAO15+=M90[i][j];}
    push(`${homeName} marque (Over 0.5)`,pHO05);
    push(`${homeName} 2+ buts (Over 1.5)`,pHO15);
    push(`${awayName} marque (Over 0.5)`,pAO05);
    push(`${awayName} 2+ buts (Over 1.5)`,pAO15);
  }

  // 12. TOTAUX PAR ÉQUIPE — PAR MI-TEMPS (avant-match seulement)
  if(!isLiveMatch){
    let pH1O05=0,pH1O15=0,pA1O05=0,pA1O15=0;
    for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){if(i>0)pH1O05+=M1[i][j];if(i>1)pH1O15+=M1[i][j];if(j>0)pA1O05+=M1[i][j];if(j>1)pA1O15+=M1[i][j];}
    push(`${homeName} marque en 1ère MT (Over 0.5)`,pH1O05);
    push(`${homeName} 2+ buts en 1ère MT (Over 1.5)`,pH1O15);
    push(`${awayName} marque en 1ère MT (Over 0.5)`,pA1O05);
    push(`${awayName} 2+ buts en 1ère MT (Over 1.5)`,pA1O15);
    let pH2O05=0,pH2O15=0,pA2O05=0,pA2O15=0;
    for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){if(i>0)pH2O05+=M2[i][j];if(i>1)pH2O15+=M2[i][j];if(j>0)pA2O05+=M2[i][j];if(j>1)pA2O15+=M2[i][j];}
    push(`${homeName} marque en 2ème MT (Over 0.5)`,pH2O05);
    push(`${homeName} 2+ buts en 2ème MT (Over 1.5)`,pH2O15);
    push(`${awayName} marque en 2ème MT (Over 0.5)`,pA2O05);
    push(`${awayName} 2+ buts en 2ème MT (Over 1.5)`,pA2O15);
  }

  return markets.filter(m=>m.confidence>0.01).sort((a,b)=>b.confidence-a.confidence);
}

async function computeNationalPredictions(home,away) {
  const [h2hRes,hC,hP,aC,aP]=await Promise.all([apiGet(`/fixtures/headtohead?h2h=${home.id}-${away.id}`),apiGet(`/fixtures?team=${home.id}&season=2024`),apiGet(`/fixtures?team=${home.id}&season=2023`),apiGet(`/fixtures?team=${away.id}&season=2024`),apiGet(`/fixtures?team=${away.id}&season=2023`)]);
  const hAll=[...(hC||[]),...(hP||[])],aAll=[...(aC||[]),...(aP||[])];
  const hF=calcWeightedForm(hAll,home.id),aF=calcWeightedForm(aAll,away.id);
  const h2h=[...(h2hRes||[])].filter(m=>["FT","AET","PEN"].includes(m.fixture.status.short)).sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date));
  let pH=hF.winRate*0.55+0.05,pA=aF.winRate*0.55;
  if(h2h.length>0){const h2hF=calcWeightedForm(h2h,home.id);pH=hF.winRate*0.4+h2hF.winRate*0.3+0.05;pA=aF.winRate*0.4+(1-h2hF.winRate-h2hF.drawRate)*0.3;}
  pH=Math.max(0.05,Math.min(0.85,pH));pA=Math.max(0.05,Math.min(0.85,pA));
  let pD=Math.max(0.12,1-pH-pA);const s=pH+pD+pA;pH/=s;pD/=s;pA/=s;
  const r=[{label:`Victoire ${home.name}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${away.name}`,pct:pA}].sort((a,b)=>b.pct-a.pct)[0];
  const pO=(hF.over25Rate+aF.over25Rate)/2,pB=(hF.bttsRate+aF.bttsRate)/2;
  const pDH=Math.min(0.95,pH+pD),pDA=Math.min(0.95,pA+pD);
  const dc=pDH>=pDA?{label:`DC: ${home.name} ou nul`,pct:pDH}:{label:`DC: ${away.name} ou nul`,pct:pDA};
  return {predictions:[{type:"Résultat (1N2)",pick:r.label,confidence:r.pct},{type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO},{type:"BTTS",pick:pB>=0.5?"Les deux équipes marquent: Oui":"Les deux équipes marquent: Non",confidence:pB>=0.5?pB:1-pB},{type:"Double chance",pick:dc.label,confidence:dc.pct}].sort((a,b)=>b.confidence-a.confidence),formNote:`📈 ${home.name}: ${hF.matchCount||0} matchs · ${Math.round(hF.winRate*100)}% victoires\n📈 ${away.name}: ${aF.matchCount||0} matchs · ${Math.round(aF.winRate*100)}% victoires${h2h.length>0?` · ${h2h.length} confrontations directes`:""}`,pH,pD,pA,pBTTS:pB,pOver25:pO,homeForm:hF,awayForm:aF};
}

async function computeLivePredictions(fixture) {

  else if(status==="2H"&&elapsed>75){const noGoal=homeGoals===0?home.name:away.name;predictions.push({type:"BTTS",pick:`Les deux équipes marquent: Non (${noGoal} n'a pas marqué)`,confidence:0.88});}
  else{const hForce=liveStats?(liveStats.homeShotsOn*0.5+liveStats.homePoss/200):0.5,aForce=liveStats?(liveStats.awayShotsOn*0.5+liveStats.awayPoss/200):0.5;const pHM=homeGoals>0?1:Math.min(0.85,hForce*remaining/50),pAM=awayGoals>0?1:Math.min(0.85,aForce*remaining/50);const pB=pHM*pAM;predictions.push({type:"BTTS",pick:pB>=0.5?"Les deux équipes marquent: Oui":"Les deux équipes marquent: Non",confidence:pB>=0.5?pB:1-pB});}
  const totalGoals=homeGoals+awayGoals,goalsRate=elapsed>0?totalGoals/elapsed:0,projected=totalGoals+goalsRate*remaining;
  if(totalGoals>=3)predictions.push({type:"Total de buts",pick:"Plus de 2.5 buts ✅ (déjà atteint)",confidence:1.0});
  else{const pO=Math.max(0.05,Math.min(0.95,(projected-2.5)/2+0.5));predictions.push({type:"Total de buts",pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts",confidence:pO>=0.5?pO:1-pO});}
  let pH,pD,pA;

  else if(remaining<=20){pH=scoreDiff>0?0.75:scoreDiff<0?0.12:0.28+dominance*0.25;pD=scoreDiff===0?0.48:0.13;pA=scoreDiff<0?0.75:scoreDiff>0?0.12:0.24-dominance*0.25;}
  else if(remaining<=45){pH=scoreDiff>0?0.58:scoreDiff<0?0.22:0.33+dominance*0.15;pD=scoreDiff===0?0.38:0.20;pA=scoreDiff<0?0.58:scoreDiff>0?0.22:0.29-dominance*0.15;}
  else{pH=scoreDiff>0?0.48:scoreDiff<0?0.28:0.35+dominance*0.1;pD=scoreDiff===0?0.30:0.22;pA=scoreDiff<0?0.48:scoreDiff>0?0.28:0.32-dominance*0.1;}
  const sR=pH+pD+pA;pH/=sR;pD/=sR;pA/=sR;
  const rOpts=[{label:`Victoire ${home.name}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${away.name}`,pct:pA}].sort((a,b)=>b.pct-a.pct);
  predictions.push({type:`Résultat final (${elapsed}')`,pick:rOpts[0].label,confidence:rOpts[0].pct});
  const pDH=Math.min(0.98,pH+pD),pDA=Math.min(0.98,pA+pD);

  return {predictions:predictions.sort((a,b)=>b.confidence-a.confidence),statsNote};
}

      const others=allMarkets.filter(m=>classicPriority(m)===999).sort((a,b)=>b.confidence-a.confidence);
      html=`<div class="pre-header-note">📅 Analyse pré-match</div>`;
      html+=`<div class="form-box">${result.formNote.replace(/\n/g,"<br>")}</div>`;
      html+=classics.map(p=>`<div class="pred-item"><div class="pred-type">${p.type}</div><div class="pred-pick">${p.pick}</div>${confidenceBarHTML(p.confidence)}</div>`).join("");
      if(others.length>0){
        html+=`<div style="font-size:10px;font-weight:700;color:#8a9ab8;margin:10px 0 6px;padding-top:8px;border-top:1px dashed #e0e4ee;text-transform:uppercase;letter-spacing:0.5px;">📊 Totaux</div>`;
        html+=others.map(p=>`<div class="pred-item"><div class="pred-type">${p.type}</div><div class="pred-pick">${p.pick}</div>${confidenceBarHTML(p.confidence)}</div>`).join("");
      }
      container.dataset.loaded="true";
    }
    container.innerHTML=html;container.style.display="block";
    btn.textContent=live?"🔄 Recalculer":"🙈 Masquer";
    btn.className=live?"pred-btn live-btn":"pred-btn";
  } catch(e) {
    container.innerHTML=`<div style="color:#9b2c2c;font-size:12px;">⚠️ Stats indisponibles pour ce match.</div>`;
    container.style.display="block";btn.textContent="👁 Voir les pronostics";
  } finally {btn.disabled=false;}
}

function renderMatch(fixture) {
  const home=fixture.teams.home,away=fixture.teams.away;
  const kickoff=new Date(fixture.fixture.date);
  const timeStr=kickoff.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  const elapsed=fixture.fixture.status.elapsed;
  let timeBadge;
  if(isLive(fixture))timeBadge=`<span class="badge-live">${elapsed?elapsed+"'":"Live"}</span>`;
  else if(isFinished(fixture)){const sc=fixture.goals.home!==null?`${fixture.goals.home}-${fixture.goals.away}`:"FT";timeBadge=`<span class="badge-done">✅ ${sc}</span>`;}
  else timeBadge=`<span class="time">${timeStr}</span>`;
  const showScore=(isLive(fixture)||isFinished(fixture))&&fixture.goals.home!==null;
  const card=document.createElement("div");card.className="card";
  card.innerHTML=`<div class="card-top"><span class="card-round">${fixture.league.round||""}</span>${timeBadge}</div><div class="teams-row"><div class="team-block"><img class="team-logo" src="${home.logo}" alt=""/><span class="team-name">${home.name}</span></div><div class="score-block">${showScore?`<span class="score">${fixture.goals.home}</span><span class="score-sep">-</span><span class="score">${fixture.goals.away}</span>`:`<span class="vs-text">VS</span>`}</div><div class="team-block away"><img class="team-logo" src="${away.logo}" alt=""/><span class="team-name">${away.name}</span></div></div><button class="pred-btn${isLive(fixture)?" live-btn":""}">👁 Voir les pronostics</button><div class="predictions" style="display:none"></div>`;
  const btn=card.querySelector(".pred-btn"),pc=card.querySelector(".predictions");
  btn.addEventListener("click",()=>showPredictions(fixture,pc,btn));
  return card;
}

function renderLeagueGroup(leagueName,countryName,fixtures,hasLive) {
  const w=document.createElement("div");w.className="league-group";
  const h=document.createElement("div");h.className="league-header"+(hasLive?" live-header":"");
  h.innerHTML=`<span class="league-flag">${countryFlag(countryName)}</span><span class="league-title">${formatLeagueName(leagueName,countryName)}</span>${hasLive?`<span class="league-live-badge">LIVE</span>`:""}<span class="league-count${hasLive?" live-count":""}">${fixtures.length}</span><span class="league-chevron">▼</span>`;
  const mc=document.createElement("div");mc.className="league-matches";
  fixtures.forEach(f=>mc.appendChild(renderMatch(f)));
  h.addEventListener("click",()=>{const o=mc.classList.toggle("open");h.querySelector(".league-chevron").classList.toggle("open",o);});
  w.appendChild(h);w.appendChild(mc);return w;
}

function renderTab(fixtures) {
  const ml=document.getElementById("matchList"),fn=document.getElementById("footerNote");
  ml.innerHTML="";fn.innerHTML="";
  if(fixtures.length===0){ml.innerHTML=`<div class="empty-tab">Aucun match dans cet onglet.</div>`;return;}
  const bl={};
  fixtures.forEach(f=>{const k=`${f.league.id}`;if(!bl[k])bl[k]={name:f.league.name,country:f.league.country,fixtures:[]};bl[k].fixtures.push(f);});
  Object.values(bl).sort((a,b)=>leaguePriority(a.name)-leaguePriority(b.name)).forEach(g=>{
    const hl=g.fixtures.some(f=>isLive(f));
    g.fixtures.sort((a,b)=>{const pa=isLive(a)?0:isUpcoming(a)?1:2,pb=isLive(b)?0:isUpcoming(b)?1:2;if(pa!==pb)return pa-pb;return new Date(a.fixture.date)-new Date(b.fixture.date);});
    ml.appendChild(renderLeagueGroup(g.name,g.country,g.fixtures,hl));
  });
  fn.innerHTML="Pronostics basés sur stats de saison + forme pondérée. Outil d'aide à la réflexion.";
  fn.className="footer-note";
}

function switchTab(tab) {
  currentTab=tab;
  ["live","upcoming","done"].forEach(t=>document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("active",t===tab));
  let fx;
  if(tab==="live")fx=allFixtures.filter(f=>isLive(f));
  else if(tab==="upcoming")fx=allFixtures.filter(f=>isUpcoming(f));
  else fx=allFixtures.filter(f=>isFinished(f));
  renderTab(fx);
  const lc=allFixtures.filter(f=>isLive(f)).length;
  document.getElementById("tabLive").innerHTML=`<span class="live-dot"></span>EN DIRECT${lc>0?` (${lc})`:""}`;
  document.getElementById("tabUpcoming").textContent=`AVANT-MATCH (${allFixtures.filter(f=>isUpcoming(f)).length})`;
  document.getElementById("tabDone").textContent=`TERMINÉS (${allFixtures.filter(f=>isFinished(f)).length})`;
}

async function loadFixtures(silent=false) {
  const se=document.getElementById("status"),eb=document.getElementById("errorBox"),rb=document.getElementById("refreshBtn");
  if(!silent){se.style.display="block";se.innerHTML='<span class="spin">🔄</span> Chargement...';eb.innerHTML="";document.getElementById("matchList").innerHTML="";}
  try {
    const [dateData,liveData]=await Promise.all([apiGet(`/fixtures?date=${todayISO()}`),apiGet(`/fixtures?live=all`).catch(()=>[])]);
    const lm={};(liveData||[]).forEach(f=>{lm[f.fixture.id]=f;});
    const merged=(dateData||[]).map(f=>lm[f.fixture.id]||f);
    (liveData||[]).forEach(f=>{if(!merged.find(m=>m.fixture.id===f.fixture.id))merged.push(f);});
    allFixtures=merged.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date));
    se.style.display="none";rb.style.display="flex";
    switchTab(currentTab);
  } catch(e) {
    if(!silent){se.style.display="none";eb.innerHTML=`<div class="error-box">⚠️ Impossible de récupérer les matchs. Réessaie dans un instant.</div>`;rb.style.display="flex";}
  }
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
loadFixtures();
setInterval(()=>loadFixtures(true),2*60*1000);
</script>
