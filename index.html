<body>

<div class="header">
  <div class="header-top">
    <h1>⚽ Pronos du jour</h1>
    <span class="date-str" id="dateLabel"></span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tabLive" onclick="switchTab('live')">
      <span class="live-dot"></span>EN DIRECT
    </button>

<div class="content">

  <div id="matchList"></div>
  <div id="footerNote"></div>
</div>

<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";
let allFixtures = [];
let currentTab = "live";

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) throw new Error(JSON.stringify(json.errors));
  return json.response;
}

const LIVE_STATUSES = ["1H","HT","2H","ET","BT","P","SUSP","INT","LIVE"];
const DONE_STATUSES = ["FT","AET","PEN","AWD","WO"];

function isLive(f) { return LIVE_STATUSES.includes(f.fixture.status.short); }
function isFinished(f) { return DONE_STATUSES.includes(f.fixture.status.short); }
function isUpcoming(f) { return !isLive(f) && !isFinished(f); }

const LEAGUE_PRIORITY = [
  "world cup","fifa world cup",
  "champions league","uefa champions league",
  "europa league","uefa europa league",
  "conference league","uefa europa conference league",
  "premier league",
  "la liga","primera division",
  "serie a",
  "bundesliga",
  "ligue 1",
  "eredivisie",
  "primeira liga",
  "super lig",
  "botola","botola pro",
  "nations league",
  "afcon","africa cup",
  "copa america",
  "concacaf",
];

function leaguePriority(leagueName) {
  const name = (leagueName || "").toLowerCase();
  for (let i = 0; i < LEAGUE_PRIORITY.length; i++) {
    if (name.includes(LEAGUE_PRIORITY[i])) return i;
  }
  return LEAGUE_PRIORITY.length;
}

const COUNTRY_TO_ISO = {
  "morocco":"MA","world":"🌍","england":"GB","spain":"ES","italy":"IT",
  "germany":"DE","france":"FR","portugal":"PT","netherlands":"NL",
  "belgium":"BE","scotland":"GB","turkey":"TR","greece":"GR",
  "switzerland":"CH","austria":"AT","russia":"RU","ukraine":"UA",
  "poland":"PL","czech-republic":"CZ","denmark":"DK","sweden":"SE",
  "norway":"NO","croatia":"HR","serbia":"RS","romania":"RO",
  "brazil":"BR","argentina":"AR","usa":"US","mexico":"MX",
  "china":"CN","japan":"JP","south-korea":"KR","australia":"AU",
  "egypt":"EG","algeria":"DZ","tunisia":"TN","saudi-arabia":"SA",
  "qatar":"QA","uae":"AE","nigeria":"NG","senegal":"SN",
  "cameroon":"CM","ghana":"GH","ivory coast":"CI","mali":"ML",
  "kyrgyzstan":"KG","kazakhstan":"KZ","belarus":"BY","paraguay":"PY",
  "bolivia":"BO","colombia":"CO","chile":"CL","peru":"PE","uruguay":"UY",
  "venezuela":"VE","ecuador":"EC","costa rica":"CR","guatemala":"GT",
  "honduras":"HN","el salvador":"SV","panama":"PA","cuba":"CU",
  "jamaica":"JM","haiti":"HT","kenya":"KE","ethiopia":"ET",
  "tanzania":"TZ","uganda":"UG","zimbabwe":"ZW","zambia":"ZM",
  "south africa":"ZA","angola":"AO","mozambique":"MZ","madagascar":"MG",
  "iran":"IR","iraq":"IQ","israel":"IL","jordan":"JO","syria":"SY",
  "lebanon":"LB","kuwait":"KW","bahrain":"BH","oman":"OM","yemen":"YE",
  "india":"IN","pakistan":"PK","bangladesh":"BD","sri lanka":"LK",
  "thailand":"TH","vietnam":"VN","indonesia":"ID","malaysia":"MY",
  "philippines":"PH","myanmar":"MM","cambodia":"KH","laos":"LA",
  "new zealand":"NZ","fiji":"FJ","papua new guinea":"PG",
  "finland":"FI","bulgaria":"BG","slovakia":"SK","slovenia":"SI",
  "hungary":"HU","moldova":"MD","georgia":"GE","armenia":"AM",
  "azerbaijan":"AZ","albania":"AL","kosovo":"XK","north macedonia":"MK",
  "bosnia":"BA","montenegro":"ME","lithuania":"LT","latvia":"LV",
  "estonia":"EE","luxembourg":"LU","cyprus":"CY","malta":"MT",
  "iceland":"IS","ireland":"IE","wales":"GB","northern ireland":"GB",
  "somalia":"SO","libya":"LY","sudan":"SD","chad":"TD","niger":"NE",
  "burkina faso":"BF","guinea":"GN","sierra leone":"SL","liberia":"LR",
  "togo":"TG","benin":"BJ","gabon":"GA","congo":"CG","rwanda":"RW",
};

function isoToFlag(iso) {
  if (!iso || iso.length !== 2) return "🏳️";
  return String.fromCodePoint(...iso.toUpperCase().split("").map(c => 127397 + c.charCodeAt(0)));
}

function countryFlag(country) {
  const key = (country || "").toLowerCase();
  if (key === "world") return "🌍";
  const iso = COUNTRY_TO_ISO[key];
  return iso ? isoToFlag(iso) : "🏳️";
}

function formatLeagueName(leagueName, countryName) {
  const country = (countryName || "").trim();
  const league = (leagueName || "").trim();
  if (!country || country.toLowerCase() === "world") return league;
  if (league.toLowerCase().startsWith(country.toLowerCase())) return league;
  return `${country}. ${league}`;
}

function safe(v, fallback = 0) {
  return (typeof v === "number" && !isNaN(v)) ? v : fallback;
}

const INTERNATIONAL_KEYWORDS = [
  "world cup","world-cup","uefa","afcon","africa cup","nations league",
  "champions league","europa league","conference league","copa america",
  "concacaf","confederations","qualification","qualifiers","friendlies","international",
];

function isNationalTeamMatch(fixture) {
  const country = (fixture.league.country || "").toLowerCase();
  const leagueName = (fixture.league.name || "").toLowerCase();
  return country === "world" || INTERNATIONAL_KEYWORDS.some(kw => leagueName.includes(kw));
}

function computePredictions(homeStats, awayStats, homeName, awayName) {
  const homeGF = safe(homeStats?.goals?.for?.average?.total);
  const homeGA = safe(homeStats?.goals?.against?.average?.total);
  const awayGF = safe(awayStats?.goals?.for?.average?.total);
  const awayGA = safe(awayStats?.goals?.against?.average?.total);
  const homeWinPct = safe(homeStats?.fixtures?.wins?.total) / Math.max(1, safe(homeStats?.fixtures?.played?.total, 1));
  const awayWinPct = safe(awayStats?.fixtures?.wins?.total) / Math.max(1, safe(awayStats?.fixtures?.played?.total, 1));
  const homeAttack = (homeGF + awayGA) / 2 * 1.1;
  const awayAttack = (awayGF + homeGA) / 2;
  const totalAttack = homeAttack + awayAttack || 1;
  let pHome = (homeAttack / totalAttack) * 0.6 + homeWinPct * 0.4;
  let pAway = (awayAttack / totalAttack) * 0.6 + awayWinPct * 0.4;
  pHome = Math.max(0.05, Math.min(0.85, pHome));
  pAway = Math.max(0.05, Math.min(0.85, pAway));
  let pDraw = Math.max(0.1, 1 - pHome - pAway);
  const s = pHome + pDraw + pAway;
  pHome /= s; pDraw /= s; pAway /= s;
  const r = [{label:`Victoire ${homeName}`,pct:pHome},{label:"Match nul",pct:pDraw},{label:`Victoire ${awayName}`,pct:pAway}].sort((a,b)=>b.pct-a.pct)[0];
  const eg = homeAttack + awayAttack;
  const pOver25 = Math.max(0.1, Math.min(0.9, (eg - 1.5) / 3 + 0.5));
  const pHS = Math.max(0.15, Math.min(0.9, homeAttack / 1.4));
  const pAS = Math.max(0.15, Math.min(0.9, awayAttack / 1.4));
  const pBTTS = pHS * pAS;
  const pDH = pHome + pDraw, pDA = pAway + pDraw;
  const dc = pDH >= pDA ? {label:`DC: ${homeName} ou nul`,pct:pDH} : {label:`DC: ${awayName} ou nul`,pct:pDA};
  return [
    {type:"Résultat (1N2)", pick:r.label, confidence:r.pct},
    {type:"Total de buts", pick:pOver25>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts", confidence:pOver25>=0.5?pOver25:1-pOver25},
    {type:"BTTS", pick:pBTTS>=0.5?"Les deux équipes marquent: Oui":"Les deux équipes marquent: Non", confidence:pBTTS>=0.5?pBTTS:1-pBTTS},
    {type:"Double chance", pick:dc.label, confidence:Math.min(0.95,dc.pct)},
  ].sort((a,b)=>b.confidence-a.confidence);
}

async function computeNationalPredictions(home, away) {
  const [h2hRes, homeCurr, homePrev, awayCurr, awayPrev] = await Promise.all([
    apiGet(`/fixtures/headtohead?h2h=${home.id}-${away.id}`),
    apiGet(`/fixtures?team=${home.id}&season=2024`),
    apiGet(`/fixtures?team=${home.id}&season=2023`),
    apiGet(`/fixtures?team=${away.id}&season=2024`),
    apiGet(`/fixtures?team=${away.id}&season=2023`),
  ]);
  const homeLastRaw = [...(homeCurr||[]),...(homePrev||[])];
  const awayLastRaw = [...(awayCurr||[]),...(awayPrev||[])];
  function recent(matches, limit) {
    return [...(matches||[])].filter(m=>["FT","AET","PEN"].includes(m.fixture.status.short))
      .sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date)).slice(0,limit);
  }
  const h2h=recent(h2hRes,10), homeLast=recent(homeLastRaw,8), awayLast=recent(awayLastRaw,8);
  function form(matches, teamId) {
    if (!matches||matches.length===0) return 0.5;
    let pts=0;
    matches.forEach(m=>{
      const isH=m.teams.home.id===teamId;
      const won=isH?m.teams.home.winner:m.teams.away.winner;
      const draw=m.teams.home.winner===null&&m.teams.away.winner===null;
      if(won) pts+=3; else if(draw) pts+=1;
    });
    return pts/(matches.length*3);
  }
  function h2hScore(matches, teamId) {
    if (!matches||matches.length===0) return null;
    let wins=0,draws=0;
    matches.forEach(m=>{
      const isH=m.teams.home.id===teamId;
      const won=isH?m.teams.home.winner:m.teams.away.winner;
      if(won) wins++; else if(m.teams.home.winner===null&&m.teams.away.winner===null) draws++;
    });
    return {wins,draws,total:matches.length};
  }
  const hf=form(homeLast,home.id), af=form(awayLast,away.id), h2s=h2hScore(h2h,home.id);
  let pH, pA;
  if(h2s&&h2s.total>0) {
    pH=hf*0.6+(h2s.wins/h2s.total)*0.4+0.05;
    pA=af*0.6+((h2s.total-h2s.wins-h2s.draws)/h2s.total)*0.4;
  } else { pH=hf*0.55+0.05; pA=af*0.55; }
  pH=Math.max(0.05,Math.min(0.85,pH)); pA=Math.max(0.05,Math.min(0.85,pA));
  let pD=Math.max(0.12,1-pH-pA); const s=pH+pD+pA; pH/=s;pD/=s;pA/=s;
  const r=[{label:`Victoire ${home.name}`,pct:pH},{label:"Match nul",pct:pD},{label:`Victoire ${away.name}`,pct:pA}].sort((a,b)=>b.pct-a.pct)[0];
  function avgG(matches,teamId) {
    if(!matches||matches.length===0) return 1.2;
    let g=0; matches.forEach(m=>{const isH=m.teams.home.id===teamId;g+=isH?(m.goals.home??0):(m.goals.away??0);}); return g/matches.length;
  }
  const eg=avgG(homeLast,home.id)+avgG(awayLast,away.id);
  const pO=Math.max(0.15,Math.min(0.85,(eg-1.5)/3+0.5));
  const pDH=Math.min(0.95,pH+pD), pDA=Math.min(0.95,pA+pD);
  const dc=pDH>=pDA?{label:`DC: ${home.name} ou nul`,pct:pDH}:{label:`DC: ${away.name} ou nul`,pct:pDA};
  return [
    {type:"Résultat (1N2)", pick:r.label, confidence:r.pct},
    {type:"Double chance", pick:dc.label, confidence:dc.pct},
    {type:"Total de buts", pick:pO>=0.5?"Plus de 2.5 buts":"Moins de 2.5 buts", confidence:pO>=0.5?pO:1-pO},
  ].sort((a,b)=>b.confidence-a.confidence);
}

function confidenceBarHTML(value) {
  const pct = Math.round(value*100);
  const color = pct>=65?"#1a6b3a":pct>=50?"#b08900":"#9b2c2c";
  return `<div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="bar-pct" style="color:${color}">${pct}%</span></div>`;
}

async function showPredictions(fixture, container, btn) {
  if (container.dataset.loaded==="true") {
    container.style.display = container.style.display==="none"?"block":"none";
    btn.textContent = container.style.display==="none"?"👁 Voir les pronostics":"🙈 Masquer";
    return;
  }
  btn.textContent="🔄 Calcul..."; btn.disabled=true;
  try {
    const home=fixture.teams.home, away=fixture.teams.away;
    let preds;
    if (isNationalTeamMatch(fixture)) {
      preds = await computeNationalPredictions(home, away);
    } else {
      const season=fixture.league.season;
      const [hS,aS] = await Promise.all([
        apiGet(`/teams/statistics?team=${home.id}&league=${fixture.league.id}&season=${season}`),
        apiGet(`/teams/statistics?team=${away.id}&league=${fixture.league.id}&season=${season}`),
      ]);
      preds = computePredictions(hS, aS, home.name, away.name);
    }
    container.innerHTML = preds.map(p=>`<div class="pred-item"><div class="pred-type">${p.type}</div><div class="pred-pick">${p.pick}</div>${confidenceBarHTML(p.confidence)}</div>`).join("");
    container.dataset.loaded="true"; container.style.display="block";
    btn.textContent="🙈 Masquer";
  } catch(e) {
    container.innerHTML=`<div style="color:#9b2c2c;font-size:12px;">⚠️ Stats indisponibles pour ce match.</div>`;
    container.style.display="block"; btn.textContent="👁 Voir les pronostics";
  } finally { btn.disabled=false; }
}

function renderMatch(fixture) {
  const home=fixture.teams.home, away=fixture.teams.away;
  const kickoff=new Date(fixture.fixture.date);
  const timeStr=kickoff.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  const elapsed=fixture.fixture.status.elapsed;
  let timeBadge;
  if (isLive(fixture)) {
    timeBadge=`<span class="badge-live">${elapsed?elapsed+"'":"Live"}</span>`;
  } else if (isFinished(fixture)) {
    const sc=fixture.goals.home!==null?`${fixture.goals.home}-${fixture.goals.away}`:"FT";
    timeBadge=`<span class="badge-done">✅ ${sc}</span>`;
  } else {
    timeBadge=`<span class="time">${timeStr}</span>`;
  }
  const showScore=(isLive(fixture)||isFinished(fixture))&&fixture.goals.home!==null;
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="card-top">
      <span class="card-round">${fixture.league.round||""}</span>
      ${timeBadge}
    </div>
    <div class="teams-row">
      <div class="team-block">
        <img class="team-logo" src="${home.logo}" alt="" />
        <span class="team-name">${home.name}</span>
      </div>
      <div class="score-block">
        ${showScore
          ? `<span class="score">${fixture.goals.home}</span><span class="score-sep">-</span><span class="score">${fixture.goals.away}</span>`
          : `<span class="vs-text">VS</span>`}
      </div>
      <div class="team-block away">
        <img class="team-logo" src="${away.logo}" alt="" />
        <span class="team-name">${away.name}</span>
      </div>
    </div>
    <button class="pred-btn">👁 Voir les pronostics</button>
    <div class="predictions" style="display:none"></div>
  `;
  const btn=card.querySelector(".pred-btn");
  const predContainer=card.querySelector(".predictions");
  btn.addEventListener("click",()=>showPredictions(fixture,predContainer,btn));
  return card;
}

function renderLeagueGroup(leagueName, countryName, fixtures, hasLive) {
  const wrapper=document.createElement("div");
  wrapper.className="league-group";
  const header=document.createElement("div");
  header.className="league-header"+(hasLive?" live-header":"");
  const displayName=formatLeagueName(leagueName, countryName);
  header.innerHTML=`
    <span class="league-flag">${countryFlag(countryName)}</span>
    <span class="league-title">${displayName}</span>
    ${hasLive?`<span class="league-live-badge">LIVE</span>`:""}
    <span class="league-count${hasLive?" live-count":""}">${fixtures.length}</span>
    <span class="league-chevron">▼</span>
  `;
  const matchesContainer=document.createElement("div");
  matchesContainer.className="league-matches";
  fixtures.forEach(f=>matchesContainer.appendChild(renderMatch(f)));
  header.addEventListener("click",()=>{
    const open=matchesContainer.classList.toggle("open");
    header.querySelector(".league-chevron").classList.toggle("open",open);
  });
  wrapper.appendChild(header);
  wrapper.appendChild(matchesContainer);
  return wrapper;
}

function renderTab(fixtures) {
  const matchList=document.getElementById("matchList");
  const footerNote=document.getElementById("footerNote");
  matchList.innerHTML=""; footerNote.innerHTML="";
  if (fixtures.length===0) {
    matchList.innerHTML=`<div class="empty-tab">Aucun match dans cet onglet.</div>`;
    return;
  }
  const byLeague={};
  fixtures.forEach(f=>{
    const key=`${f.league.id}`;
    if(!byLeague[key]) byLeague[key]={name:f.league.name,country:f.league.country,fixtures:[]};
    byLeague[key].fixtures.push(f);
  });
  const groups=Object.values(byLeague).sort((a,b)=>leaguePriority(a.name)-leaguePriority(b.name));
  groups.forEach(group=>{
    const hasLive=group.fixtures.some(f=>isLive(f));
    group.fixtures.sort((a,b)=>{
      const pa=isLive(a)?0:isUpcoming(a)?1:2;
      const pb=isLive(b)?0:isUpcoming(b)?1:2;
      if(pa!==pb) return pa-pb;
      return new Date(a.fixture.date)-new Date(b.fixture.date);
    });
    matchList.appendChild(renderLeagueGroup(group.name,group.country,group.fixtures,hasLive));
  });
  footerNote.innerHTML="Pronostics basés sur les statistiques de saison. Outil d'aide à la réflexion.";
  footerNote.className="footer-note";
}

function switchTab(tab) {
  currentTab=tab;
  document.getElementById("tabLive").classList.toggle("active",tab==="live");
  document.getElementById("tabUpcoming").classList.toggle("active",tab==="upcoming");
  document.getElementById("tabDone").classList.toggle("active",tab==="done");
  let fixtures;
  if(tab==="live") fixtures=allFixtures.filter(f=>isLive(f));
  else if(tab==="upcoming") fixtures=allFixtures.filter(f=>isUpcoming(f));
  else fixtures=allFixtures.filter(f=>isFinished(f));
  renderTab(fixtures);
  const liveCount=allFixtures.filter(f=>isLive(f)).length;
  document.getElementById("tabLive").innerHTML=`<span class="live-dot"></span>EN DIRECT${liveCount>0?` (${liveCount})`:""}`;
  document.getElementById("tabUpcoming").textContent=`AVANT-MATCH (${allFixtures.filter(f=>isUpcoming(f)).length})`;
  document.getElementById("tabDone").textContent=`TERMINÉS (${allFixtures.filter(f=>isFinished(f)).length})`;
}

async function loadFixtures() {
  const statusEl=document.getElementById("status");
  const errorBox=document.getElementById("errorBox");
  const refreshBtn=document.getElementById("refreshBtn");
  statusEl.style.display="block";
  statusEl.innerHTML='<span class="spin">🔄</span> Chargement...';
  errorBox.innerHTML="";
  document.getElementById("matchList").innerHTML="";
  try {
    const data=await apiGet(`/fixtures?date=${todayISO()}`);
    allFixtures=[...data].sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date));
    statusEl.style.display="none";
    refreshBtn.style.display="flex";
    switchTab(currentTab);
  } catch(e) {
    statusEl.style.display="none";
    errorBox.innerHTML=`<div class="error-box">⚠️ Impossible de récupérer les matchs. Réessaie dans un instant.</div>`;
    refreshBtn.style.display="flex";
  }
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
loadFixtures();
</script>
</body>
