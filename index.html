    </div>

    </div>
    <div class="debug-section">
      <div class="debug-section-title">⏩ Rattrapage historique <button class="debug-panel-btn" onclick="runHistoricalBackfill()">Lancer</button></div>
      <div id="backfillLog" class="debug-log"><div class="debug-empty">Exploite la rétention 7 jours des cotes 1xBet pour évaluer immédiatement des matchs déjà terminés, au lieu d'attendre en temps réel.</div></div>
    </div>

<script>
const API_BASE = "https://Sadquiy35--2a7ef21a6f6f11f1a7161607ee4eb77e.web.val.run";
const BOOKMAKER_1XBET = 8;
let allFixtures = [], currentTab = "upcoming";

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`Erreur API (${res.status})`);
  const json = await res.json();
  if (json.errors && Object.keys(json.errors).length > 0) throw new Error(JSON.stringify(json.errors));
  return json.response;
}
const LIVE_STATUSES = ["1H","HT","2H","ET","BT","P","SUSP","INT","LIVE"];
const DONE_STATUSES = ["FT","AET","PEN","AWD","WO"];
function isLive(f) { return LIVE_STATUSES.includes(f.fixture.status.short); }
function isFinished(f) { return DONE_STATUSES.includes(f.fixture.status.short); }
function isUpcoming(f) { return !isLive(f) && !isFinished(f); }
const LEAGUE_PRIORITY = ["world cup","fifa world cup","champions league","premier league","la liga","serie a","bundesliga","ligue 1","europa league","conference league","eredivisie","primeira liga","super lig","botola","nations league","afcon","copa america"];
function leaguePriority(n) { const name=(n||"").toLowerCase(); for(let i=0;i<LEAGUE_PRIORITY.length;i++) if(name.includes(LEAGUE_PRIORITY[i])) return i; return LEAGUE_PRIORITY.length; }
const COUNTRY_TO_ISO = {"morocco":"MA","world":"🌍","england":"GB","spain":"ES","italy":"IT","germany":"DE","france":"FR","portugal":"PT","netherlands":"NL","belgium":"BE","turkey":"TR","greece":"GR","switzerland":"CH","austria":"AT","denmark":"DK","sweden":"SE","norway":"NO","croatia":"HR","serbia":"RS","brazil":"BR","argentina":"AR","usa":"US","mexico":"MX","egypt":"EG","algeria":"DZ","tunisia":"TN","saudi-arabia":"SA","qatar":"QA","nigeria":"NG","senegal":"SN","cameroon":"CM","ghana":"GH","ivory coast":"CI","scotland":"GB","poland":"PL","czech-republic":"CZ"};
function isoToFlag(iso) { if(!iso||iso.length!==2) return "🏳️"; return String.fromCodePoint(...iso.toUpperCase().split("").map(c=>127397+c.charCodeAt(0))); }
function countryFlag(c) { const k=(c||"").toLowerCase(); if(k==="world") return "🌍"; const iso=COUNTRY_TO_ISO[k]; return iso?isoToFlag(iso):"🏳️"; }
function formatLeagueName(league,country) { const c=(country||"").trim(),l=(league||"").trim(); if(!c||c.toLowerCase()==="world") return l; if(l.toLowerCase().startsWith(c.toLowerCase())) return l; return `${c}. ${l}`; }

// --- Journal technique (panneau 🐛 Debug) : capture les console.warn/error pour pouvoir les
// consulter directement dans l'app sur mobile, sans outils développeur.
let debugLog=[], debugUnread=0;
const _origWarn=console.warn, _origError=console.error;
function pushDebugLog(level, args) {
  const msg=args.map(a=>typeof a==='object'?JSON.stringify(a):String(a)).join(' ');
  debugLog.push({level, msg, time:new Date().toLocaleTimeString('fr-FR')});
  if(debugLog.length>300) debugLog.shift();
  debugUnread++;
  updateDebugBadge();
  const panel=document.getElementById('debugPanel');
  if(panel && panel.classList.contains('open')) renderDebugLog();
}
console.warn=function(...args){ pushDebugLog('warn',args); _origWarn(...args); };
console.error=function(...args){ pushDebugLog('error',args); _origError(...args); };
function updateDebugBadge(){
  const b=document.getElementById('debugBadge');
  if(!b) return;
  b.style.display=debugUnread>0?'inline-block':'none';
  b.textContent=debugUnread>99?'99+':debugUnread;
}
function renderDebugLog(){
  const el=document.getElementById('debugLogContent');
  if(!el) return;
  if(debugLog.length===0){ el.innerHTML='<div class="debug-empty">Aucun message pour l\'instant.</div>'; return; }
  el.innerHTML=debugLog.slice().reverse().map(e=>`<div class="debug-log-entry${e.level==='error'?' err':''}">[${e.time}] ${e.level.toUpperCase()}: ${e.msg}</div>`).join('');
}
function toggleDebugPanel(){
  const panel=document.getElementById('debugPanel'); if(!panel) return;
  const open=panel.classList.toggle('open');
  if(open){ renderDebugLog(); debugUnread=0; updateDebugBadge(); renderVBTrackerPanel(); renderBrierPanel(); }
}
function clearDebugLog(){ debugLog=[]; renderDebugLog(); }
async function copyDebugLog(){
  try{ await navigator.clipboard.writeText(debugLog.map(e=>`[${e.time}] ${e.level.toUpperCase()}: ${e.msg}`).join('\n')); alert('Journal copié.'); }
  catch(e){ alert('Copie impossible : '+e.message); }
}

// --- Tracker ROI des value bets : enregistre chaque value bet détecté en avant-match, puis permet
// de vérifier après coup (bouton "Vérifier les résultats") si le pari aurait été gagné ou perdu, pour
// mesurer la rentabilité réelle du modèle plutôt que de se fier uniquement à l'edge affiché.
const VB_TRACKER_KEY='pronosValueBetTracker_v1';
// Identifiant de la méthode de calibration en vigueur. À incrémenter à chaque changement de
// calibration qui modifie les probabilités du modèle, pour pouvoir comparer le ROI par version dans
// le tracker sans que les anciens paris (autre méthode) diluent silencieusement le résultat.
const CALIBRATION_VERSION='v2_joint_ou';
function loadVBTracker(){ try{ return JSON.parse(localStorage.getItem(VB_TRACKER_KEY)||'[]'); }catch(e){ return []; } }
function saveVBTracker(arr){ try{ localStorage.setItem(VB_TRACKER_KEY, JSON.stringify(arr)); }catch(e){ console.warn('[pronos] Sauvegarde du suivi value bets impossible:', e.message); } }
function getCalibVersion(rec){ return rec.calibVersion || 'v1_1x2_only'; }
function recordValueBet(fixture, vb){
  const tracker=loadVBTracker();
  const key=`${fixture.fixture.id}|${vb.market}|${vb.pick}`;
  if(tracker.find(t=>t.key===key)) return;
  tracker.push({
    key, fixtureId:fixture.fixture.id,
    homeName:fixture.teams.home.name, awayName:fixture.teams.away.name,
    kickoff:fixture.fixture.date,
    market:vb.market, pick:vb.pick, odd:vb.odd, edge:vb.edge,
    calibVersion:CALIBRATION_VERSION,
    resolved:false, won:null
  });
  if(tracker.length>800) tracker.splice(0, tracker.length-800);
  saveVBTracker(tracker);
}

// Détermine si un pari est gagné à partir du score final. Couvre les marchés que findValueBets sait
// détecter. Retourne null si le marché n'est pas reconnu (le pari est alors ignoré du calcul de ROI,
// pas compté comme perdu).
function resolveBetOutcome(market, pick, hG, aG, homeName, awayName){
  const total=hG+aG;
  if(market==='Résultat (1X2)'){
    if(pick===`Victoire ${homeName}`) return hG>aG;
    if(pick===`Victoire ${awayName}`) return aG>hG;
    if(pick==='Match nul') return hG===aG;
  }
  if(market==='Double Chance'){
    if(pick===`${homeName} ou Nul`) return hG>=aG;
    if(pick===`${homeName} ou ${awayName}`) return hG!==aG;
    if(pick===`Nul ou ${awayName}`) return aG>=hG;
  }
  if(market==='Total buts'){
    const m=pick.match(/^(Over|Under) (\d+\.\d+)$/);
    if(m){ const line=parseFloat(m[2]); return m[1]==='Over' ? total>line : total<line; }
  }
  if(market==='Les deux équipes marquent'){
    const btts=hG>0&&aG>0;
    return pick==='Oui' ? btts : !btts;
  }
  if(market===`${homeName} gagne sans encaisser`) return pick==='Oui' ? (hG>aG&&aG===0) : null;
  if(market===`${awayName} gagne sans encaisser`) return pick==='Oui' ? (aG>hG&&hG===0) : null;
  if(market==='Match nul avec buts') return pick==='Oui' ? (hG===aG&&hG>0) : null;
  if(market==='0-0') return pick==='Oui' ? (hG===0&&aG===0) : null;
  return null; // marché non couvert (HT-FT, mi-temps, etc.) : on ne sait pas vérifier automatiquement ici
}

// Vérifie tous les paris en attente dont le coup d'envoi remonte à plus de 2h30 (le match est presque
// certainement terminé à ce stade), en récupérant le score final via l'API.
async function evaluateVBTracker(){
  const tracker=loadVBTracker();
  const now=Date.now();
  const pending=tracker.filter(t=>!t.resolved && (now-new Date(t.kickoff).getTime())>2.5*60*60*1000);
  const fixtureIds=[...new Set(pending.map(t=>t.fixtureId))];
  for(const fid of fixtureIds){
    try{
      const data=await apiGet(`/fixtures?id=${fid}`);
      const fx=data && data[0];
      if(!fx || !DONE_STATUSES.includes(fx.fixture.status.short) || fx.goals.home===null) continue;
      tracker.filter(t=>t.fixtureId===fid && !t.resolved).forEach(t=>{
        const outcome=resolveBetOutcome(t.market,t.pick,fx.goals.home,fx.goals.away,t.homeName,t.awayName);
        if(outcome===null){ t.resolved=true; t.skipped=true; }
        else { t.resolved=true; t.won=outcome; }
      });
    }catch(e){ console.warn(`[pronos] Vérification résultat fixture ${fid} échouée :`, e.message); }
  }
  saveVBTracker(tracker);
}

function computeROI(tracker){
  const evaluated=tracker.filter(t=>t.resolved && !t.skipped);
  let staked=0, profit=0, wins=0;
  evaluated.forEach(rec=>{
    staked+=1;
    profit += rec.won ? (rec.odd-1) : -1;
    if(rec.won) wins++;
  });
  return {n:evaluated.length, staked, profit, roi:staked>0?profit/staked*100:null, winRate:evaluated.length>0?wins/evaluated.length*100:null};
}
function computeROIByVersion(tracker){
  const evaluated=tracker.filter(t=>t.resolved && !t.skipped);
  const byVersion={};
  evaluated.forEach(r=>{
    const v=getCalibVersion(r);
    if(!byVersion[v]) byVersion[v]={n:0, profit:0};
    byVersion[v].n++;
    byVersion[v].profit += r.won ? (r.odd-1) : -1;
  });
  return Object.entries(byVersion).map(([version,d])=>({version, n:d.n, roi:d.n>0?d.profit/d.n*100:null}));
}
function computeROIByEdgeTier(tracker){
  const evaluated=tracker.filter(t=>t.resolved && !t.skipped);
  const tiers=[{label:'🔥 +10%',min:10,max:Infinity},{label:'⚡ +6-10%',min:6,max:10},{label:'+3-6%',min:3,max:6}];
  return tiers.map(t=>{
    const inTier=evaluated.filter(r=>r.edge>=t.min && r.edge<t.max);
    const profit=inTier.reduce((s,r)=>s+(r.won?(r.odd-1):-1),0);
    return {label:t.label, n:inTier.length, roi:inTier.length>0?profit/inTier.length*100:null};
  });
}
function computeROIByMarket(tracker, edgeFilter){
  const evaluated=tracker.filter(t=>t.resolved && !t.skipped && (!edgeFilter || edgeFilter(t.edge)));
  const byMarket={};
  evaluated.forEach(r=>{
    if(!byMarket[r.market]) byMarket[r.market]={n:0, profit:0};
    byMarket[r.market].n++;
    byMarket[r.market].profit += r.won ? (r.odd-1) : -1;
  });
  return Object.entries(byMarket).map(([market,d])=>({market, n:d.n, roi:d.n>0?d.profit/d.n*100:null})).sort((a,b)=>b.n-a.n);
}

// --- Rattrapage historique : les cotes 1xBet restent disponibles ~7 jours après un match terminé.
// Au lieu d'attendre que de nouveaux matchs se jouent un par un, on va chercher des matchs des
// derniers jours DÉJÀ TERMINÉS, on calcule les value bets sur leurs cotes (encore accessibles), et on
// vérifie tout de suite puisque le résultat est déjà connu — ça remplit le tracker ROI d'un coup.
const SCANNED_KEY='pronosScannedFixtures_v1';
const BACKFILL_DAYS=6, BACKFILL_BATCH_SIZE=40;
function loadScannedIds(){ try{ return new Set(JSON.parse(localStorage.getItem(SCANNED_KEY)||'[]')); }catch(e){ return new Set(); } }
function saveScannedIds(set){ try{ const arr=[...set]; localStorage.setItem(SCANNED_KEY, JSON.stringify(arr.slice(-4000))); }catch(e){ console.warn('[pronos] Sauvegarde des matchs scannés impossible:', e.message); } }

function resolveValueBetNow(fixture, vb){
  const tracker=loadVBTracker();
  const key=`${fixture.fixture.id}|${vb.market}|${vb.pick}`;
  if(tracker.find(t=>t.key===key)) return false;
  const outcome=resolveBetOutcome(vb.market,vb.pick,fixture.goals.home,fixture.goals.away,fixture.teams.home.name,fixture.teams.away.name);
  tracker.push({
    key, fixtureId:fixture.fixture.id,
    homeName:fixture.teams.home.name, awayName:fixture.teams.away.name,
    kickoff:fixture.fixture.date,
    market:vb.market, pick:vb.pick, odd:vb.odd, edge:vb.edge,
    calibVersion:CALIBRATION_VERSION,
    resolved:true, won:outcome===null?null:outcome, skipped:outcome===null
  });
  if(tracker.length>800) tracker.splice(0, tracker.length-800);
  saveVBTracker(tracker);
  return true;
}

async function runHistoricalBackfill(){
  const logEl=document.getElementById('backfillLog');
  logEl.innerHTML='<div class="debug-empty">Recherche de matchs récents terminés...</div>';
  const scanned=loadScannedIds();
  let candidates=[];
  try{
    for(let d=0; d<BACKFILL_DAYS; d++){
      const date=new Date(Date.now()-d*24*3600*1000);
      const dateStr=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
      const fixtures=await apiGet(`/fixtures?date=${dateStr}`);
      (fixtures||[]).forEach(f=>{
        if(isFinished(f) && f.goals.home!==null && !scanned.has(f.fixture.id)) candidates.push(f);
      });
      if(candidates.length>=BACKFILL_BATCH_SIZE*3) break; // assez de matière pour ce lot, pas la peine de tout charger
    }
  }catch(e){
    logEl.innerHTML=`<div class="debug-log-entry err">⚠️ Erreur pendant la recherche : ${e.message}</div>`;
    return;
  }
  const batch=candidates.slice(0,BACKFILL_BATCH_SIZE);
  logEl.innerHTML=`<div class="debug-empty">Analyse de ${batch.length} match${batch.length>1?'s':''}...</div>`;
  let valueBetsFound=0, checked=0;
  for(const fixture of batch){
    try{
      const {parsed, valueBets, lh, la}=await getValueBetsForFixture(fixture);
      if(parsed && parsed.home1x2){
        valueBets.forEach(vb=>{ if(resolveValueBetNow(fixture,vb)) valueBetsFound++; });
        try{
          const [homeForm,awayForm]=await Promise.all([getTeamForm(fixture.teams.home.id,fixture.fixture.date),getTeamForm(fixture.teams.away.id,fixture.fixture.date)]);
          const formLh=(homeForm.home.avgScored+awayForm.away.avgConceded)/2;
          const formLa=(awayForm.away.avgScored+homeForm.home.avgConceded)/2;
          let h2h=null;
          try{ h2h=await getH2HRecord(fixture.teams.home.id, fixture.teams.away.id); }catch(e){}
          recordPredictionResolved(fixture, lh, la, formLh, formLa, h2h);
        }catch(e){ /* forme indisponible : on ignore silencieusement, ce n'est pas critique ici */ }
      }
    }catch(e){
      console.warn(`[pronos] Rattrapage : erreur sur fixture ${fixture.fixture.id} :`, e.message);
    }
    scanned.add(fixture.fixture.id);
    checked++;
  }
  saveScannedIds(scanned);
  logEl.innerHTML=`<div class="debug-log-entry best">Terminé : ${checked} nouveaux matchs vérifiés (+ ${scanned.size-checked} déjà vus, ignorés), ${valueBetsFound} value bet${valueBetsFound>1?'s':''} trouvé${valueBetsFound>1?'s':''} et résolu${valueBetsFound>1?'s':''} immédiatement. Relance "Vérifier les résultats" ci-dessus pour voir le nouveau ROI.</div>`;
  renderVBTrackerPanel();
}

function oddsToProb(odds) { return odds > 1 ? 1/odds : 0; }
function normalizeProbabilities(probs) { const t=probs.reduce((s,p)=>s+p,0); return t===0?probs:probs.map(p=>p/t); }
// Retire la marge du bookmaker sur une paire Over/Under en normalisant les deux probabilités
// implicites pour qu'elles somment à 1, plutôt que d'utiliser la probabilité implicite brute d'un
// seul côté (qui inclut la marge de 1xBet et biaiserait la cible de calibration).
function pairImpliedProb(oddsOver, oddsUnder) {
  const pOver=oddsToProb(oddsOver), pUnder=oddsToProb(oddsUnder||0);
  const t=pOver+pUnder;
  return t>0 ? pOver/t : pOver;
}

function poissonProb(lambda, k) { let p=Math.exp(-lambda); for(let i=0;i<k;i++) p*=lambda/(i+1); return p; }
function buildScoreMatrix(lh, la, max=7) { const m=[]; for(let i=0;i<=max;i++){m[i]=[];for(let j=0;j<=max;j++)m[i][j]=poissonProb(lh,i)*poissonProb(la,j);} return m; }

// Poids relatif du marché Over/Under dans le fit joint, par rapport à chaque composante du 1X2.
const OU_FIT_WEIGHT = 1;

// overTargets (optionnel) : liste de {line, p} où p est la probabilité implicite (sans marge) que le
// nombre total de buts dépasse `line`, dérivée des cotes Over/Under 1xBet. Quand fourni, les lambdas
// sont calibrés sur le 1X2 ET l'Over/Under ensemble ; sinon, uniquement sur le 1X2 (comportement
// d'origine). Voir withJointOUProbs plus bas pour l'usage : on ne remplace QUE les probabilités de
// "Total buts" par ce fit joint, le reste du modèle (1X2, BTTS, etc.) reste sur le fit pur 1X2.
function estimateLambdas(pH, pD, pA, overTargets) {
  function scoreAt(lh, la) {
    const M=buildScoreMatrix(lh,la,6);
    let ph=0,pd=0,pa=0;
    const overSums = overTargets ? overTargets.map(()=>0) : null;
    for(let i=0;i<=6;i++) for(let j=0;j<=6;j++){
      const p=M[i][j];
      if(i>j)ph+=p;else if(i===j)pd+=p;else pa+=p;
      if(overTargets){ const tot=i+j; for(let k=0;k<overTargets.length;k++) if(tot>overTargets[k].line) overSums[k]+=p; }
    }
    let err=Math.pow(ph-pH,2)+Math.pow(pd-pD,2)+Math.pow(pa-pA,2);
    if(overTargets) for(let k=0;k<overTargets.length;k++) err += OU_FIT_WEIGHT*Math.pow(overSums[k]-overTargets[k].p,2);
    return err;
  }
  let best={lh:1.3,la:1.1},bestErr=Infinity;
  for(let lh=0.2;lh<=4.0;lh+=0.1) for(let la=0.2;la<=4.0;la+=0.1){
    const e=scoreAt(lh,la);
    if(e<bestErr){bestErr=e;best={lh,la};}
  }
  return best;
}

// Construit la liste overTargets à partir des cotes Over/Under 1xBet parsées, pour un match donné.
function buildOverTargets(parsed) {
  const overTargets=[];
  [[0.5,'over05','under05'],[1.5,'over15','under15'],[2.5,'over25','under25'],[3.5,'over35','under35']].forEach(([line,ok,uk])=>{
    if(parsed[ok]) overTargets.push({line, p: pairImpliedProb(parsed[ok], parsed[uk])});
  });
  return overTargets;
}

// Remplace uniquement les probabilités de "Total buts" (Over/Under) par celles issues du fit JOINT
// 1X2+O/U, en gardant tout le reste de modelProbs (1X2, BTTS, Score exact, etc.) calculé avec le fit
// 1X2 pur. Un seul (lh,la) alimente toute la grille de scores, donc sans cette séparation, calibrer
// aussi sur l'Over/Under distordrait légèrement le 1X2 lui-même (constaté sur le tracker Brier).
function withJointOUProbs(modelProbs, ouLh, ouLa) {
  const ouProbs=computeModelProbabilities(ouLh, ouLa);
  return {...modelProbs, pO05:ouProbs.pO05, pO15:ouProbs.pO15, pO25:ouProbs.pO25, pO35:ouProbs.pO35};
}

function computeModelProbabilities(lh, la) {
  const M=buildScoreMatrix(lh,la), FH=0.44;
  const M1=buildScoreMatrix(lh*FH,la*FH), M2=buildScoreMatrix(lh*(1-FH),la*(1-FH));
  const max=7;
  let pH=0,pD=0,pA=0,pO05=0,pO15=0,pO25=0,pO35=0,pBTTS=0,pNilNil=0,pSD=0;
  let p1HO05=0,p1HO15=0,p2HO05=0,p2HO15=0,pHScore05=0,pHScore15=0,pAScore05=0,pAScore15=0,pWTNH=0,pWTNA=0;
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p=M[i][j];
    if(i>j)pH+=p;else if(i===j)pD+=p;else pA+=p;
    if(i+j>0)pO05+=p;if(i+j>1)pO15+=p;if(i+j>2)pO25+=p;if(i+j>3)pO35+=p;
    if(i>0&&j>0)pBTTS+=p;if(i===0&&j===0)pNilNil+=p;if(i===j&&i>0)pSD+=p;
    if(i>0)pHScore05+=p;if(i>1)pHScore15+=p;if(j>0)pAScore05+=p;if(j>1)pAScore15+=p;
    if(i>j&&j===0)pWTNH+=p;if(j>i&&i===0)pWTNA+=p;
  }
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    if(i+j>0)p1HO05+=M1[i][j];if(i+j>1)p1HO15+=M1[i][j];
    if(i+j>0)p2HO05+=M2[i][j];if(i+j>1)p2HO15+=M2[i][j];
  }
  const htftMap={};
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j];if(!p1)continue;const htR=i>j?'1':i===j?'X':'2';
    for(let k=0;k<=max;k++) for(let l=0;l<=max;l++){
      const p2=M2[k][l];if(!p2)continue;
      const ftR=(i+k)>(j+l)?'1':(i+k)===(j+l)?'X':'2';
      htftMap[htR+'/'+ftR]=(htftMap[htR+'/'+ftR]||0)+p1*p2;
    }
  }
  let pWBH=0,pWBA=0,pDB=0,pBEH=0;
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p1=M1[i][j];if(!p1)continue;
    for(let k=0;k<=max;k++) for(let l=0;l<=max;l++){
      const p2=M2[k][l];if(!p2)continue;const w=p1*p2;
      if(i>j&&k>l)pWBH+=w;if(i<j&&k<l)pWBA+=w;if(i===j&&k===l)pDB+=w;if(i>0&&j>0&&k>0&&l>0)pBEH+=w;
    }
  }
  return {pH,pD,pA,pO05,pO15,pO25,pO35,pBTTS,pNilNil,pSD,p1HO05,p1HO15,p2HO05,p2HO15,pHScore05,pHScore15,pAScore05,pAScore15,pWTNH,pWTNA,pWTNAny:pWTNH+pWTNA,htftMap,pWBH,pWBA,pDB,pBEH};
}

// Projette le modèle calibré (cotes ou forme, pas une formule à paliers fixes) sur le temps restant
// d'un match en direct, en partant du score déjà acquis. baseLh/baseLa sont les lambdas PLEIN MATCH
// (90 min) du modèle pré-match ; on les met à l'échelle du temps restant pour obtenir les buts
// ATTENDUS à venir, puis on combine avec le score déjà marqué pour obtenir les probabilités finales.
// C'est ce qui fait que deux matchs à un score/minute identiques donnent des résultats différents
// selon la force réelle des équipes, au lieu de toujours la même prédiction.
function computeLiveProbabilities(baseLh, baseLa, hG, aG, remaining, domAdjust=0) {
  const frac=Math.max(0.02, remaining/90);
  const lhRem=Math.max(0.02, baseLh*frac*(1+domAdjust*0.3));
  const laRem=Math.max(0.02, baseLa*frac*(1-domAdjust*0.3));
  const max=6, M=buildScoreMatrix(lhRem,laRem,max);
  let pH=0,pD=0,pA=0,pBTTS=0,pWTNH=0,pWTNA=0;
  const totalDist={}; // distribution du nombre de buts ADDITIONNELS (pas total final)
  for(let i=0;i<=max;i++) for(let j=0;j<=max;j++){
    const p=M[i][j], finalH=hG+i, finalA=aG+j;
    if(finalH>finalA)pH+=p; else if(finalH===finalA)pD+=p; else pA+=p;
    if(finalH>0 && finalA>0) pBTTS+=p;
    if(finalH>finalA && finalA===0) pWTNH+=p; // le domicile gagne sans avoir encaissé
    if(finalA>finalH && finalH===0) pWTNA+=p; // l'extérieur gagne sans avoir encaissé
    const add=i+j; totalDist[add]=(totalDist[add]||0)+p;
  }
  return {pH,pD,pA,pBTTS,pWTNH,pWTNA,totalDist,lhRem,laRem};
}
// Probabilité que le total de buts FINAL dépasse `line`, à partir de la distribution des buts
// additionnels calculée ci-dessus et du total déjà marqué.
function liveOverProb(totalDist, currentTotal, line) {
  let p=0;
  Object.entries(totalDist).forEach(([add,prob])=>{ if(currentTotal+Number(add)>line) p+=prob; });
  return p;
}

function findValueBets(modelProbs, odds1xbet, homeName, awayName) {
  const valueBets=[];
  function checkValue(market,pick,modelProb,odd1xbet){
    if(!odd1xbet||odd1xbet<=1)return;
    const impliedProb=oddsToProb(odd1xbet), edge=modelProb-impliedProb;
    if(edge>0.03){
      // EV : gain moyen attendu par unité misée, selon le modèle. Ex: EV=0.15 veut dire que pour
      // chaque unité misée, on s'attend à gagner 0.15 unité en moyenne SI le modèle a raison.
      const ev=modelProb*odd1xbet-1;
      // Kelly plein (fraction du capital à miser en théorie) est souvent trop agressif en pratique
      // (sensible à la moindre erreur de modèle) — on affiche le quart de Kelly, un compromis standard
      // pour limiter la casse si le modèle se trompe, plafonné à 5% du capital par pari par prudence.
      const kellyFull=(modelProb*odd1xbet-1)/(odd1xbet-1);
      const kellyQuarter=Math.max(0,Math.min(0.05,kellyFull*0.25));
      valueBets.push({market,pick,modelProb:Math.round(modelProb*100),impliedProb:Math.round(impliedProb*100),odd:odd1xbet,edge:Math.round(edge*100),ev:Math.round(ev*100)/100,kellyQuarter:Math.round(kellyQuarter*1000)/10});
    }
  }
  const o=odds1xbet;
  if(o.home1x2)checkValue('Résultat (1X2)',`Victoire ${homeName}`,modelProbs.pH,o.home1x2);
  if(o.draw1x2)checkValue('Résultat (1X2)','Match nul',modelProbs.pD,o.draw1x2);
  if(o.away1x2)checkValue('Résultat (1X2)',`Victoire ${awayName}`,modelProbs.pA,o.away1x2);
  if(o.dc1x)checkValue('Double Chance',`${homeName} ou Nul`,modelProbs.pH+modelProbs.pD,o.dc1x);
  if(o.dc12)checkValue('Double Chance',`${homeName} ou ${awayName}`,modelProbs.pH+modelProbs.pA,o.dc12);
  if(o.dcx2)checkValue('Double Chance',`Nul ou ${awayName}`,modelProbs.pD+modelProbs.pA,o.dcx2);
  if(o.over05)checkValue('Total buts','Over 0.5',modelProbs.pO05,o.over05);
  if(o.under05)checkValue('Total buts','Under 0.5',1-modelProbs.pO05,o.under05);
  if(o.over15)checkValue('Total buts','Over 1.5',modelProbs.pO15,o.over15);
  if(o.under15)checkValue('Total buts','Under 1.5',1-modelProbs.pO15,o.under15);
  if(o.over25)checkValue('Total buts','Over 2.5',modelProbs.pO25,o.over25);
  if(o.under25)checkValue('Total buts','Under 2.5',1-modelProbs.pO25,o.under25);
  if(o.over35)checkValue('Total buts','Over 3.5',modelProbs.pO35,o.over35);
  if(o.under35)checkValue('Total buts','Under 3.5',1-modelProbs.pO35,o.under35);
  if(o.bttsYes)checkValue('Les deux équipes marquent','Oui',modelProbs.pBTTS,o.bttsYes);
  if(o.bttsNo)checkValue('Les deux équipes marquent','Non',1-modelProbs.pBTTS,o.bttsNo);
  if(o.wtnHome)checkValue(`${homeName} gagne sans encaisser`,'Oui',modelProbs.pWTNH,o.wtnHome);
  if(o.wtnAway)checkValue(`${awayName} gagne sans encaisser`,'Oui',modelProbs.pWTNA,o.wtnAway);
  if(o.scoreDraw)checkValue('Match nul avec buts','Oui',modelProbs.pSD,o.scoreDraw);
  if(o.nilNil)checkValue('0-0','Oui',modelProbs.pNilNil,o.nilNil);
  if(o.ht_over05)checkValue('1ère MT Over 0.5','Oui',modelProbs.p1HO05,o.ht_over05);
  if(o.ht_under05)checkValue('1ère MT Under 0.5','Oui',1-modelProbs.p1HO05,o.ht_under05);
  if(o.ht_over15)checkValue('1ère MT Over 1.5','Oui',modelProbs.p1HO15,o.ht_over15);
  if(o.ht_under15)checkValue('1ère MT Under 1.5','Oui',1-modelProbs.p1HO15,o.ht_under15);
  if(o.sh_over05)checkValue('2ème MT Over 0.5','Oui',modelProbs.p2HO05,o.sh_over05);
  if(o.sh_over15)checkValue('2ème MT Over 1.5','Oui',modelProbs.p2HO15,o.sh_over15);
  if(o.homeScore05)checkValue(`${homeName} marque`,'Oui',modelProbs.pHScore05,o.homeScore05);
  if(o.awayScore05)checkValue(`${awayName} marque`,'Oui',modelProbs.pAScore05,o.awayScore05);
  const htftKeys={'1/1':`${homeName}/${homeName}`,'1/X':`${homeName}/Nul`,'X/X':'Nul/Nul','X/1':`Nul/${homeName}`,'X/2':`Nul/${awayName}`,'2/2':`${awayName}/${awayName}`,'2/X':`${awayName}/Nul`,'2/1':`${awayName}/${homeName}`,'1/2':`${homeName}/${awayName}`};
  Object.entries(htftKeys).forEach(([key,label])=>{if(o[`htft_${key}`])checkValue('HT-FT',label,modelProbs.htftMap[key]||0,o[`htft_${key}`]);});
  return valueBets.sort((a,b)=>b.edge-a.edge);
}

function parseOdds1xbet(oddsData, homeName, awayName) {
  if(!oddsData||oddsData.length===0)return null;
  let bk=null;
  for(const item of oddsData){const found=(item.bookmakers||[]).find(b=>b.id===BOOKMAKER_1XBET);if(found){bk=found;break;}}
  if(!bk){for(const item of oddsData){if(item.bookmakers&&item.bookmakers.length>0){bk=item.bookmakers[0];break;}}}
  if(!bk)return null;
  const result={};
  const getBet=(betName,valueName)=>{const bet=bk.bets?.find(b=>b.name===betName);if(!bet)return null;const v=bet.values?.find(v=>v.value===valueName||v.value?.toLowerCase()===valueName?.toLowerCase());return v?parseFloat(v.odd):null;};
  result.home1x2=getBet('Match Winner','Home');result.draw1x2=getBet('Match Winner','Draw');result.away1x2=getBet('Match Winner','Away');
  result.dc1x=getBet('Double Chance','Home/Draw');result.dc12=getBet('Double Chance','Home/Away');result.dcx2=getBet('Double Chance','Draw/Away');
  ['0.5','1.5','2.5','3.5'].forEach(line=>{const key=line.replace('.','');result[`over${key}`]=getBet('Goals Over/Under',`Over ${line}`);result[`under${key}`]=getBet('Goals Over/Under',`Under ${line}`);});
  result.bttsYes=getBet('Both Teams Score','Yes');result.bttsNo=getBet('Both Teams Score','No');
  result.ht_over05=getBet('First Half - Goals Over/Under','Over 0.5');result.ht_under05=getBet('First Half - Goals Over/Under','Under 0.5');
  result.ht_over15=getBet('First Half - Goals Over/Under','Over 1.5');result.ht_under15=getBet('First Half - Goals Over/Under','Under 1.5');
  result.sh_over05=getBet('Second Half - Goals Over/Under','Over 0.5');result.sh_over15=getBet('Second Half - Goals Over/Under','Over 1.5');
  result.wtnHome=getBet('Win to Nil','Home');result.wtnAway=getBet('Win to Nil','Away');
  result.scoreDraw=getBet('Score - Both Teams To Score','Yes');result.nilNil=getBet('Exact Score','0-0');
  result.homeScore05=getBet(`${homeName} Total Goals`,'Over 0.5');result.awayScore05=getBet(`${awayName} Total Goals`,'Over 0.5');
  return result;
}

// Calcule le modèle et détecte les value bets pour un match donné, à partir des cotes 1xBet.
// Factorisé pour être utilisé aussi bien par l'analyse en direct (showPredictions) que par le
// Rattrapage historique, afin de ne jamais faire diverger la logique entre les deux.
// Calcule la forme récente d'une équipe (10 derniers matchs), séparée domicile/extérieur, avec un
// lissage bayésien (mélange avec une moyenne a priori) pour éviter qu'un petit échantillon ne
// produise des estimations extrêmes.
async function getTeamForm(teamId, beforeDate) {
  const data=await apiGet(`/fixtures?team=${teamId}&last=10`);
  let homeScored=[],homeConceded=[],awayScored=[],awayConceded=[];
  (data||[]).forEach(f=>{
    if(!isFinished(f)||f.goals.home===null) return;
    if(f.teams.home.id===teamId){ homeScored.push(f.goals.home); homeConceded.push(f.goals.away); }
    else if(f.teams.away.id===teamId){ awayScored.push(f.goals.away); awayConceded.push(f.goals.home); }
  });
  const avg=(arr,prior,priorWeight=3)=>(arr.reduce((s,v)=>s+v,0)+prior*priorWeight)/(arr.length+priorWeight);
  // Jours de repos depuis le dernier match joué avant celui qu'on analyse — réutilise les mêmes
  // données déjà récupérées, aucun appel réseau supplémentaire.
  let restDays=null;
  if(beforeDate){
    const refTime=new Date(beforeDate).getTime();
    const past=(data||[]).filter(f=>isFinished(f) && new Date(f.fixture.date).getTime()<refTime);
    if(past.length){
      const mostRecent=past.reduce((a,b)=>new Date(a.fixture.date)>new Date(b.fixture.date)?a:b);
      restDays=(refTime-new Date(mostRecent.fixture.date).getTime())/(24*3600*1000);
    }
  }
  return {
    home:{avgScored:avg(homeScored,1.4), avgConceded:avg(homeConceded,1.1)},
    away:{avgScored:avg(awayScored,1.1), avgConceded:avg(awayConceded,1.4)},
    restDays
  };
}

// --- Tracker Brier : compare la précision du 1X2 dérivé des cotes 1xBet à celle dérivée de la forme
// récente (et de mélanges des deux), sur les matchs déjà résolus. Un score de Brier plus bas = plus
// précis. Sert à vérifier objectivement si mélanger un peu de forme améliore ou dégrade le modèle.
const BRIER_TRACKER_KEY='pronosBrierTracker_v1';
const BRIER_RATIOS=[1,0.85,0.7,0.5,0.3,0.15,0]; // 1 = 100% cotes, 0 = 100% forme
function loadBrierTracker(){ try{ return JSON.parse(localStorage.getItem(BRIER_TRACKER_KEY)||'[]'); }catch(e){ return []; } }
function saveBrierTracker(arr){ try{ localStorage.setItem(BRIER_TRACKER_KEY, JSON.stringify(arr)); }catch(e){ console.warn('[pronos] Sauvegarde du suivi Brier impossible:', e.message); } }
function recordPrediction(fixture, oddsLh, oddsLa, formLh, formLa, h2h){
  const tracker=loadBrierTracker();
  if(tracker.find(t=>t.fixtureId===fixture.fixture.id)) return;
  tracker.push({ fixtureId:fixture.fixture.id, kickoff:fixture.fixture.date, oddsLh, oddsLa, formLh, formLa, h2h:h2h||null, resolved:false, actualH:null, actualA:null });
  if(tracker.length>800) tracker.splice(0, tracker.length-800);
  saveBrierTracker(tracker);
}
function recordPredictionResolved(fixture, oddsLh, oddsLa, formLh, formLa, h2h){
  // Variante utilisée par le Rattrapage historique : le résultat est déjà connu au moment de
  // l'enregistrement, donc on l'enregistre directement comme résolu.
  const tracker=loadBrierTracker();
  if(tracker.find(t=>t.fixtureId===fixture.fixture.id)) return;
  tracker.push({ fixtureId:fixture.fixture.id, kickoff:fixture.fixture.date, oddsLh, oddsLa, formLh, formLa, h2h:h2h||null, resolved:true, actualH:fixture.goals.home, actualA:fixture.goals.away });
  if(tracker.length>800) tracker.splice(0, tracker.length-800);
  saveBrierTracker(tracker);
}
async function evaluateBrierTracker(){
  const tracker=loadBrierTracker();
  const now=Date.now();
  const pending=tracker.filter(t=>!t.resolved && (now-new Date(t.kickoff).getTime())>2.5*60*60*1000);
  for(const rec of pending){
    try{
      const data=await apiGet(`/fixtures?id=${rec.fixtureId}`);
      const fx=data && data[0];
      if(!fx || !DONE_STATUSES.includes(fx.fixture.status.short) || fx.goals.home===null) continue;
      rec.resolved=true; rec.actualH=fx.goals.home; rec.actualA=fx.goals.away;
    }catch(e){ console.warn(`[pronos] Vérification Brier fixture ${rec.fixtureId} échouée :`, e.message); }
  }
  saveBrierTracker(tracker);
}
function computeBrierByRatio(tracker){
  const evaluated=tracker.filter(t=>t.resolved && t.actualH!==null);
  return BRIER_RATIOS.map(w=>{
    let sum=0;
    evaluated.forEach(r=>{
      const lh=w*r.oddsLh+(1-w)*r.formLh, la=w*r.oddsLa+(1-w)*r.formLa;
      const mp=computeModelProbabilities(lh,la);
      const actualH=r.actualH>r.actualA?1:0, actualD=r.actualH===r.actualA?1:0, actualA=r.actualA>r.actualH?1:0;
      sum += Math.pow(mp.pH-actualH,2)+Math.pow(mp.pD-actualD,2)+Math.pow(mp.pA-actualA,2);
    });
    return {ratio:w, n:evaluated.length, brier:evaluated.length>0?sum/evaluated.length:null};
  });
}
// Teste si mélanger un peu d'historique face-à-face aux probabilités issues des cotes améliore ou
// dégrade la précision (même principe que cotes-vs-forme), avant de décider si ça mérite d'influencer
// le modèle réel. Lissage de Laplace sur le H2H (échantillon souvent très petit, 5 matchs maximum)
// pour éviter qu'un 3-0-0 ne donne une confiance de 100% non justifiée.
function computeBrierByH2HRatio(tracker){
  const evaluated=tracker.filter(t=>t.resolved && t.actualH!==null && t.h2h && t.h2h.n>0);
  return BRIER_RATIOS.map(w=>{
    let sum=0;
    evaluated.forEach(r=>{
      const mpOdds=computeModelProbabilities(r.oddsLh,r.oddsLa);
      const n=r.h2h.n;
      const h2hPH=(r.h2h.hWins+1)/(n+3), h2hPD=(r.h2h.draws+1)/(n+3), h2hPA=(r.h2h.aWins+1)/(n+3);
      const pH=w*mpOdds.pH+(1-w)*h2hPH, pD=w*mpOdds.pD+(1-w)*h2hPD, pA=w*mpOdds.pA+(1-w)*h2hPA;
      const actualH=r.actualH>r.actualA?1:0, actualD=r.actualH===r.actualA?1:0, actualA=r.actualA>r.actualH?1:0;
      sum += Math.pow(pH-actualH,2)+Math.pow(pD-actualD,2)+Math.pow(pA-actualA,2);
    });
    return {ratio:w, n:evaluated.length, brier:evaluated.length>0?sum/evaluated.length:null};
  });
}
function renderBrierPanel(){
  const el=document.getElementById('brierTrackerPanel');
  if(!el) return;
  const tracker=loadBrierTracker();
  const results=computeBrierByRatio(tracker);
  const n=results[0]?.n||0;
  if(n===0){ el.innerHTML='<div class="debug-empty">Aucun match résolu pour l\'instant.</div>'; return; }
  const sorted=[...results].sort((a,b)=>(a.brier??Infinity)-(b.brier??Infinity));
  const best=sorted[0];
  el.innerHTML=`<div style="font-size:11px;color:#8a9ab8;margin-bottom:8px;">${n} match${n>1?'s':''} résolu${n>1?'s':''} · score de Brier, plus bas = meilleur</div>`+
    results.map(r=>`<div class="debug-log-entry${r.ratio===best.ratio?' best':''}">Cotes ${Math.round(r.ratio*100)}% / Forme ${Math.round((1-r.ratio)*100)}% → Brier ${r.brier!==null?r.brier.toFixed(4):'—'} (n=${r.n})</div>`).join('')+
    (()=>{
      const h2hResults=computeBrierByH2HRatio(tracker);
      const h2hN=h2hResults[0]?.n||0;
      if(h2hN===0) return '';
      const h2hBest=[...h2hResults].sort((a,b)=>(a.brier??Infinity)-(b.brier??Infinity))[0];
      return `<div style="font-size:11px;font-weight:700;color:#1a3a6b;margin:10px 0 4px;">Test : cotes vs historique face-à-face</div>`+
        h2hResults.map(r=>`<div class="debug-log-entry${r.ratio===h2hBest.ratio?' best':''}">Cotes ${Math.round(r.ratio*100)}% / H2H ${Math.round((1-r.ratio)*100)}% → Brier ${r.brier!==null?r.brier.toFixed(4):'—'} (n=${r.n})</div>`).join('');
    })();
}
async function refreshBrierPanel(){
  const el=document.getElementById('brierTrackerPanel');
  if(el) el.innerHTML='<div class="debug-empty">Vérification des résultats en cours...</div>';
  await evaluateBrierTracker();
  renderBrierPanel();
}

async function getValueBetsForFixture(fixture) {
  const home=fixture.teams.home, away=fixture.teams.away;
  let oddsData=null;
  try{ oddsData=await apiGet(`/odds?fixture=${fixture.fixture.id}&bookmaker=${BOOKMAKER_1XBET}`); }catch(e){}
  const parsed=parseOdds1xbet(oddsData,home.name,away.name);
  if(!parsed||!parsed.home1x2) return {parsed:null, modelProbs:null, valueBets:[]};
  const rawH=oddsToProb(parsed.home1x2),rawD=oddsToProb(parsed.draw1x2||2),rawA=oddsToProb(parsed.away1x2);
  const [nH,nD,nA]=normalizeProbabilities([rawH,rawD,rawA]);
  const {lh,la}=estimateLambdas(nH,nD,nA);
  let modelProbs=computeModelProbabilities(lh,la);
  // Diagnostic temporaire : permet de vérifier si les cotes brutes 1xBet sont bien lues telles
  // quelles, ou si un souci de lecture aplatit artificiellement les probabilités du modèle.
  console.warn(`[pronos] Diag calibration ${home.name} vs ${away.name} : cotes brutes 1X2=[${parsed.home1x2},${parsed.draw1x2},${parsed.away1x2}] → implicite=[${(nH*100).toFixed(0)}%,${(nD*100).toFixed(0)}%,${(nA*100).toFixed(0)}%] → modèle=[${(modelProbs.pH*100).toFixed(0)}%,${(modelProbs.pD*100).toFixed(0)}%,${(modelProbs.pA*100).toFixed(0)}%]`);
  const overTargets=buildOverTargets(parsed);
  if(overTargets.length){
    const {lh:ouLh,la:ouLa}=estimateLambdas(nH,nD,nA,overTargets);
    modelProbs=withJointOUProbs(modelProbs,ouLh,ouLa);
  }
  const valueBets=findValueBets(modelProbs,parsed,home.name,away.name);
  return {parsed, modelProbs, valueBets, lh, la};
}

// Contexte additionnel (historique face-à-face, blessures, compositions, enjeu). Contrairement aux
// cartons rouges (effet numérique validé), ces facteurs ne sont PAS injectés dans le calcul de
// probabilité : on n'a aucune donnée pour calibrer correctement leur poids, et un mauvais dosage
// fausserait le modèle silencieusement (cf. le bug de calibration Total buts diagnostiqué plus tôt).
// Ils sont affichés comme information brute pour aider ta propre lecture du match.
// Extrait pour être réutilisé à la fois par l'affichage contextuel et par le test empirique H2H
// ci-dessous, sans dupliquer l'appel réseau à chaque fois.
async function getH2HRecord(homeId, awayId) {
  const h2h=await apiGet(`/fixtures/headtohead?h2h=${homeId}-${awayId}&last=5`);
  if(!h2h || !h2h.length) return null;
  let hWins=0,aWins=0,draws=0;
  h2h.forEach(f=>{
    if(!isFinished(f)||f.goals.home===null) return;
    const hIsHomeHere=f.teams.home.id===homeId;
    const hg=hIsHomeHere?f.goals.home:f.goals.away, ag=hIsHomeHere?f.goals.away:f.goals.home;
    if(hg>ag)hWins++; else if(hg<ag)aWins++; else draws++;
  });
  return {hWins,aWins,draws,n:h2h.length};
}
async function getMatchContext(fixture) {
  const home=fixture.teams.home, away=fixture.teams.away;
  const ctx={h2h:null, injuries:null, lineups:null, stakes:null};
  const round=(fixture.league.round||'').toLowerCase();
  const stakesKeywords=['final','semi-final','semifinal','quarter-final','quarterfinal','play-off','playoff','relegation','promotion'];
  if(stakesKeywords.some(k=>round.includes(k))) ctx.stakes=fixture.league.round;
  try{ ctx.h2h=await getH2HRecord(home.id,away.id); }catch(e){ console.warn(`[pronos] Historique face-à-face indisponible pour fixture ${fixture.fixture.id} :`, e.message); }
  try{
    const inj=await apiGet(`/injuries?fixture=${fixture.fixture.id}`);
    if(inj && inj.length) ctx.injuries=inj.map(i=>({team:i.team?.name||'?', player:i.player?.name||'?', reason:i.player?.reason||i.player?.type||''}));
  }catch(e){ /* souvent restreint selon le plan API — non bloquant, pas de log pour ne pas polluer */ }
  try{
    const lu=await apiGet(`/fixtures/lineups?fixture=${fixture.fixture.id}`);
    if(lu && lu.length===2) ctx.lineups=lu.map(t=>({team:t.team?.name||'?', formation:t.formation, startXI:(t.startXI||[]).map(p=>p.player?.name).filter(Boolean)}));
  }catch(e){ /* souvent indisponible avant le coup d'envoi — non bloquant */ }
  return ctx;
}
function renderMatchContext(ctx, homeName, awayName) {
  let html='';
  if(ctx.stakes) html+=`<div style="font-size:11px;font-weight:700;color:#b08900;margin:10px 0 4px;">🏆 Match à enjeu : ${ctx.stakes}</div>`;
  if(ctx.h2h) html+=`<div style="font-size:10px;font-weight:700;color:#8a9ab8;margin:10px 0 4px;text-transform:uppercase;letter-spacing:0.5px;">Face-à-face (${ctx.h2h.n} derniers)</div><div class="stats-box">${homeName} ${ctx.h2h.hWins}V · Nuls ${ctx.h2h.draws} · ${awayName} ${ctx.h2h.aWins}V</div>`;
  if(ctx.injuries && ctx.injuries.length) html+=`<div style="font-size:10px;font-weight:700;color:#8a9ab8;margin:10px 0 4px;text-transform:uppercase;letter-spacing:0.5px;">Absences signalées</div><div class="stats-box">${ctx.injuries.slice(0,6).map(i=>`${i.player} (${i.team}${i.reason?', '+i.reason:''})`).join('<br>')}</div>`;

  return html;
}

async function showPredictions(fixture,container,btn) {
  const live=isLive(fixture);
  if(!live&&container.dataset.loaded==="true"){container.style.display=container.style.display==="none"?"block":"none";btn.textContent=container.style.display==="none"?"👁 Analyser":"🙈 Masquer";return;}
  btn.textContent="🔄 Analyse...";btn.disabled=true;
  try {
    const home=fixture.teams.home,away=fixture.teams.away;let html="";
    if(live) {
      // Le score/minute affichés dans la liste viennent du dernier chargement global (toutes les 2
      // minutes) — potentiellement dépassé. On récupère ce match précis en frais avant de calculer
      // quoi que ce soit, pour éviter d'analyser un score qui n'est déjà plus le bon.
      try{
        const freshData=await apiGet(`/fixtures?id=${fixture.fixture.id}`);
        const fresh=freshData && freshData[0];
        if(fresh){
          fixture=fresh; // remplace la version potentiellement périmée par la version fraîche
          const idx=allFixtures.findIndex(f=>f.fixture.id===fresh.fixture.id);
          if(idx>=0) allFixtures[idx]=fresh; // garde la liste globale cohérente si on la réaffiche
        }
      }catch(e){ console.warn(`[pronos] Rafraîchissement direct fixture ${fixture.fixture.id} échoué, score potentiellement pas à jour :`, e.message); }
      const elapsed=fixture.fixture.status.elapsed??45,remaining=Math.max(0,90-elapsed);
      const hG=fixture.goals.home??0,aG=fixture.goals.away??0;
      let ls=null;
      try{const sr=await apiGet(`/fixtures/statistics?fixture=${fixture.fixture.id}`);if(sr&&sr.length>=2){const gS=(ts,t)=>{const s=ts.statistics.find(s=>s.type===t);return s?(parseInt(s.value)||0):0;};const hS=sr.find(t=>t.team.id===home.id)||sr[0],aS=sr.find(t=>t.team.id===away.id)||sr[1];ls={hP:gS(hS,"Ball Possession")||50,aP:gS(aS,"Ball Possession")||50,hSh:gS(hS,"Total Shots"),aSh:gS(aS,"Total Shots"),hShOn:gS(hS,"Shots on Goal"),aShOn:gS(aS,"Shots on Goal"),hC:gS(hS,"Corner Kicks"),aC:gS(aS,"Corner Kicks"),hRed:gS(hS,"Red Cards"),aRed:gS(aS,"Red Cards")};}}catch(e){}
      html=`<div class="live-header-note">🔴 ${elapsed}' | Score: ${hG}-${aG}</div>`;
      if(ls)html+=`<div class="stats-box">📊 <b>${home.name}</b>: ${ls.hP}% poss · ${ls.hSh} tirs (${ls.hShOn} cadrés) · ${ls.hC} corners${ls.hRed>0?` · 🟥 ${ls.hRed}`:''}<br>📊 <b>${away.name}</b>: ${ls.aP}% poss · ${ls.aSh} tirs (${ls.aShOn} cadrés) · ${ls.aC} corners${ls.aRed>0?` · 🟥 ${ls.aRed}`:''}</div>`;
      // La possession seule est un indicateur faible de qui menace vraiment le but adverse ; les
      // tirs cadrés le sont bien plus. On combine les trois signaux déjà récupérés (avant, seule la
      // possession était utilisée, les tirs et corners n'étaient affichés que sans influencer le calcul).
      let dom=0;
      if(ls){
        const possDiff=(ls.hP-50)/100;
        const shotsOnDiff=Math.max(-0.5,Math.min(0.5,(ls.hShOn-ls.aShOn)/8));
        const cornersDiff=Math.max(-0.5,Math.min(0.5,(ls.hC-ls.aC)/12));
        dom=possDiff*0.2+shotsOnDiff*0.55+cornersDiff*0.25;
      }
      // On réutilise le VRAI modèle calibré (cotes si dispo, sinon forme récente) au lieu d'une
      // formule à paliers fixes — sans ça, deux matchs à score/minute identiques donnaient toujours
      // exactement la même prédiction, peu importe la force réelle des équipes.
      let baseLh, baseLa, source;
      try{
        const oddsData=await apiGet(`/odds?fixture=${fixture.fixture.id}&bookmaker=${BOOKMAKER_1XBET}`);
        const parsed=parseOdds1xbet(oddsData,home.name,away.name);
        if(parsed && parsed.home1x2){
          const rawH=oddsToProb(parsed.home1x2),rawD=oddsToProb(parsed.draw1x2||2),rawA=oddsToProb(parsed.away1x2);
          const [nH,nD,nA]=normalizeProbabilities([rawH,rawD,rawA]);
          ({lh:baseLh,la:baseLa}=estimateLambdas(nH,nD,nA));
          source='cotes 1xBet';
        }
      }catch(e){}
      // Explicabilité simplifiée : liste des facteurs qui ont concrètement influencé le calcul,
      // avec un sens (📈/📉) et une ampleur approximative — pas un vrai calcul de type SHAP (ça
      // demanderait un modèle de Machine Learning qu'on n'a pas), juste une trace transparente des
      // ajustements réellement appliqués au-dessus de la base cotes/forme.
      const factors=[];
      if(baseLh===undefined){
        try{
          const [homeForm,awayForm]=await Promise.all([getTeamForm(home.id,fixture.fixture.date),getTeamForm(away.id,fixture.fixture.date)]);
          baseLh=(homeForm.home.avgScored+awayForm.away.avgConceded)/2;
          baseLa=(awayForm.away.avgScored+homeForm.home.avgConceded)/2;
          // Effet fatigue conservateur et plafonné : l'ampleur exacte est débattue dans la littérature,
          // donc on limite volontairement l'impact à -8% max plutôt que de deviner un poids agressif.
          if(homeForm.restDays!==null && homeForm.restDays<3){ baseLh*=0.92; factors.push({label:`${home.name} : moins de 3 jours de repos`, dir:'📉'}); }
          if(awayForm.restDays!==null && awayForm.restDays<3){ baseLa*=0.92; factors.push({label:`${away.name} : moins de 3 jours de repos`, dir:'📉'}); }
          source='forme récente';
        }catch(e){ console.warn(`[pronos] Forme indisponible pour fixture ${fixture.fixture.id}, repli sur moyenne générique :`, e.message); }
      }
      if(baseLh===undefined){ baseLh=1.35; baseLa=1.1; source='moyenne générique (aucune donnée)'; }
      // Une expulsion réduit fortement la capacité offensive de l'équipe en infériorité numérique et
      // facilite légèrement celle de l'adversaire (effet bien documenté, environ -35% d'attaque par
      // joueur en moins). On l'applique sur les lambdas AVANT projection, pas seulement en affichage.
      if(ls && ((ls.hRed||0)>0 || (ls.aRed||0)>0)){
        const hRed=ls.hRed||0, aRed=ls.aRed||0;
        baseLh *= Math.pow(0.65, hRed) * Math.pow(1.12, aRed);
        baseLa *= Math.pow(0.65, aRed) * Math.pow(1.12, hRed);
        if(hRed>0) factors.push({label:`${home.name} : ${hRed} carton${hRed>1?'s':''} rouge${hRed>1?'s':''}`, dir:'📉'});
        if(aRed>0) factors.push({label:`${away.name} : ${aRed} carton${aRed>1?'s':''} rouge${aRed>1?'s':''}`, dir:'📉'});
      }
      if(Math.abs(dom)>0.05) factors.push({label:`${dom>0?home.name:away.name} plus dangereux (tirs cadrés/corners)`, dir:'📈'});
      const {pH,pD,pA,pBTTS,pWTNH,pWTNA,totalDist}=computeLiveProbabilities(baseLh,baseLa,hG,aG,remaining,dom);
      html+=`<div style="font-size:10px;color:#8a9ab8;margin-bottom:6px;">Basé sur : ${source}, projeté sur ${remaining} min restantes</div>`;
      if(factors.length) html+=`<div style="font-size:10px;color:#4a6090;margin-bottom:8px;">${factors.map(f=>`${f.dir} ${f.label}`).join('<br>')}</div>`;
      html+=`<div style="font-size:11px;font-weight:700;color:#1a3a6b;margin-bottom:6px;">📊 Probabilités en temps réel</div>`;
      [{label:`Victoire ${home.name}`,p:pH},{label:'Match nul',p:pD},{label:`Victoire ${away.name}`,p:pA}].sort((a,b)=>b.p-a.p).forEach(r=>{html+=`<div style="padding:6px 0;border-top:1px solid #f0f2f5"><div style="font-size:13px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
      const tG=hG+aG;
      // On affiche toujours le PROCHAIN seuil pas encore atteint (tG+0.5), jamais un seuil fixe à 2.5 :
      // si 4 buts sont déjà marqués, prédire "Plus de 2.5 buts" à 100% n'est pas une prédiction, c'est
      // un fait déjà acquis. Le seuil dynamique reste une vraie question ouverte sur la suite du match.
      const nextLine=tG+0.5;
      const pOverNext=liveOverProb(totalDist, tG, nextLine);
      html+=`<div style="padding:6px 0;border-top:1px solid #f0f2f5"><div style="font-size:13px;font-weight:700">${pOverNext>=0.5?`Plus de ${nextLine} buts au total`:`Moins de ${nextLine} buts au total`}</div>${confidenceBarHTML(pOverNext>=0.5?pOverNext:1-pOverNext)}</div>`;
      // Marchés supplémentaires (mêmes que l'avant-match), calculés à partir de la même grille de
      // scores projetée — pas de nouvelle logique, juste plus de lectures du même modèle.
      html+=`<div style="font-size:10px;font-weight:700;color:#8a9ab8;margin:10px 0 4px;text-transform:uppercase;letter-spacing:0.5px;">Autres marchés</div>`;
      [
        {label:`${home.name} ou Nul`, p:pH+pD},
        {label:`${away.name} ou Nul`, p:pD+pA},
        {label:`${home.name} ou ${away.name}`, p:pH+pA},
        {label:'BTTS (les deux marquent)', p:pBTTS},
        ...(hG===0?[{label:`${away.name} gagne sans encaisser`, p:pWTNA}]:[]),
        ...(aG===0?[{label:`${home.name} gagne sans encaisser`, p:pWTNH}]:[])
      ].forEach(r=>{html+=`<div style="padding:5px 0;border-top:1px solid #f0f2f5"><div style="font-size:12px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
      try{
        const ctx=await getMatchContext(fixture);
        html+=renderMatchContext(ctx,home.name,away.name);
      }catch(e){ console.warn(`[pronos] Contexte additionnel indisponible pour fixture ${fixture.fixture.id} :`, e.message); }
    } else {
      html=`<div class="odds-header">🎯 Value Bets vs 1xBet</div>`;
      const {parsed, modelProbs, valueBets, lh, la}=await getValueBetsForFixture(fixture);
      if(!parsed||!parsed.home1x2){
        html+=`<div class="no-odds">⚠️ Cotes 1xBet non disponibles pour ce match.</div>`;
      } else {
        valueBets.forEach(vb=>recordValueBet(fixture,vb));
        // Indice de confiance (0-100) : base solide car des cotes réelles sont disponibles, ajustée
        // selon l'accord entre le modèle cotes et le modèle forme récente (deux sources indépendantes
        // qui se recoupent = plus de confiance). Formule volontairement simple et transparente,
        // pas un vrai calcul statistique de confiance — à prendre comme un indicateur, pas une preuve.
        let confidenceScore=70;
        try{
          const [homeForm,awayForm]=await Promise.all([getTeamForm(home.id,fixture.fixture.date),getTeamForm(away.id,fixture.fixture.date)]);
          const formLh=(homeForm.home.avgScored+awayForm.away.avgConceded)/2;
          const formLa=(awayForm.away.avgScored+homeForm.home.avgConceded)/2;
          let h2h=null;
          try{ h2h=await getH2HRecord(home.id, away.id); }catch(e){}
          recordPrediction(fixture, lh, la, formLh, formLa, h2h);
          const formProbs=computeModelProbabilities(formLh, formLa);
          const disagreement=Math.abs(modelProbs.pH-formProbs.pH)+Math.abs(modelProbs.pD-formProbs.pD)+Math.abs(modelProbs.pA-formProbs.pA);
          const agreementBonus=Math.max(0,Math.round(25*(1-disagreement/0.6)));
          confidenceScore=Math.min(95,70+agreementBonus);
        }catch(e){ console.warn(`[pronos] Forme récente indisponible pour fixture ${fixture.fixture.id} :`, e.message); }
        html+=`<div style="font-size:11px;font-weight:700;color:${confidenceScore>=80?'#1a6b3a':confidenceScore>=65?'#b08900':'#9b2c2c'};margin-bottom:8px;">Indice de confiance : ${confidenceScore}/100</div>`;
        if(valueBets.length===0){
          html+=`<div class="no-odds">✅ Aucun value bet détecté.<br>Les cotes semblent correctement évaluées.</div>`;
        } else {
          html+=`<div style="font-size:11px;color:#8a9ab8;margin-bottom:10px;">${valueBets.length} opportunité${valueBets.length>1?'s':''} · Trié par avantage</div>`;
          html+=valueBets.map(renderValueBet).join("");
        }
        html+=`<div style="font-size:10px;font-weight:700;color:#8a9ab8;margin:12px 0 6px;padding-top:10px;border-top:1px dashed #e0e4ee;text-transform:uppercase;letter-spacing:0.5px;">Probabilités du modèle</div>`;
        [{label:`Victoire ${home.name}`,p:modelProbs.pH},{label:'Match nul',p:modelProbs.pD},{label:`Victoire ${away.name}`,p:modelProbs.pA},{label:'BTTS Oui',p:modelProbs.pBTTS},{label:'Over 2.5',p:modelProbs.pO25}].forEach(r=>{html+=`<div style="padding:5px 0;border-top:1px solid #f0f2f5"><div style="font-size:12px;font-weight:700">${r.label}</div>${confidenceBarHTML(r.p)}</div>`;});
        try{
          const ctx=await getMatchContext(fixture);
          html+=renderMatchContext(ctx,home.name,away.name);
        }catch(e){ console.warn(`[pronos] Contexte additionnel indisponible pour fixture ${fixture.fixture.id} :`, e.message); }
      }
      container.dataset.loaded="true";
    }
    container.innerHTML=html;container.style.display="block";
    btn.textContent=live?"🔄 Recalculer":"🙈 Masquer";
    btn.className=live?"pred-btn live-btn":"pred-btn";
  } catch(e) {
    container.innerHTML=`<div style="color:#9b2c2c;font-size:12px;">⚠️ Erreur : ${e.message}</div>`;
    container.style.display="block";btn.textContent="👁 Analyser";
  } finally {btn.disabled=false;}
}

function renderMatch(fixture) {
  const home=fixture.teams.home,away=fixture.teams.away;
  const kickoff=new Date(fixture.fixture.date);
  const timeStr=kickoff.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  const elapsed=fixture.fixture.status.elapsed;
  let tb;
  if(isLive(fixture))tb=`<span class="badge-live">${elapsed?elapsed+"'":"Live"}</span>`;
  else if(isFinished(fixture)){const sc=fixture.goals.home!==null?`${fixture.goals.home}-${fixture.goals.away}`:"FT";tb=`<span class="badge-done">✅ ${sc}</span>`;}
  else tb=`<span class="time-badge">${timeStr}</span>`;
  const ss=(isLive(fixture)||isFinished(fixture))&&fixture.goals.home!==null;
  const card=document.createElement("div");card.className="card";
  card.innerHTML=`<div class="card-top"><span class="card-round">${fixture.league.round||""}</span>${tb}</div><div class="teams-row"><div class="team-block"><img src="${home.logo}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain;flex-shrink:0" alt=""/><span class="team-name">${home.name}</span></div><div class="score-block">${ss?`<span class="score">${fixture.goals.home}</span><span class="score-sep">-</span><span class="score">${fixture.goals.away}</span>`:`<span class="vs-text">VS</span>`}</div><div class="team-block away"><img src="${away.logo}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain;flex-shrink:0" alt=""/><span class="team-name">${away.name}</span></div></div><button class="pred-btn${isLive(fixture)?" live-btn":""}">👁 Analyser</button><div class="predictions" style="display:none"></div>`;
  const btn=card.querySelector(".pred-btn"),pc=card.querySelector(".predictions");
  btn.addEventListener("click",()=>showPredictions(fixture,pc,btn));
  return card;
}

function renderLeagueGroup(leagueName,countryName,fixtures,hasLive) {
  const w=document.createElement("div");w.className="league-group";
  const h=document.createElement("div");h.className="league-header"+(hasLive?" live-header":"");
  h.innerHTML=`<span class="league-flag">${countryFlag(countryName)}</span><span class="league-title">${formatLeagueName(leagueName,countryName)}</span>${hasLive?`<span class="league-live-badge">LIVE</span>`:""}<span class="league-count${hasLive?" live-count":""}">${fixtures.length}</span><span class="league-chevron">▼</span>`;
  const mc=document.createElement("div");mc.className="league-matches";
  fixtures.forEach(f=>mc.appendChild(renderMatch(f)));
  h.addEventListener("click",()=>{const o=mc.classList.toggle("open");h.querySelector(".league-chevron").classList.toggle("open",o);});
  w.appendChild(h);w.appendChild(mc);return w;
}

function renderTab(fixtures) {
  const ml=document.getElementById("matchList"),fn=document.getElementById("footerNote");
  ml.innerHTML="";fn.innerHTML="";
  if(fixtures.length===0){ml.innerHTML=`<div class="empty-tab">Aucun match dans cet onglet.</div>`;return;}
  const bl={};
  fixtures.forEach(f=>{const k=`${f.league.id}`;if(!bl[k])bl[k]={name:f.league.name,country:f.league.country,fixtures:[]};bl[k].fixtures.push(f);});
  Object.values(bl).sort((a,b)=>leaguePriority(a.name)-leaguePriority(b.name)).forEach(g=>{
    const hl=g.fixtures.some(f=>isLive(f));
    g.fixtures.sort((a,b)=>{const pa=isLive(a)?0:isUpcoming(a)?1:2,pb=isLive(b)?0:isUpcoming(b)?1:2;if(pa!==pb)return pa-pb;return new Date(a.fixture.date)-new Date(b.fixture.date);});
    ml.appendChild(renderLeagueGroup(g.name,g.country,g.fixtures,hl));
  });
  fn.innerHTML="🔥 +10% edge fort · ⚡ +6% solide · +3% léger. Joue avec prudence.";
  fn.className="footer-note";
}

function switchTab(tab) {
  currentTab=tab;
  ["upcoming","live","done"].forEach(t=>document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("active",t===tab));
  let fx;
  if(tab==="live")fx=allFixtures.filter(f=>isLive(f));
  else if(tab==="upcoming")fx=allFixtures.filter(f=>isUpcoming(f));
  else fx=allFixtures.filter(f=>isFinished(f));
  renderTab(fx);
  const lc=allFixtures.filter(f=>isLive(f)).length;
  document.getElementById("tabLive").innerHTML=`<span class="live-dot"></span>EN DIRECT${lc>0?` (${lc})`:""}`;
  document.getElementById("tabUpcoming").textContent=`AVANT-MATCH (${allFixtures.filter(f=>isUpcoming(f)).length})`;
  document.getElementById("tabDone").textContent=`TERMINÉS (${allFixtures.filter(f=>isFinished(f)).length})`;
}

async function loadFixtures(silent=false) {
  const se=document.getElementById("status"),eb=document.getElementById("errorBox"),rb=document.getElementById("refreshBtn");
  if(!silent){se.style.display="block";se.innerHTML='<span class="spin">🔄</span> Chargement...';eb.innerHTML="";document.getElementById("matchList").innerHTML="";}
  try {
    const [dateData,liveData]=await Promise.all([apiGet(`/fixtures?date=${todayISO()}`),apiGet(`/fixtures?live=all`).catch(()=>[])]);
    const lm={};(liveData||[]).forEach(f=>{lm[f.fixture.id]=f;});
    const merged=(dateData||[]).map(f=>lm[f.fixture.id]||f);
    (liveData||[]).forEach(f=>{if(!merged.find(m=>m.fixture.id===f.fixture.id))merged.push(f);});
    allFixtures=merged.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date));
    se.style.display="none";rb.style.display="flex";
    switchTab(currentTab);
  } catch(e) {
    if(!silent){se.style.display="none";eb.innerHTML=`<div class="error-box">⚠️ Impossible de récupérer les matchs.</div>`;rb.style.display="flex";}
  }
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
loadFixtures();
setInterval(()=>loadFixtures(true),2*60*1000);
</script>
